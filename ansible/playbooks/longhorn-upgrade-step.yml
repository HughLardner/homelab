---
# Single Longhorn upgrade step - included by longhorn-upgrade.yml
# Upgrades to the version specified by {{ upgrade_target_version }}

- name: "=== Upgrading Longhorn to v{{ upgrade_target_version }} ==="
  ansible.builtin.debug:
    msg: "Starting Helm upgrade to v{{ upgrade_target_version }}..."

- name: "Helm upgrade to v{{ upgrade_target_version }}"
  ansible.builtin.shell: |
    helm upgrade longhorn longhorn/longhorn \
      --namespace {{ longhorn_namespace }} \
      --version {{ upgrade_target_version }} \
      --values {{ longhorn_values_tmp }} \
      --wait \
      --timeout 10m
  environment:
    KUBECONFIG: /etc/rancher/k3s/k3s.yaml
  register: helm_upgrade
  changed_when: "'has been upgraded' in helm_upgrade.stdout"

- name: "Wait for longhorn-manager to be ready (v{{ upgrade_target_version }})"
  ansible.builtin.command:
    cmd: >
      /usr/local/bin/k3s kubectl wait --namespace {{ longhorn_namespace }}
      --for=condition=ready pod --selector=app=longhorn-manager
      --timeout=600s
  changed_when: false
  retries: 3
  delay: 10
  register: manager_ready
  until: manager_ready.rc == 0

- name: "Wait for instance-manager to be ready (v{{ upgrade_target_version }})"
  ansible.builtin.command:
    cmd: >
      /usr/local/bin/k3s kubectl wait --namespace {{ longhorn_namespace }}
      --for=condition=ready pod --selector=longhorn.io/component=instance-manager
      --timeout=600s
  changed_when: false
  retries: 3
  delay: 10
  register: instance_ready
  until: instance_ready.rc == 0

- name: "Wait for CSI plugin to be ready (v{{ upgrade_target_version }})"
  ansible.builtin.command:
    cmd: >
      /usr/local/bin/k3s kubectl wait --namespace {{ longhorn_namespace }}
      --for=condition=ready pod --selector=app=longhorn-csi-plugin
      --timeout=300s
  changed_when: false
  retries: 3
  delay: 10
  register: csi_ready
  until: csi_ready.rc == 0

- name: "Reconcile node drain policy after v{{ upgrade_target_version }}"
  ansible.builtin.shell: |
    /usr/local/bin/k3s kubectl patch settings.longhorn.io -n {{ longhorn_namespace }} node-drain-policy \
      --type=merge -p '{"value":"{{ longhorn_node_drain_policy }}"}'
  register: node_drain_policy_config
  changed_when: "'patched' in node_drain_policy_config.stdout"
  failed_when: false

- name: "Verify volume health after v{{ upgrade_target_version }}"
  ansible.builtin.shell: |
    FAULTED=$(/usr/local/bin/k3s kubectl get volumes.longhorn.io -n {{ longhorn_namespace }} -o json | \
      jq -r '[.items[] | select(.status.robustness == "faulted")] | length')
    if [ "$FAULTED" -gt 0 ]; then
      echo "FAULTED volumes detected after upgrade to v{{ upgrade_target_version }}!"
      /usr/local/bin/k3s kubectl get volumes.longhorn.io -n {{ longhorn_namespace }} \
        -o custom-columns='NAME:.metadata.name,STATE:.status.state,ROBUSTNESS:.status.robustness' --no-headers
      exit 1
    fi
    echo "All volumes healthy after upgrade to v{{ upgrade_target_version }}"
  changed_when: false

- name: "Stabilization pause after v{{ upgrade_target_version }}"
  ansible.builtin.pause:
    seconds: 30
    prompt: "Waiting 30s for stabilization after v{{ upgrade_target_version }}..."

- name: "v{{ upgrade_target_version }} upgrade complete"
  ansible.builtin.debug:
    msg: "Successfully upgraded to Longhorn v{{ upgrade_target_version }}"
