---
# Node Preparation Role
# Prepares Ubuntu nodes for Kubernetes deployment

- name: Update apt cache
  ansible.builtin.apt:
    update_cache: true
    cache_valid_time: 3600
  when: ansible_os_family == "Debian"

- name: Upgrade all packages
  ansible.builtin.apt:
    upgrade: dist
    autoremove: true
    autoclean: true
  when: node_prep_upgrade_packages | bool
  register: upgrade_result

- name: Install essential system packages
  ansible.builtin.apt:
    name: "{{ node_prep_essential_packages }}"
    state: present
    update_cache: false

- name: Install storage packages (for Longhorn)
  ansible.builtin.apt:
    name: "{{ node_prep_storage_packages }}"
    state: present
    update_cache: false

- name: Install optional packages
  ansible.builtin.apt:
    name: "{{ node_prep_optional_packages }}"
    state: present
    update_cache: false
  when: node_prep_optional_packages | length > 0

- name: Enable and start open-iscsi service
  ansible.builtin.systemd:
    name: open-iscsi
    enabled: true
    state: started
  when: node_prep_enable_iscsi | bool

- name: Enable and start iscsid service
  ansible.builtin.systemd:
    name: iscsid
    enabled: true
    state: started
  when: node_prep_enable_iscsi | bool

- name: Verify iSCSI services are active
  ansible.builtin.systemd:
    name: "{{ item }}"
    state: started
  loop:
    - open-iscsi
    - iscsid
  when: node_prep_enable_iscsi | bool
  register: iscsi_status
  changed_when: false

- name: Check if multipathd service exists
  ansible.builtin.systemd:
    name: multipathd
  register: multipathd_check
  failed_when: false
  changed_when: false

- name: Configure multipath blacklist
  ansible.builtin.blockinfile:
    path: /etc/multipath.conf
    create: true
    mode: '0644'
    block: |
      # Blacklist local disks to prevent multipath from claiming them
      blacklist {
          devnode "^sd[a-z0-9]+"
      }
    marker: "# {mark} ANSIBLE MANAGED BLOCK - Local disk blacklist"
  when:
    - node_prep_configure_multipath | bool
    - multipathd_check.status is defined
    - multipathd_check.status.LoadState == "loaded"
  register: multipath_config

- name: Restart multipathd service
  ansible.builtin.systemd:
    name: multipathd
    state: restarted
  when:
    - node_prep_configure_multipath | bool
    - multipath_config is defined
    - multipath_config.changed

- name: Configure system settings for Kubernetes
  ansible.builtin.sysctl:
    name: "{{ item.key }}"
    value: "{{ item.value }}"
    state: present
    reload: true
  loop:
    - { key: 'net.ipv4.ip_forward', value: '1' }
    - { key: 'net.bridge.bridge-nf-call-iptables', value: '1' }
    - { key: 'net.bridge.bridge-nf-call-ip6tables', value: '1' }
  when: node_prep_configure_sysctl | bool

- name: Load required kernel modules
  community.general.modprobe:
    name: "{{ item }}"
    state: present
    persistent: present
  loop:
    - overlay
    - br_netfilter
  when: node_prep_load_kernel_modules | bool

# Limit journald I/O to avoid saturation (see docs/runbooks/node-io-saturation-recovery.md)
- name: Ensure journald config drop-in directory exists
  ansible.builtin.file:
    path: /etc/systemd/journald.conf.d
    state: directory
    mode: '0755'
  when: node_prep_configure_journald_ratelimit | default(true) | bool

- name: Deploy journald rate limit config
  ansible.builtin.copy:
    dest: /etc/systemd/journald.conf.d/ratelimit.conf
    content: |
      [Journal]
      # Cap total journal size on disk (default ~10% of disk = ~10GB on this node).
      SystemMaxUse=500M
      SystemMaxFileSize=50M
      # Rate limit: 500 messages per 30s. Prevents crashlooping pods from
      # amplifying disk I/O. 500/30s is still generous for healthy services.
      RateLimitBurst=500
      RateLimitIntervalSec=30s
    mode: '0644'
  when: node_prep_configure_journald_ratelimit | default(true) | bool
  register: journald_ratelimit

- name: Restart journald after rate limit config change
  ansible.builtin.systemd:
    name: systemd-journald
    state: restarted
  when:
    - node_prep_configure_journald_ratelimit | default(true) | bool
    - journald_ratelimit is changed

# K3s API server throttling - protect the control plane from reconciliation storms
- name: Ensure K3s config directory exists
  ansible.builtin.file:
    path: /etc/rancher/k3s
    state: directory
    mode: '0755'
  when: node_prep_configure_k3s_api_throttle | default(true) | bool

- name: Deploy K3s API server throttling config
  ansible.builtin.copy:
    dest: /etc/rancher/k3s/config.yaml
    content: |
      # Throttle concurrent API requests to prevent the server from being overwhelmed
      # by a burst from ArgoCD/vm-operator all reconciling simultaneously.
      # Defaults are 400 (readonly) and 200 (mutating) — too high for a single-node
      # homelab where the API server shares CPU/disk with all workloads.
      kube-apiserver-arg:
        - "max-requests-inflight=150"
        - "max-mutating-requests-inflight=50"
        - "watch-cache-sizes=nodes#100,pods#500"

      # Kubelet eviction thresholds — gracefully evict low-priority pods before the
      # OOM killer fires and takes down random processes (including the API server).
      kubelet-arg:
        - "eviction-hard=memory.available<200Mi,nodefs.available<10%"
        - "eviction-soft=memory.available<500Mi,nodefs.available<15%"
        - "eviction-soft-grace-period=memory.available=30s,nodefs.available=1m"
        - "fail-swap-on=false"
    mode: '0644'
  when: node_prep_configure_k3s_api_throttle | default(true) | bool
  register: k3s_config_result

# K3s systemd CPU priority - ensure control plane isn't starved by pods
- name: Ensure K3s systemd override directory exists
  ansible.builtin.file:
    path: /etc/systemd/system/k3s.service.d
    state: directory
    mode: '0755'
  when: node_prep_configure_k3s_cpu_priority | default(true) | bool

- name: Deploy K3s systemd CPU priority override
  ansible.builtin.copy:
    dest: /etc/systemd/system/k3s.service.d/cpu-priority.conf
    content: |
      [Service]
      # Give k3s (etcd + API server + controller-manager + scheduler) higher CPU
      # scheduling weight than the default (100). This ensures that when pods
      # compete for CPU, the control plane is served first and remains responsive.
      # CPUWeight range: 1-10000, default 100. 400 = 4x higher priority than pods.
      CPUWeight=400
    mode: '0644'
  when: node_prep_configure_k3s_cpu_priority | default(true) | bool
  register: k3s_cpu_priority_result

- name: Reload systemd daemon after K3s override changes
  ansible.builtin.systemd:
    daemon_reload: true
  when:
    - k3s_cpu_priority_result is defined
    - k3s_cpu_priority_result.changed

- name: Disable swap (legacy — only when explicitly requested)
  ansible.builtin.command: swapoff -a
  when:
    - node_prep_disable_swap | bool
    - ansible_swaptotal_mb > 0
  changed_when: true

- name: Remove swap from /etc/fstab (legacy)
  ansible.builtin.lineinfile:
    path: /etc/fstab
    regexp: '\sswap\s'
    state: absent
  when: node_prep_disable_swap | bool

# Swap as a safety net — prevents hard OOM kills when memory briefly spikes.
# vm.swappiness=10 means the kernel only swaps under real pressure.
- name: Create swap file
  ansible.builtin.command: >
    dd if=/dev/zero of=/swapfile bs=1M count={{ node_prep_swap_size_mb }}
  args:
    creates: /swapfile
  when: not (node_prep_disable_swap | bool)
  register: swap_created

- name: Set swap file permissions
  ansible.builtin.file:
    path: /swapfile
    mode: '0600'
  when: not (node_prep_disable_swap | bool)

- name: Format swap file
  ansible.builtin.command: mkswap /swapfile
  when:
    - not (node_prep_disable_swap | bool)
    - swap_created is changed
  changed_when: true

- name: Enable swap file
  ansible.builtin.command: swapon /swapfile
  when:
    - not (node_prep_disable_swap | bool)
    - swap_created is changed
  changed_when: true

- name: Add swap file to /etc/fstab
  ansible.builtin.lineinfile:
    path: /etc/fstab
    line: "/swapfile none swap sw 0 0"
    state: present
  when: not (node_prep_disable_swap | bool)

- name: Set vm.swappiness
  ansible.builtin.sysctl:
    name: vm.swappiness
    value: "{{ node_prep_swappiness }}"
    state: present
    reload: true
  when: not (node_prep_disable_swap | bool)

# Reduce disk I/O by disabling access time updates on every read.
- name: Check if root filesystem has noatime
  ansible.builtin.shell: |
    grep -E '^\S+\s+/\s+' /etc/fstab | grep -q noatime
  register: noatime_check
  changed_when: false
  failed_when: false

- name: Add noatime to root filesystem mount options
  ansible.builtin.shell: |
    sed -i 's|\(\S\+\s\+/\s\+\S\+\s\+\)\(defaults\)|\1defaults,noatime|' /etc/fstab
  when: noatime_check.rc != 0
  register: fstab_noatime
  changed_when: true

- name: Remount root with noatime
  ansible.builtin.command: mount -o remount /
  when:
    - fstab_noatime is defined
    - fstab_noatime is changed
  changed_when: true

- name: Set timezone
  community.general.timezone:
    name: "{{ node_prep_timezone }}"
  when: node_prep_configure_timezone | bool

- name: Set locale
  ansible.builtin.locale_gen:
    name: "{{ node_prep_locale }}"
    state: present
  when: node_prep_configure_locale | bool

- name: Set default locale
  ansible.builtin.command: update-locale LANG={{ node_prep_locale }}
  when:
    - node_prep_configure_locale | bool
    - ansible_env.LANG is not defined or ansible_env.LANG != node_prep_locale
  changed_when: true

- name: Set hostname
  ansible.builtin.hostname:
    name: "{{ inventory_hostname }}"
  when: node_prep_set_hostname | bool

- name: Update /etc/hosts with cluster nodes
  ansible.builtin.lineinfile:
    path: /etc/hosts
    line: "{{ hostvars[item]['ansible_host'] }} {{ item }}"
    state: present
  loop: "{{ groups['k3s_cluster'] }}"
  when: node_prep_update_hosts | bool

- name: Reboot if packages were upgraded
  ansible.builtin.reboot:
    reboot_timeout: 300
    msg: "Reboot initiated by Ansible after package upgrade"
  when:
    - node_prep_reboot_after_upgrade | bool
    - upgrade_result is defined
    - upgrade_result.changed

# Persistent data disk configuration for Longhorn
# This disk survives cluster rebuilds - only format if not already formatted
- name: Check if persistent data disk exists
  ansible.builtin.stat:
    path: /dev/vdb
  register: data_disk

- name: Check if persistent data disk is already formatted
  ansible.builtin.command: blkid -o value -s TYPE /dev/vdb
  register: disk_fstype
  failed_when: false
  changed_when: false
  when: data_disk.stat.exists

- name: Format persistent data disk (only if unformatted)
  community.general.filesystem:
    fstype: ext4
    dev: /dev/vdb
    opts: -L k8s-data
  when:
    - data_disk.stat.exists
    - disk_fstype.rc != 0 or disk_fstype.stdout == ""

- name: Create Longhorn data mount point
  ansible.builtin.file:
    path: "{{ node_prep_longhorn_data_path | default('/mnt/longhorn-data') }}"
    state: directory
    mode: '0755'
  when: data_disk.stat.exists

- name: Mount persistent data disk
  ansible.posix.mount:
    path: "{{ node_prep_longhorn_data_path | default('/mnt/longhorn-data') }}"
    src: /dev/vdb
    fstype: ext4
    opts: defaults,noatime
    state: mounted
  when: data_disk.stat.exists

- name: Display node preparation summary
  ansible.builtin.debug:
    msg:
      - "✅ Node preparation complete!"
      - "Node: {{ inventory_hostname }}"
      - "Timezone: {{ node_prep_timezone }}"
      - "Locale: {{ node_prep_locale }}"
      - "Packages upgraded: {{ upgrade_result.changed | default(false) }}"
      - "iSCSI services enabled: {{ node_prep_enable_iscsi }}"
      - "Multipath configured: {{ multipath_config.changed | default(false) }}"
      - "Persistent data disk: {{ data_disk.stat.exists | default(false) }}"
      - "Reboot performed: {{ upgrade_result.changed and node_prep_reboot_after_upgrade }}"
