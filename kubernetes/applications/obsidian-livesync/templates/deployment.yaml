---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: obsidian-livesync
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/name: obsidian-livesync
    app.kubernetes.io/component: couchdb
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: obsidian-livesync
      app.kubernetes.io/component: couchdb
  template:
    metadata:
      labels:
        app.kubernetes.io/name: obsidian-livesync
        app.kubernetes.io/component: couchdb
    spec:
      {{- if .Values.priorityClassName }}
      priorityClassName: {{ .Values.priorityClassName }}
      {{- end }}
      containers:
        - name: couchdb
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.services.obsidian_livesync.couchdb_port | default 5984 }}
              protocol: TCP
          env:
            - name: TZ
              value: {{ .Values.env.TZ | quote }}
          envFrom:
            - secretRef:
                name: obsidian-livesync-secrets
          volumeMounts:
            - name: couchdb-data
              mountPath: /opt/couchdb/data
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          livenessProbe:
            tcpSocket:
              port: http
            initialDelaySeconds: 30
            periodSeconds: 15
            failureThreshold: 5
          readinessProbe:
            tcpSocket:
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
            failureThreshold: 3
      volumes:
        - name: couchdb-data
          persistentVolumeClaim:
            claimName: obsidian-livesync-data
