---
apiVersion: batch/v1
kind: Job
metadata:
  name: obsidian-livesync-init
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/name: obsidian-livesync
    app.kubernetes.io/component: init
  annotations:
    helm.sh/hook: post-install,post-upgrade
    helm.sh/hook-weight: "0"
    helm.sh/hook-delete-policy: before-hook-creation,hook-succeeded,hook-failed
spec:
  backoffLimit: 5
  activeDeadlineSeconds: 600
  template:
    metadata:
      labels:
        app.kubernetes.io/name: obsidian-livesync
        app.kubernetes.io/component: init
    spec:
      restartPolicy: OnFailure
      containers:
        - name: init-couchdb
          image: curlimages/curl:8.5.0
          envFrom:
            - secretRef:
                name: obsidian-livesync-secrets
          command:
            - /bin/sh
            - -c
            - |
              COUCH="http://${COUCHDB_USER}:${COUCHDB_PASSWORD}@obsidian-livesync:{{ .Values.services.obsidian_livesync.couchdb_port | default 5984 }}"
              echo "Waiting for CouchDB to be ready..."
              until curl -sf "${COUCH}/_up"; do
                echo "CouchDB not ready, retrying in 5s..."
                sleep 5
              done
              echo "CouchDB is ready. Creating _users database..."
              curl -sf -X PUT "${COUCH}/_users" \
                || echo "_users database may already exist (this is OK)"
              echo "Init complete."
