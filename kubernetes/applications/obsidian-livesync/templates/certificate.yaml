---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: obsidian-livesync-tls
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/name: obsidian-livesync
    app.kubernetes.io/component: tls
spec:
  secretName: obsidian-livesync-tls
  issuerRef:
    name: {{ .Values.global.cert_issuer | default "letsencrypt-staging" }}
    kind: ClusterIssuer
  dnsNames:
    - {{ .Values.services.obsidian_livesync.domain }}
  privateKey:
    algorithm: ECDSA
    size: 256
