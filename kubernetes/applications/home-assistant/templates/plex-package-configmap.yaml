---
# HA package for Plex power toggle.
#
# Provides an input_boolean toggle on the HA dashboard to start/stop the Plex
# Kubernetes Deployment (scale between 0 and 1 replicas). Plex defaults to
# replicas: 0 (off) and is started on demand via this toggle.
#
# Mounted into the HA pod at /config/packages/plex.yaml via additionalVolumes
# in values.yaml. Loaded automatically by:
#   homeassistant:
#     packages: !include_dir_merge_named packages
apiVersion: v1
kind: ConfigMap
metadata:
  name: ha-package-plex
  namespace: {{ .Release.Namespace }}
data:
  plex.yaml: |
    input_boolean:
      plex_server:
        name: "Plex Server"
        icon: mdi:plex

    shell_command:
      plex_start: |
        TOKEN=$(cat /var/run/secrets/kubernetes.io/serviceaccount/token)
        curl -sf \
          --cacert /var/run/secrets/kubernetes.io/serviceaccount/ca.crt \
          -H "Authorization: Bearer $TOKEN" \
          -H "Content-Type: application/strategic-merge-patch+json" \
          -X PATCH \
          https://kubernetes.default.svc/apis/apps/v1/namespaces/media/deployments/plex/scale \
          -d '{"spec":{"replicas":1}}'
      plex_stop: |
        TOKEN=$(cat /var/run/secrets/kubernetes.io/serviceaccount/token)
        curl -sf \
          --cacert /var/run/secrets/kubernetes.io/serviceaccount/ca.crt \
          -H "Authorization: Bearer $TOKEN" \
          -H "Content-Type: application/strategic-merge-patch+json" \
          -X PATCH \
          https://kubernetes.default.svc/apis/apps/v1/namespaces/media/deployments/plex/scale \
          -d '{"spec":{"replicas":0}}'

    automation:
      plex_start_on_toggle:
        alias: "Start Plex when toggled on"
        id: plex_start_on_toggle
        trigger:
          - platform: state
            entity_id: input_boolean.plex_server
            to: "on"
        action:
          - service: shell_command.plex_start
      plex_stop_on_toggle:
        alias: "Stop Plex when toggled off"
        id: plex_stop_on_toggle
        trigger:
          - platform: state
            entity_id: input_boolean.plex_server
            to: "off"
        action:
          - service: shell_command.plex_stop
