---
# HA package for Plex wake-on-demand.
#
# HA packages (https://www.home-assistant.io/docs/configuration/packages/) let
# us add configuration without touching configuration.yaml. The file is mounted
# into the HA pod at /config/packages/plex.yaml and loaded automatically if
# configuration.yaml contains:
#   homeassistant:
#     packages: !include_dir_merge_named packages
#
# NOTE: This ConfigMap is mounted by the plex-packages-volume / volumeMount
# defined in homeassistant.extraVolumes / extraVolumeMounts in values.yaml.
# If those mount keys are absent (chart version doesn't support extraVolumes),
# apply the content manually via the HA File Editor addon:
#   /config/packages/plex.yaml
apiVersion: v1
kind: ConfigMap
metadata:
  name: ha-package-plex
  namespace: {{ .Release.Namespace }}
data:
  plex.yaml: |
    # Plex wake-on-demand — called by the Wake Plex dashboard button.
    #
    # Prerequisites (one-time, via HA UI):
    #   Settings → Helpers → Add Helper → Button
    #   Name: "Wake Plex"  Icon: mdi:plex  → entity: input_button.wake_plex
    #
    # This package provides:
    #   shell_command.wake_plex  — scales the Plex deployment to 1 replica
    #   automation.wake_plex_button — pressing the button calls the command
    #
    # Notes:
    #   - input_button must be created via UI in HA 2024.8+ (YAML config removed)
    #   - shell_command uses | (literal block) so the script runs in /bin/sh
    #   - automation must be a dict (not list) inside packages
    shell_command:
      wake_plex: |
        TOKEN=$(cat /var/run/secrets/kubernetes.io/serviceaccount/token)
        curl -sf \
          --cacert /var/run/secrets/kubernetes.io/serviceaccount/ca.crt \
          -H "Authorization: Bearer $TOKEN" \
          -H "Content-Type: application/strategic-merge-patch+json" \
          -X PATCH \
          https://kubernetes.default.svc/apis/apps/v1/namespaces/media/deployments/plex/scale \
          -d '{"spec":{"replicas":1}}'

    automation:
      wake_plex_button:
        alias: "Wake Plex on button press"
        id: wake_plex_button
        trigger:
          - platform: state
            entity_id: input_button.wake_plex
        action:
          - service: shell_command.wake_plex
