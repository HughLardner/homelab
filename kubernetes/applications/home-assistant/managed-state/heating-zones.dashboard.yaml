views:
  - title: Heating
    path: default_view
    type: sections
    icon: mdi:radiator
    max_columns: 4
    sections:
      - title: Global controls
        column_span: 2
        cards:
          - type: custom:mushroom-chips-card
            alignment: start
            chips:
              - type: entity
                entity: sensor.wiser_heating_operation_mode
                icon: mdi:home-thermometer
                icon_color: red
                content_info: state
              - type: entity
                entity: switch.wiser_comfort_mode
                icon: mdi:home-heart
                icon_color: amber
                content_info: state
              - type: entity
                entity: switch.wiser_eco_mode
                icon: mdi:leaf
                icon_color: green
                content_info: state
              - type: entity
                entity: switch.wiser_away_mode
                icon: mdi:airplane
                icon_color: deep-orange
                content_info: state
              - type: entity
                entity: switch.wiser_valve_protection
                icon: mdi:valve
                icon_color: blue-grey
                content_info: state
          - type: grid
            columns: 2
            square: false
            cards:
              - type: custom:mushroom-template-card
                primary: Boost all heating
                secondary: 30 min boost
                icon: mdi:fire
                icon_color: red
                fill_container: true
                layout: vertical
                tap_action:
                  action: perform-action
                  perform_action: button.press
                  target:
                    entity_id: button.wiser_boost_all_heating
              - type: custom:mushroom-template-card
                primary: Cancel overrides
                secondary: Return to schedule
                icon: mdi:close-circle
                icon_color: blue-grey
                fill_container: true
                layout: vertical
                tap_action:
                  action: perform-action
                  perform_action: button.press
                  target:
                    entity_id: button.wiser_cancel_all_heating_overrides
              - type: custom:mushroom-template-card
                primary: Heating off
                secondary: Moment
                icon: mdi:fire-off
                icon_color: grey
                fill_container: true
                layout: vertical
                tap_action:
                  action: perform-action
                  perform_action: button.press
                  target:
                    entity_id: button.wiser_moments_heating_off
              - type: custom:mushroom-template-card
                primary: Boost downstairs
                secondary: Moment
                icon: mdi:arrow-down-bold-hexagon-outline
                icon_color: orange
                fill_container: true
                layout: vertical
                tap_action:
                  action: perform-action
                  perform_action: button.press
                  target:
                    entity_id: button.wiser_moments_boost_downstairs
          - type: entities
            title: Away settings
            show_header_toggle: false
            entities:
              - switch.wiser_away_mode_affects_hot_water
              - number.wiser_away_mode_target_temperature
              - switch.wiser_daylight_saving
      - title: Hot water
        column_span: 2
        cards:
          - type: custom:mushroom-chips-card
            alignment: start
            chips:
              - type: entity
                entity: sensor.wiser_hot_water_operation_mode
                icon: mdi:water-boiler
                icon_color: blue
                content_info: state
              - type: entity
                entity: binary_sensor.wiser_hot_water
                icon: mdi:water
                icon_color: cyan
                content_info: state
              - type: entity
                entity: select.wiser_hot_water_mode
                icon: mdi:auto-mode
                icon_color: indigo
                content_info: state
          - type: grid
            columns: 3
            square: false
            cards:
              - type: custom:mushroom-template-card
                primary: Boost HW
                secondary: 30 min
                icon: mdi:water-plus
                icon_color: blue
                fill_container: true
                layout: vertical
                tap_action:
                  action: perform-action
                  perform_action: button.press
                  target:
                    entity_id: button.wiser_boost_hot_water
              - type: custom:mushroom-template-card
                primary: Toggle HW
                secondary: On/off flip
                icon: mdi:water-percent-alert
                icon_color: amber
                fill_container: true
                layout: vertical
                tap_action:
                  action: perform-action
                  perform_action: button.press
                  target:
                    entity_id: button.wiser_toggle_hot_water
              - type: custom:mushroom-template-card
                primary: Cancel HW
                secondary: Return to schedule
                icon: mdi:close-circle
                icon_color: blue-grey
                fill_container: true
                layout: vertical
                tap_action:
                  action: perform-action
                  perform_action: button.press
                  target:
                    entity_id: button.wiser_cancel_hot_water_overrides
          - type: custom:scheduler-card
            title: Hot water schedule
            include:
              - switch.wiser_hot_water
              - select.wiser_hot_water_mode
            discover_existing: true
            show_header_toggle: false
      # ===========================================================
      # Zones: mini-climate-card grid (compact — fits 8 zones on one screen)
      # ===========================================================
      - title: Zones
        column_span: 4
        cards:
          - type: grid
            columns: 4
            square: false
            cards:
              - type: custom:mini-climate-card
                entity: climate.wiser_kitchen_dining_room
                name: Kitchen / Dining
              - type: custom:mini-climate-card
                entity: climate.wiser_sitting_room
                name: Sitting Room
              - type: custom:mini-climate-card
                entity: climate.wiser_bedroom
                name: Bedroom
              - type: custom:mini-climate-card
                entity: climate.wiser_hugh_s_office
                name: Hugh's Office
              - type: custom:mini-climate-card
                entity: climate.wiser_marie_s_office
                name: Marie's Office
              - type: custom:mini-climate-card
                entity: climate.wiser_alexander_s_room
                name: Alex's Room
              - type: custom:mini-climate-card
                entity: climate.wiser_lily_s_room
                name: Lily's Room
              - type: custom:mini-climate-card
                entity: climate.wiser_attic
                name: Attic
      # ===========================================================
      # tabbed-card: Temperatures | Heating demand | Schedule
      # (previously three separate sections — now collapsed)
      # ===========================================================
      - title: Trends & schedule
        column_span: 4
        cards:
          - type: custom:tabbed-card
            tabs:
              - attributes:
                  label: Temperatures (24h)
                  icon: mdi:thermometer
                card:
                  type: custom:apexcharts-card
                  header:
                    show: true
                    title: Measured room temperatures
                    show_states: false
                  graph_span: 24h
                  span:
                    end: minute
                  yaxis:
                    - min: 12
                      max: 26
                      decimals: 1
                  apex_config:
                    chart:
                      height: 320
                    stroke:
                      width: 2
                      curve: smooth
                    legend:
                      position: bottom
                    grid:
                      borderColor: rgba(255,255,255,0.08)
                  series:
                    - entity: sensor.wiser_lts_temperature_kitchen_dining_room
                      name: Kitchen
                    - entity: sensor.wiser_lts_temperature_sitting_room
                      name: Sitting
                    - entity: sensor.wiser_lts_temperature_bedroom
                      name: Bedroom
                    - entity: sensor.wiser_lts_temperature_hugh_s_office
                      name: H-Office
                    - entity: sensor.wiser_lts_temperature_marie_s_office
                      name: M-Office
                    - entity: sensor.wiser_lts_temperature_alexander_s_room
                      name: Alex
                    - entity: sensor.wiser_lts_temperature_lily_s_room
                      name: Lily
                    - entity: sensor.wiser_lts_temperature_attic
                      name: Attic
              - attributes:
                  label: Heating demand (24h)
                  icon: mdi:fire
                card:
                  type: custom:apexcharts-card
                  header:
                    show: true
                    title: Demand per zone (%)
                    show_states: false
                  graph_span: 24h
                  span:
                    end: minute
                  yaxis:
                    - min: 0
                      max: 100
                      decimals: 0
                  apex_config:
                    chart:
                      height: 320
                      type: area
                    stroke:
                      width: 1
                      curve: smooth
                    fill:
                      type: gradient
                      gradient:
                        opacityFrom: 0.4
                        opacityTo: 0.05
                    legend:
                      position: bottom
                    grid:
                      borderColor: rgba(255,255,255,0.08)
                  series:
                    - entity: sensor.wiser_lts_heating_demand_kitchen_dining_room
                      name: Kitchen
                    - entity: sensor.wiser_lts_heating_demand_sitting_room
                      name: Sitting
                    - entity: sensor.wiser_lts_heating_demand_bedroom
                      name: Bedroom
                    - entity: sensor.wiser_lts_heating_demand_hugh_s_office
                      name: H-Office
                    - entity: sensor.wiser_lts_heating_demand_marie_s_office
                      name: M-Office
                    - entity: sensor.wiser_lts_heating_demand_alexander_s_room
                      name: Alex
                    - entity: sensor.wiser_lts_heating_demand_lily_s_room
                      name: Lily
                    - entity: sensor.wiser_lts_heating_demand_attic
                      name: Attic
              - attributes:
                  label: Schedule
                  icon: mdi:calendar-clock
                card:
                  type: custom:scheduler-card
                  title: Heating schedules
                  include:
                    - climate.wiser_kitchen_dining_room
                    - climate.wiser_sitting_room
                    - climate.wiser_bedroom
                    - climate.wiser_hugh_s_office
                    - climate.wiser_marie_s_office
                    - climate.wiser_alexander_s_room
                    - climate.wiser_lily_s_room
                    - climate.wiser_attic
                  discover_existing: true
                  show_header_toggle: false
