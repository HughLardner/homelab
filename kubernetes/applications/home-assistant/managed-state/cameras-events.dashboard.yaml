views:
  - title: Cameras & Events
    path: default_view
    type: sections
    icon: mdi:cctv
    sections:
      - title: Front Door
        cards:
          - type: heading
            heading: Front Door
            icon: mdi:door
          - type: picture-entity
            entity: camera.front_door
            name: Front Door
            camera_view: live
          - type: tile
            entity: event.front_door_chime
            name: Chime
            icon: mdi:bell-ring
          - type: tile
            entity: event.front_door_motion
            name: Motion
            icon: mdi:motion-sensor
      - title: Back Garden
        cards:
          - type: heading
            heading: Back Garden
            icon: mdi:tree
          - type: picture-entity
            entity: camera.back_garden
            name: Back Garden
            camera_view: live
          - type: tile
            entity: event.back_garden_motion
            name: Motion
            icon: mdi:motion-sensor
      - title: Side Gate
        cards:
          - type: heading
            heading: Side Gate
            icon: mdi:gate
          - type: picture-entity
            entity: camera.side_gate
            name: Side Gate
            camera_view: live
          - type: tile
            entity: event.side_gate_motion
            name: Motion
            icon: mdi:motion-sensor
      - title: Recent event log
        cards:
          - type: logbook
            title: Security events (last 24h)
            hours_to_show: 24
            entities:
              - event.front_door_chime
              - event.front_door_motion
              - event.back_garden_motion
              - event.side_gate_motion
              - binary_sensor.hall_front_door_sensor_contact
              - binary_sensor.hall_motion_sensor_occupancy
              - binary_sensor.landing_motion_sensor_occupancy
              - binary_sensor.office_motion_sensor_occupancy
      - title: Door & motion history (24h)
        cards:
          - type: history-graph
            hours_to_show: 24
            title: Internal security sensors
            entities:
              - entity: binary_sensor.hall_front_door_sensor_contact
                name: Front Door
              - entity: binary_sensor.hall_motion_sensor_occupancy
                name: Hall Motion
              - entity: binary_sensor.landing_motion_sensor_occupancy
                name: Landing Motion
              - entity: binary_sensor.office_motion_sensor_occupancy
                name: Office Motion
              - entity: binary_sensor.myggspray_wrlss_mtn_sensor_occupancy
                name: Aux motion sensor
              - entity: binary_sensor.myggbett_door_window_sensor_door
                name: Aux door/window sensor
