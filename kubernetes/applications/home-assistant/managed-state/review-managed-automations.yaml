- alias: Health — Critical Connectivity Alert
  description: Create a persistent notification and mobile alert when a critical
    automation dependency or UniFi infrastructure device goes unhealthy.
  mode: queued
  max: 10
  trigger:
    - platform: state
      entity_id:
        - binary_sensor.zigbee2mqtt_bridge_connection_state
        - sensor.wiser_cloud
        - sensor.cloud_gateway_ultra_state
        - sensor.marie_s_office_access_point_state
        - sensor.usw_lite_8_poe_state
        - sensor.u6_mesh_state
  condition:
    - condition: template
      value_template: >-
        {{
          (trigger.entity_id == 'binary_sensor.zigbee2mqtt_bridge_connection_state'
          and trigger.to_state.state != 'on')
          or
          (trigger.entity_id == 'sensor.wiser_cloud'
          and trigger.to_state.state != 'Connected')
          or
          (trigger.entity_id in [
            'sensor.cloud_gateway_ultra_state',
            'sensor.marie_s_office_access_point_state',
            'sensor.usw_lite_8_poe_state',
            'sensor.u6_mesh_state'
          ] and trigger.to_state.state != 'connected')
        }}
  action:
    - action: persistent_notification.create
      data:
        title: Critical Connectivity Issue
        message: "{{ trigger.to_state.name }} changed to {{ trigger.to_state.state }}."
        notification_id: "critical_connectivity_{{ trigger.entity_id | replace('.', '_') }}"
    - action: notify.mobile_app_hugh_mobile
      data:
        title: Homelab connectivity issue
        message: "{{ trigger.to_state.name }} changed to {{ trigger.to_state.state }}."

- alias: Health — UniFi Telemetry Alert
  description: Alert when key UniFi infrastructure telemetry stays above safe
    operating thresholds for 10 minutes.
  mode: queued
  max: 10
  trigger:
    - platform: numeric_state
      entity_id:
        - sensor.cloud_gateway_ultra_cpu_utilization
        - sensor.cloud_gateway_ultra_memory_utilization
        - sensor.marie_s_office_access_point_cpu_utilization
        - sensor.marie_s_office_access_point_memory_utilization
        - sensor.usw_lite_8_poe_cpu_utilization
        - sensor.usw_lite_8_poe_memory_utilization
        - sensor.u6_mesh_cpu_utilization
        - sensor.u6_mesh_memory_utilization
      above: 85
      for: "00:10:00"
  action:
    - action: persistent_notification.create
      data:
        title: UniFi Telemetry Alert
        message: >-
          {{ trigger.to_state.name }} has been at
          {{ trigger.to_state.state }}{{ trigger.to_state.attributes.unit_of_measurement | default('') }}
          for 10 minutes.
        notification_id: "unifi_telemetry_{{ trigger.entity_id | replace('.', '_') }}"
    - action: notify.mobile_app_hugh_mobile
      data:
        title: UniFi telemetry alert
        message: >-
          {{ trigger.to_state.name }} has been at
          {{ trigger.to_state.state }}{{ trigger.to_state.attributes.unit_of_measurement | default('') }}
          for 10 minutes.

- alias: Presence — Arrival After Dark
  description: Turn on the hall lights when Hugh or Marie arrives home after dark
    so entry lighting is ready.
  mode: restart
  trigger:
    - platform: state
      entity_id:
        - person.hugh
        - person.marie
      to: home
  condition:
    - condition: sun
      after: sunset
    - condition: state
      entity_id: light.hall
      state: off
  action:
    - action: light.turn_on
      target:
        entity_id:
          - light.hall
          - light.hall_light_door
      data:
        brightness_pct: 45
    - delay: "00:10:00"
    - condition: template
      value_template: >-
        {{ is_state('person.hugh', 'home') or is_state('person.marie', 'home') }}
    - action: light.turn_off
      target:
        entity_id:
          - light.hall
          - light.hall_light_door
