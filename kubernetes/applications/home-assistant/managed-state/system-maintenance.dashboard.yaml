views:
  - title: System
    path: default_view
    type: sections
    icon: mdi:tools
    max_columns: 4
    sections:
      # ===========================================================
      # Bubble Card pop-ups consolidated into ONE vertical-stack
      # (only one pop-up on this dashboard: printer)
      # ===========================================================
      - type: grid
        column_span: 4
        cards:
          - type: vertical-stack
            cards:
              - type: custom:bubble-card
                card_type: pop-up
                hash: "#printer"
                name: Brother DCP-L3550CDW
                icon: mdi:printer
              - type: entities
                title: Toner / drum / status
                show_header_toggle: false
                entities:
                  - sensor.dcp_l3550cdw_status
                  - sensor.dcp_l3550cdw_black_toner_remaining
                  - sensor.dcp_l3550cdw_cyan_toner_remaining
                  - sensor.dcp_l3550cdw_magenta_toner_remaining
                  - sensor.dcp_l3550cdw_yellow_toner_remaining
                  - sensor.dcp_l3550cdw_drum_remaining_life
                  - sensor.dcp_l3550cdw_duplex_unit_page_counter
                  - sensor.dcp_l3550cdw_page_counter
                  - sensor.dcp_l3550cdw_color_counter
                  - sensor.dcp_l3550cdw_b_w_counter
      - title: Health summary
        column_span: 4
        cards:
          - type: custom:mushroom-chips-card
            alignment: start
            chips:
              - type: template
                icon: mdi:package-up
                icon_color: orange
                content: >-
                  {{ states.update | selectattr('state','eq','on') | list | count }} updates
              - type: template
                icon: mdi:battery-alert-variant-outline
                icon_color: red
                content: >-
                  {{ states.sensor
                     | selectattr('attributes.device_class','defined')
                     | selectattr('attributes.device_class','eq','battery')
                     | rejectattr('state','in',['unknown','unavailable'])
                     | selectattr('state','lt','25')
                     | list | count }} low batteries
                tap_action:
                  action: navigate
                  navigation_path: /entity-health
              - type: template
                icon: mdi:help-network-outline
                icon_color: grey
                content: >-
                  {{ states
                     | selectattr('state','eq','unavailable')
                     | list | count }} unavailable
              - type: entity
                entity: sensor.backup_backup_manager_state
                icon: mdi:backup-restore
                icon_color: blue
                content_info: state
              - type: action
                icon: mdi:cloud-upload-outline
                icon_color: green
                content: Run backup
                tap_action:
                  action: perform-action
                  perform_action: backup.create_automatic
              - type: template
                icon: mdi:heart-pulse
                icon_color: pink
                content: Entity health
                tap_action:
                  action: navigate
                  navigation_path: /entity-health
      - title: Updates available
        column_span: 2
        cards:
          - type: custom:auto-entities
            card:
              type: entities
              title: Update entities
              show_header_toggle: false
            filter:
              include:
                - domain: update
                  state: "on"
            sort:
              method: friendly_name
            show_empty: true
      - title: Unavailable entities
        column_span: 2
        cards:
          - type: custom:auto-entities
            card:
              type: entities
              title: State = unavailable
              show_header_toggle: false
            filter:
              include:
                - state: unavailable
                  options:
                    secondary_info: last-changed
            sort:
              method: last_changed
            show_empty: true
      - title: Backups
        column_span: 2
        cards:
          - type: entities
            show_header_toggle: false
            entities:
              - entity: sensor.backup_backup_manager_state
                name: Manager state
              - entity: sensor.backup_last_attempted_automatic_backup
                name: Last attempted
              - entity: sensor.backup_last_successful_automatic_backup
                name: Last successful
              - entity: sensor.backup_next_scheduled_automatic_backup
                name: Next scheduled
          - type: custom:mushroom-template-card
            primary: Run backup now
            secondary: backup.create_automatic
            icon: mdi:cloud-upload-outline
            icon_color: green
            fill_container: true
            layout: vertical
            tap_action:
              action: perform-action
              perform_action: backup.create_automatic
      # ===========================================================
      # HA host — only entities that actually exist on this install
      # (HA runs as a container: no update.home_assistant_* entities)
      # ===========================================================
      - title: HA host
        column_span: 2
        cards:
          - type: entities
            show_header_toggle: false
            entities:
              - sun.sun
              - zone.home
              - entity: device_tracker.homeassistant
                name: Home Assistant host
              - entity: update.hacs_update
                name: HACS
              - entity: update.drayton_wiser_integration_for_home_assistant_update
                name: Drayton Wiser integration
              - entity: update.myenergi_update
                name: myenergi integration
              - entity: update.openid_connect_update
                name: OpenID Connect
              - entity: update.node_red_companion_update
                name: Node-RED Companion
      # ===========================================================
      # Printer tile (tap opens #printer pop-up at top of view)
      # ===========================================================
      - title: Printer
        column_span: 4
        cards:
          - type: horizontal-stack
            cards:
              - type: custom:mushroom-template-card
                primary: DCP-L3550CDW
                secondary: "{{ states('sensor.dcp_l3550cdw_status') }}"
                icon: mdi:printer
                icon_color: blue
                fill_container: true
                layout: vertical
                tap_action:
                  action: navigate
                  navigation_path: "#printer"
      # Zigbee / Wiser health and battery detail moved to entity-health.
