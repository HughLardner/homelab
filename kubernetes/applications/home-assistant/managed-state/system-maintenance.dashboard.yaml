views:
  - title: System
    path: default_view
    type: sections
    icon: mdi:tools
    max_columns: 4
    sections:
      - title: Health summary
        column_span: 4
        cards:
          - type: custom:mushroom-chips-card
            alignment: start
            chips:
              - type: template
                icon: mdi:package-up
                icon_color: orange
                content: >-
                  {{ states.update | selectattr('state','eq','on') | list | count }} updates
              - type: template
                icon: mdi:battery-alert-variant-outline
                icon_color: red
                content: >-
                  {{ states.sensor
                  | selectattr('attributes.device_class','defined')
                  | selectattr('attributes.device_class','eq','battery')
                  | rejectattr('state','in',['unknown','unavailable'])
                  | selectattr('state','lt','25')
                  | list | count }} low batteries
              - type: template
                icon: mdi:help-network-outline
                icon_color: grey
                content: >-
                  {{ states
                  | selectattr('state','eq','unavailable')
                  | list | count }} unavailable
              - type: template
                icon: mdi:zigbee
                icon_color: purple
                content: >-
                  {{ states.binary_sensor
                  | selectattr('entity_id','search','signal|interview')
                  | rejectattr('state','in',['unknown','unavailable','off'])
                  | list | count }} z-issues
              - type: entity
                entity: sensor.backup_backup_manager_state
                icon: mdi:backup-restore
                icon_color: blue
                content_info: state
              - type: action
                icon: mdi:cloud-upload-outline
                icon_color: green
                content: Run backup
                tap_action:
                  action: perform-action
                  perform_action: backup.create_automatic
      - title: Updates available
        column_span: 2
        cards:
          - type: custom:auto-entities
            card:
              type: entities
              title: Update entities
              show_header_toggle: false
            filter:
              include:
                - domain: update
                  state: "on"
            sort:
              method: friendly_name
            show_empty: true
      - title: Batteries low
        column_span: 2
        cards:
          - type: custom:auto-entities
            card:
              type: entities
              title: < 25%
              show_header_toggle: false
            filter:
              include:
                - domain: sensor
                  attributes:
                    device_class: battery
                  state: "< 25"
              exclude:
                - state: unknown
                - state: unavailable
            sort:
              method: state
              numeric: true
            show_empty: true
      - title: Unavailable entities
        column_span: 2
        cards:
          - type: custom:auto-entities
            card:
              type: entities
              title: State = unavailable
              show_header_toggle: false
            filter:
              include:
                - state: unavailable
                  options:
                    secondary_info: last-changed
            sort:
              method: last_changed
            show_empty: true
      - title: Zigbee / Wiser health
        column_span: 2
        cards:
          - type: custom:auto-entities
            card:
              type: entities
              title: Poor signal / restart needed
              show_header_toggle: false
            filter:
              include:
                - entity_id: "/^sensor\\.wiser_itrv_.*_signal$/"
                  state: Poor
                - entity_id: "/^sensor\\.wiser_itrv_.*_signal$/"
                  state: NoSignal
                - entity_id: "/^sensor\\.wiser_roomstat_.*_signal$/"
                  state: Poor
                - entity_id: "/^binary_sensor\\.slzb_mr3u_internet$/"
                  state: "off"
                - entity_id: "/^binary_sensor\\.zigbee2mqtt_bridge_connection_state$/"
                  state: "off"
            show_empty: true
      - title: Backups
        column_span: 2
        cards:
          - type: entities
            show_header_toggle: false
            entities:
              - entity: sensor.backup_backup_manager_state
                name: Manager state
              - entity: sensor.backup_last_attempted_automatic_backup
                name: Last attempted
              - entity: sensor.backup_last_successful_automatic_backup
                name: Last successful
              - entity: sensor.backup_next_scheduled_automatic_backup
                name: Next scheduled
          - type: custom:mushroom-template-card
            primary: Run backup now
            secondary: backup.create_automatic
            icon: mdi:cloud-upload-outline
            icon_color: green
            fill_container: true
            tap_action:
              action: perform-action
              perform_action: backup.create_automatic
      - title: HA host
        column_span: 2
        cards:
          - type: entities
            show_header_toggle: false
            entities:
              - sun.sun
              - zone.home
              - update.home_assistant_core_update
              - update.home_assistant_supervisor_update
              - update.home_assistant_operating_system_update
              - update.hacs_update
      - title: Printer
        column_span: 4
        cards:
          - type: horizontal-stack
            cards:
              - type: custom:mushroom-template-card
                primary: DCP-L3550CDW
                secondary: "{{ states('sensor.dcp_l3550cdw_status') }}"
                icon: mdi:printer
                icon_color: blue
                fill_container: true
                tap_action:
                  action: navigate
                  navigation_path: "#printer"
      - type: grid
        column_span: 4
        cards:
          - type: custom:bubble-card
            card_type: pop-up
            hash: "#printer"
            name: Brother DCP-L3550CDW
            icon: mdi:printer
          - type: entities
            title: Toner / drum / status
            show_header_toggle: false
            entities:
              - sensor.dcp_l3550cdw_status
              - sensor.dcp_l3550cdw_black_toner_remaining
              - sensor.dcp_l3550cdw_cyan_toner_remaining
              - sensor.dcp_l3550cdw_magenta_toner_remaining
              - sensor.dcp_l3550cdw_yellow_toner_remaining
              - sensor.dcp_l3550cdw_drum_remaining_life
              - sensor.dcp_l3550cdw_duplex_unit_page_counter
              - sensor.dcp_l3550cdw_page_counter
              - sensor.dcp_l3550cdw_color_counter
              - sensor.dcp_l3550cdw_b_w_counter
