views:
  - title: Scenes & Automations
    path: default_view
    type: sections
    icon: mdi:script-text-play
    sections:
      - title: Scenes
        cards:
          - type: heading
            heading: Scenes
            icon: mdi:palette
          - show_name: true
            show_icon: true
            type: button
            name: Bedroom — Bedtime
            icon: mdi:moon-waning-crescent
            tap_action:
              action: call-service
              service: scene.turn_on
              target:
                entity_id: scene.bedroom_lamps_bed_time
          - show_name: true
            show_icon: true
            type: button
            name: Office — Red
            icon: mdi:palette
            tap_action:
              action: call-service
              service: scene.turn_on
              target:
                entity_id: scene.office_1_red
          - show_name: true
            show_icon: true
            type: button
            name: Office — Red v2
            icon: mdi:palette-outline
            tap_action:
              action: call-service
              service: scene.turn_on
              target:
                entity_id: scene.office_2_red2
          - show_name: true
            show_icon: true
            type: button
            name: Office — Test
            icon: mdi:test-tube
            tap_action:
              action: call-service
              service: scene.turn_on
              target:
                entity_id: scene.office_0_test
      - title: Motion-driven automations
        cards:
          - type: heading
            heading: Motion lighting
            icon: mdi:motion-sensor
          - type: tile
            entity: automation.office_lights_on_motion
            name: Office — On
          - type: tile
            entity: automation.office_lights_off_no_motion_5_min
            name: Office — Off (5 min)
          - type: tile
            entity: automation.hall_lights_on_motion_night
            name: Hall — On (night)
          - type: tile
            entity: automation.hall_lights_off_no_motion_2_min
            name: Hall — Off (2 min)
          - type: tile
            entity: automation.landing_lights_on_motion
            name: Landing — On
          - type: tile
            entity: automation.landing_lights_off_no_motion
            name: Landing — Off
      - title: Door & presence
        cards:
          - type: heading
            heading: Door & presence
            icon: mdi:door
          - type: tile
            entity: automation.hall_front_door_opened_turn_on_light
            name: Front Door — Light On
          - type: tile
            entity: automation.hall_front_door_opened_night_alert
            name: Front Door — Night Alert
      - title: Time-based
        cards:
          - type: heading
            heading: Time-based
            icon: mdi:calendar-clock
          - type: tile
            entity: automation.morning_kitchen_light_on
            name: Morning — Kitchen light
          - type: tile
            entity: automation.evening_dim_active_lights_at_sunset
            name: Evening — Dim at sunset
          - type: tile
            entity: automation.bedtime
            name: Bedtime
          - type: tile
            entity: automation.bedtime_scene_wind_down
            name: Bedtime — Scene & wind down
      - title: Room buttons & helpers
        cards:
          - type: heading
            heading: Room controls
            icon: mdi:home-automation
          - type: tile
            entity: automation.kitchen_on
            name: Kitchen On
          - type: tile
            entity: automation.kitchen_off
            name: Kitchen Off
          - type: tile
            entity: automation.brighten_kitchen
            name: Brighten Kitchen
          - type: tile
            entity: automation.kitchen_dim
            name: Kitchen Dim
          - type: tile
            entity: automation.office_on
            name: Office On
          - type: tile
            entity: automation.office_off
            name: Office Off
          - type: tile
            entity: automation.sitting_room_off
            name: Sitting Room Off
          - type: tile
            entity: automation.bedroom_lamps_on
            name: Bedroom lamps on
          - type: tile
            entity: automation.bedroom_lights_off
            name: Bedroom lights off
          - type: tile
            entity: automation.clothes_rail_timer
            name: Clothes rail timer
      - title: Bulk controls
        cards:
          - type: heading
            heading: Bulk actions
            icon: mdi:toggle-switch-variant
          - show_name: true
            show_icon: true
            type: button
            name: Enable all automations
            icon: mdi:toggle-switch
            tap_action:
              action: call-service
              service: automation.turn_on
              target:
                entity_id: all
          - show_name: true
            show_icon: true
            type: button
            name: Disable all automations
            icon: mdi:toggle-switch-off
            tap_action:
              action: call-service
              service: automation.turn_off
              target:
                entity_id: all
          - show_name: true
            show_icon: true
            type: button
            name: Reload automations
            icon: mdi:reload
            tap_action:
              action: call-service
              service: automation.reload
