views:
  - title: Home
    path: default_view
    type: sections
    icon: mdi:home
    max_columns: 4
    sections:
      # ===========================================================
      # Bubble Card pop-ups MUST all live inside one vertical-stack
      # so Bubble Card registers them as overlays, not inline cards.
      # (v1 bug: one pop-up per section rendered them inline.)
      # ===========================================================
      - type: grid
        column_span: 4
        cards:
          - type: vertical-stack
            cards:
              - type: custom:bubble-card
                card_type: pop-up
                hash: "#scenes"
                name: Scenes
                icon: mdi:palette
                bg_color: var(--primary-background-color)
              - type: custom:mushroom-chips-card
                chips:
                  - type: action
                    icon: mdi:moon-waning-crescent
                    icon_color: indigo
                    content: Bedroom bedtime
                    tap_action:
                      action: perform-action
                      perform_action: scene.turn_on
                      target:
                        entity_id: scene.bedroom_lamps_bed_time
                  - type: action
                    icon: mdi:palette
                    icon_color: red
                    content: Office red
                    tap_action:
                      action: perform-action
                      perform_action: scene.turn_on
                      target:
                        entity_id: scene.office_1_red
                  - type: action
                    icon: mdi:palette-outline
                    icon_color: deep-orange
                    content: Office red v2
                    tap_action:
                      action: perform-action
                      perform_action: scene.turn_on
                      target:
                        entity_id: scene.office_2_red2
                  - type: action
                    icon: mdi:test-tube
                    icon_color: cyan
                    content: Office test
                    tap_action:
                      action: perform-action
                      perform_action: scene.turn_on
                      target:
                        entity_id: scene.office_0_test
              - type: custom:bubble-card
                card_type: pop-up
                hash: "#automations"
                name: Automations
                icon: mdi:robot
                bg_color: var(--primary-background-color)
              - type: custom:auto-entities
                card:
                  type: entities
                  show_header_toggle: false
                  title: All automations
                card_param: entities
                filter:
                  include:
                    - domain: automation
                sort:
                  method: friendly_name
              - type: custom:bubble-card
                card_type: pop-up
                hash: "#people"
                name: Presence detail
                icon: mdi:account-multiple
                bg_color: var(--primary-background-color)
              - type: entities
                title: People, phones, devices
                entities:
                  - person.admin
                  - person.hugh
                  - person.marie
                  - device_tracker.hugh_mobile
                  - device_tracker.hugh_tablet
                  - device_tracker.work_phone
                  - sensor.hugh_mobile_battery_level
                  - sensor.hugh_mobile_battery_state
                  - sensor.hugh_tablet_battery_level
                  - sensor.work_phone_battery_level
      # ===========================================================
      # Hero row: summary chips (navigation + status at a glance)
      # ===========================================================
      - type: grid
        column_span: 4
        cards:
          - type: custom:mushroom-chips-card
            alignment: start
            chips:
              - type: template
                icon: mdi:account-multiple
                icon_color: blue
                content: >-
                  {{ (expand('zone.home')
                      | selectattr('domain','eq','person')
                      | rejectattr('state','in',['unknown','unavailable','away','not_home'])
                      | list | length) }} home
                tap_action:
                  action: navigate
                  navigation_path: "#people"
              - type: template
                icon: mdi:battery-alert-variant-outline
                icon_color: red
                content: >-
                  {{ states.sensor
                     | selectattr('attributes.device_class','defined')
                     | selectattr('attributes.device_class','eq','battery')
                     | rejectattr('state','in',['unknown','unavailable'])
                     | selectattr('state','lt','25')
                     | list | count }} low
                tap_action:
                  action: navigate
                  navigation_path: /entity-health
              - type: template
                icon: mdi:package-up
                icon_color: orange
                content: >-
                  {{ states.update | selectattr('state','eq','on') | list | count }} updates
                tap_action:
                  action: navigate
                  navigation_path: /system-maintenance
              - type: template
                icon: mdi:ev-station
                icon_color: green
                content: >-
                  {{ states('sensor.myenergi_zappi_25608214_status') }}
                tap_action:
                  action: navigate
                  navigation_path: /energy-ev
              - type: template
                icon: mdi:script-text-play
                icon_color: purple
                content: Scenes
                tap_action:
                  action: navigate
                  navigation_path: "#scenes"
              - type: template
                icon: mdi:robot
                icon_color: teal
                content: Automations
                tap_action:
                  action: navigate
                  navigation_path: "#automations"
      # ===========================================================
      # Weather (simple-weather-card) + Climate chips
      # ===========================================================
      - title: Weather & climate
        column_span: 2
        cards:
          - type: custom:simple-weather-card
            entity: weather.home
            backdrop:
              day: "#1e3c72"
              night: "#0f1e3c"
          - type: custom:mushroom-chips-card
            alignment: start
            chips:
              - type: entity
                entity: sensor.wiser_heating_operation_mode
                icon: mdi:home-thermometer
                icon_color: red
                content_info: state
              - type: entity
                entity: sensor.wiser_hot_water_operation_mode
                icon: mdi:water-boiler
                icon_color: blue
                content_info: state
              - type: template
                icon: mdi:fire
                icon_color: orange
                content: >-
                  {{ states.climate
                     | selectattr('attributes.hvac_action','eq','heating')
                     | list | count }} heating
                tap_action:
                  action: navigate
                  navigation_path: /heating-zones
              - type: entity
                entity: switch.wiser_away_mode
                icon: mdi:airplane
                icon_color: deep-orange
                content_info: state
              - type: entity
                entity: switch.wiser_eco_mode
                icon: mdi:leaf
                icon_color: green
                content_info: state
      # ===========================================================
      # People (person.admin always shown; hugh/marie gated on availability)
      # ===========================================================
      - title: People
        column_span: 2
        cards:
          - type: custom:stack-in-card
            cards:
              - type: conditional
                conditions:
                  - entity: person.hugh
                    state_not: unknown
                  - entity: person.hugh
                    state_not: unavailable
                card:
                  type: custom:mushroom-person-card
                  entity: person.hugh
                  primary_info: name
                  secondary_info: state
                  icon_type: entity-picture
              - type: conditional
                conditions:
                  - entity: person.marie
                    state_not: unknown
                  - entity: person.marie
                    state_not: unavailable
                card:
                  type: custom:mushroom-person-card
                  entity: person.marie
                  primary_info: name
                  secondary_info: state
                  icon_type: entity-picture
              - type: custom:mushroom-person-card
                entity: person.admin
                primary_info: name
                secondary_info: state
          - type: custom:mushroom-chips-card
            alignment: center
            chips:
              - type: entity
                entity: sensor.hugh_mobile_battery_level
                icon: mdi:cellphone
                content_info: state
              - type: conditional
                conditions:
                  - entity: sensor.work_phone_battery_level
                    state_not: unknown
                  - entity: sensor.work_phone_battery_level
                    state_not: unavailable
                chip:
                  type: entity
                  entity: sensor.work_phone_battery_level
                  icon: mdi:cellphone-wireless
                  content_info: state
              - type: entity
                entity: sensor.hugh_tablet_battery_level
                icon: mdi:tablet
                content_info: state
      # ===========================================================
      # Quick actions
      # ===========================================================
      - title: Quick actions
        column_span: 2
        cards:
          - type: custom:mushroom-chips-card
            alignment: center
            chips:
              - type: action
                icon: mdi:weather-night
                icon_color: indigo
                content: Bedtime
                tap_action:
                  action: perform-action
                  perform_action: scene.turn_on
                  target:
                    entity_id: scene.bedroom_lamps_bed_time
              - type: action
                icon: mdi:lightbulb-off-outline
                icon_color: grey
                content: Lights off
                tap_action:
                  action: perform-action
                  perform_action: light.turn_off
                  target:
                    entity_id: all
              - type: action
                icon: mdi:kettle-steam
                icon_color: deep-orange
                content: Brighten kitchen
                tap_action:
                  action: perform-action
                  perform_action: automation.trigger
                  target:
                    entity_id: automation.brighten_kitchen
              - type: action
                icon: mdi:flash
                icon_color: amber
                content: Boost heat
                tap_action:
                  action: perform-action
                  perform_action: button.press
                  target:
                    entity_id: button.wiser_boost_all_heating
              - type: action
                icon: mdi:fire-off
                icon_color: blue-grey
                content: Heat off
                tap_action:
                  action: perform-action
                  perform_action: button.press
                  target:
                    entity_id: button.wiser_moments_heating_off
      # ===========================================================
      # Room temperatures graph (home-overview keeps the at-a-glance
      # 24h trend; heating-zones holds full detail & demand).
      # ===========================================================
      - title: Room temperatures (24h)
        column_span: 2
        cards:
          - type: custom:mini-graph-card
            name: Measured room temperatures
            hours_to_show: 24
            points_per_hour: 2
            line_width: 2
            hour24: true
            entities:
              - entity: sensor.wiser_lts_temperature_kitchen_dining_room
                name: Kitchen
              - entity: sensor.wiser_lts_temperature_sitting_room
                name: Sitting
              - entity: sensor.wiser_lts_temperature_bedroom
                name: Bedroom
              - entity: sensor.wiser_lts_temperature_hugh_s_office
                name: H-Office
              - entity: sensor.wiser_lts_temperature_marie_s_office
                name: M-Office
              - entity: sensor.wiser_lts_temperature_alexander_s_room
                name: Alex
              - entity: sensor.wiser_lts_temperature_lily_s_room
                name: Lily
              - entity: sensor.wiser_lts_temperature_attic
                name: Attic
            show:
              labels: true
              legend: true
              icon: false
              name: true
              state: false
      # ===========================================================
      # Energy flow hero — power-flow-card-plus replaces v1 mini-graph.
      # ===========================================================
      - title: Energy flow
        column_span: 2
        cards:
          - type: custom:power-flow-card-plus
            title: Live power flow
            clickable_entities: true
            display_zero_lines:
              mode: show
              transparency: 50
            use_new_flow_rate_model: true
            grid:
              entity:
                consumption: sensor.myenergi_zappi_power_import
                production: sensor.myenergi_zappi_power_export
              name: Grid
            home:
              entity: sensor.myenergi_zappi_home_consumption
              override_state: false
            individual:
              - entity: sensor.myenergi_zappi_power_charging
                name: EV Charger
                icon: mdi:ev-station
                color:
                  r: 255
                  g: 167
                  b: 38
      - title: Energy at a glance
        column_span: 2
        cards:
          - type: custom:mushroom-chips-card
            alignment: start
            chips:
              - type: entity
                entity: sensor.myenergi_zappi_25608214_status
                icon: mdi:ev-station
                icon_color: green
                content_info: state
              - type: entity
                entity: sensor.myenergi_zappi_25608214_plug_status
                icon: mdi:ev-plug-type2
                icon_color: teal
                content_info: state
              - type: entity
                entity: select.myenergi_zappi_25608214_charge_mode
                icon: mdi:speedometer
                icon_color: amber
                content_info: state
                tap_action:
                  action: navigate
                  navigation_path: /energy-ev
              - type: entity
                entity: sensor.myenergi_zappi_home_consumption
                icon: mdi:home-lightning-bolt
                icon_color: orange
                content_info: state
              - type: entity
                entity: sensor.myenergi_zappi_grid_import_today
                icon: mdi:transmission-tower-import
                icon_color: red
                content_info: state
              - type: entity
                entity: sensor.myenergi_zappi_grid_export_today
                icon: mdi:transmission-tower-export
                icon_color: green
                content_info: state
      # ===========================================================
      # Media
      # ===========================================================
      - title: Media
        column_span: 2
        cards:
          - type: custom:mushroom-media-player-card
            entity: media_player.living_room
            use_media_info: true
            show_volume_level: true
            media_controls:
              - on_off
              - play_pause_stop
              - previous
              - next
            volume_controls:
              - volume_mute
              - volume_set
              - volume_buttons
            fill_container: true
          - type: custom:mushroom-media-player-card
            entity: media_player.kitchen
            use_media_info: true
            show_volume_level: true
            media_controls:
              - on_off
              - play_pause_stop
              - previous
              - next
            volume_controls:
              - volume_mute
              - volume_set
              - volume_buttons
            fill_container: true
      # ===========================================================
      # Recent activity — logbook-card (HACS) replaces stock logbook
      # ===========================================================
      - title: Recent activity
        column_span: 4
        cards:
          - type: custom:logbook-card
            title: Last 6 hours
            hours_to_show: 6
            collapse: 8
            entities:
              - entity: event.front_door_motion
              - entity: event.front_door_chime
              - entity: event.back_garden_motion
              - entity: event.side_gate_motion
              - entity: binary_sensor.hall_front_door_sensor_contact
              - entity: binary_sensor.hall_motion_sensor_occupancy
              - entity: binary_sensor.landing_motion_sensor_occupancy
              - entity: binary_sensor.office_motion_sensor_occupancy
              - entity: person.hugh
              - entity: person.marie
            show:
              state: true
              duration: true
              start_date: true
              end_date: false
              icon: true
              separator: true
