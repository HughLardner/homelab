views:
  - title: Energy & EV
    path: default_view
    type: sections
    icon: mdi:ev-station
    max_columns: 4
    sections:
      # ===========================================================
      # Hero: power-flow-card-plus replaces v1 Live power chart
      # ===========================================================
      - title: Live power flow
        column_span: 4
        cards:
          - type: custom:power-flow-card-plus
            title: Grid • Home • EV
            clickable_entities: true
            display_zero_lines:
              mode: show
              transparency: 50
            use_new_flow_rate_model: true
            grid:
              entity:
                consumption: sensor.myenergi_zappi_power_import
                production: sensor.myenergi_zappi_power_export
              name: Grid
            home:
              entity: sensor.myenergi_zappi_home_consumption
              override_state: false
            individual:
              - entity: sensor.myenergi_zappi_power_charging
                name: EV Charger
                icon: mdi:ev-station
                color:
                  r: 66
                  g: 165
                  b: 245
              - entity: sensor.myenergi_zappi_power_generation
                name: Generation
                icon: mdi:solar-power
                color:
                  r: 38
                  g: 166
                  b: 154
      - title: At a glance
        column_span: 4
        cards:
          - type: custom:mushroom-chips-card
            alignment: start
            chips:
              - type: entity
                entity: sensor.myenergi_zappi_25608214_status
                icon: mdi:ev-station
                icon_color: green
                content_info: state
              - type: entity
                entity: sensor.myenergi_zappi_25608214_plug_status
                icon: mdi:ev-plug-type2
                icon_color: teal
                content_info: state
              - type: entity
                entity: select.myenergi_zappi_25608214_charge_mode
                icon: mdi:speedometer
                icon_color: amber
                content_info: state
              - type: entity
                entity: sensor.myenergi_zappi_25608214_charge_added_session
                icon: mdi:battery-charging-high
                icon_color: green
                content_info: state
              - type: entity
                entity: sensor.myenergi_zappi_home_consumption
                icon: mdi:home-lightning-bolt
                icon_color: orange
                content_info: state
              - type: entity
                entity: sensor.myenergi_zappi_voltage_grid
                icon: mdi:flash
                icon_color: blue
                content_info: state
              - type: entity
                entity: sensor.myenergi_zappi_frequency_grid
                icon: mdi:sine-wave
                icon_color: blue-grey
                content_info: state
      # ===========================================================
      # Charge mode quick switch (mushroom chips)
      # ===========================================================
      - title: Charge mode
        column_span: 2
        cards:
          - type: custom:mushroom-chips-card
            alignment: center
            chips:
              - type: action
                icon: mdi:flash
                icon_color: red
                content: Fast
                tap_action:
                  action: perform-action
                  perform_action: select.select_option
                  target:
                    entity_id: select.myenergi_zappi_25608214_charge_mode
                  data:
                    option: Fast
              - type: action
                icon: mdi:leaf
                icon_color: green
                content: Eco
                tap_action:
                  action: perform-action
                  perform_action: select.select_option
                  target:
                    entity_id: select.myenergi_zappi_25608214_charge_mode
                  data:
                    option: Eco
              - type: action
                icon: mdi:leaf-circle
                icon_color: teal
                content: Eco+
                tap_action:
                  action: perform-action
                  perform_action: select.select_option
                  target:
                    entity_id: select.myenergi_zappi_25608214_charge_mode
                  data:
                    option: Eco+
              - type: action
                icon: mdi:pause-circle
                icon_color: grey
                content: Stop
                tap_action:
                  action: perform-action
                  perform_action: select.select_option
                  target:
                    entity_id: select.myenergi_zappi_25608214_charge_mode
                  data:
                    option: Stopped
          - type: custom:mushroom-template-card
            primary: Current mode
            secondary: "{{ states('select.myenergi_zappi_25608214_charge_mode') }}"
            icon: mdi:ev-station
            icon_color: >-
              {% set m = states('select.myenergi_zappi_25608214_charge_mode') %}
              {% if m == 'Fast' %}red
              {% elif m == 'Eco' %}green
              {% elif m == 'Eco+' %}teal
              {% else %}grey{% endif %}
            fill_container: true
      # ===========================================================
      # tabbed-card: Limits | Locks | Session (consolidates v1
      # "Charge controls" sprawling entities list into tabs)
      # ===========================================================
      - title: Charge settings
        column_span: 2
        cards:
          - type: custom:tabbed-card
            tabs:
              - attributes:
                  label: Limits
                  icon: mdi:speedometer
                card:
                  type: entities
                  show_header_toggle: false
                  entities:
                    - entity: number.myenergi_zappi_25608214_minimum_green_level
                      name: Minimum green (%)
                    - entity: number.myenergi_zappi_25608214_device_priority
                      name: Device priority
                    - entity: select.myenergi_zappi_25608214_phase_setting
                      name: Phase setting
              - attributes:
                  label: Locks
                  icon: mdi:lock
                card:
                  type: entities
                  show_header_toggle: false
                  entities:
                    - entity: binary_sensor.myenergi_zappi_25608214_locked
                      name: Locked
                    - entity: binary_sensor.myenergi_zappi_25608214_charge_when_locked
                      name: Charge when locked
                    - entity: binary_sensor.myenergi_zappi_25608214_lock_when_plugged_in
                      name: Lock when plugged in
                    - entity: binary_sensor.myenergi_zappi_25608214_lock_when_unplugged
                      name: Lock when unplugged
              - attributes:
                  label: Session
                  icon: mdi:car-electric
                card:
                  type: entities
                  show_header_toggle: false
                  entities:
                    - entity: sensor.myenergi_zappi_25608214_charge_added_session
                      name: Session charge added
                    - entity: sensor.myenergi_zappi_25608214_energy_used_today
                      name: Charger energy today
                    - entity: sensor.myenergi_zappi_25608214_green_energy_today
                      name: Charger green today
                    - entity: sensor.myenergi_zappi_25608214_pwm
                      name: PWM
      # ===========================================================
      # Today totals + 48h trends
      # ===========================================================
      - title: Today totals (kWh)
        column_span: 2
        cards:
          - type: grid
            columns: 2
            square: false
            cards:
              - type: tile
                entity: sensor.myenergi_zappi_grid_import_today
                name: Grid import
                color: red
              - type: tile
                entity: sensor.myenergi_zappi_grid_export_today
                name: Grid export
                color: green
              - type: tile
                entity: sensor.myenergi_zappi_green_energy_today
                name: Zappi green
                color: teal
              - type: tile
                entity: sensor.myenergi_zappi_generated_today
                name: Generated
                color: amber
              - type: tile
                entity: sensor.myenergi_zappi_25608214_energy_used_today
                name: Charger energy
                color: blue
              - type: tile
                entity: sensor.myenergi_zappi_25608214_green_energy_today
                name: Charger green
                color: light-green
      - title: Daily totals (48h)
        column_span: 2
        cards:
          - type: custom:apexcharts-card
            header:
              show: true
              title: Import / export / charger
              show_states: false
            graph_span: 48h
            span:
              end: minute
            apex_config:
              chart:
                height: 320
              stroke:
                width: 2
              legend:
                position: bottom
              grid:
                borderColor: rgba(255,255,255,0.08)
            series:
              - entity: sensor.myenergi_zappi_grid_import_today
                name: Grid import today
                color: "#ef5350"
                curve: stepline
              - entity: sensor.myenergi_zappi_grid_export_today
                name: Grid export today
                color: "#66bb6a"
                curve: stepline
              - entity: sensor.myenergi_zappi_25608214_energy_used_today
                name: Charger energy used
                color: "#42a5f5"
                curve: stepline
      # Harvi / CTs and Hardware moved to entity-health dashboard.
