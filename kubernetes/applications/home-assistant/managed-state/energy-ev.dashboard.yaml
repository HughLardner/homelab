views:
  - title: Energy & EV
    path: default_view
    type: sections
    icon: mdi:ev-station
    sections:
      - title: Zappi — live
        cards:
          - type: heading
            heading: Zappi status
            icon: mdi:ev-plug-type2
          - type: tile
            entity: sensor.myenergi_zappi_25608214_status
            name: Status
          - type: tile
            entity: sensor.myenergi_zappi_25608214_plug_status
            name: Plug
          - type: tile
            entity: sensor.myenergi_zappi_25608214_pwm
            name: PWM
          - type: tile
            entity: sensor.myenergi_zappi_25608214_charge_added_session
            name: Charge added this session
          - type: tile
            entity: sensor.myenergi_zappi_power_charging
            name: Power charging
            icon: mdi:flash
          - type: tile
            entity: sensor.myenergi_zappi_home_consumption
            name: Home consumption
          - type: tile
            entity: sensor.myenergi_zappi_power_grid
            name: Power grid
          - type: tile
            entity: sensor.myenergi_zappi_power_import
            name: Power import
          - type: tile
            entity: sensor.myenergi_zappi_power_export
            name: Power export
          - type: tile
            entity: sensor.myenergi_zappi_power_generation
            name: Power generation
          - type: tile
            entity: sensor.myenergi_zappi_voltage_grid
            name: Voltage
          - type: tile
            entity: sensor.myenergi_zappi_frequency_grid
            name: Frequency
      - title: Zappi — controls
        cards:
          - type: heading
            heading: Charge controls
            icon: mdi:cog
          - type: tile
            entity: select.myenergi_zappi_25608214_charge_mode
            name: Charge Mode
          - type: tile
            entity: select.myenergi_zappi_25608214_phase_setting
            name: Phase setting
          - type: tile
            entity: number.myenergi_zappi_25608214_minimum_green_level
            name: Min green level
          - type: tile
            entity: number.myenergi_zappi_25608214_device_priority
            name: Device priority
          - type: tile
            entity: binary_sensor.myenergi_zappi_25608214_locked
            name: Locked
          - type: tile
            entity: binary_sensor.myenergi_zappi_25608214_charge_when_locked
            name: Charge when locked
          - type: tile
            entity: binary_sensor.myenergi_zappi_25608214_lock_when_plugged_in
            name: Lock when plugged in
          - type: tile
            entity: binary_sensor.myenergi_zappi_25608214_lock_when_unplugged
            name: Lock when unplugged
          - type: tile
            entity: sensor.myenergi_zappi_25608214_number_of_phases
            name: Phases
      - title: Today totals
        cards:
          - type: heading
            heading: Today (kWh)
            icon: mdi:counter
          - type: tile
            entity: sensor.myenergi_zappi_grid_import_today
            name: Grid import
          - type: tile
            entity: sensor.myenergi_zappi_grid_export_today
            name: Grid export
          - type: tile
            entity: sensor.myenergi_zappi_green_energy_today
            name: Zappi green
          - type: tile
            entity: sensor.myenergi_zappi_generated_today
            name: Generated
          - type: tile
            entity: sensor.myenergi_zappi_25608214_energy_used_today
            name: Charger energy used
          - type: tile
            entity: sensor.myenergi_zappi_25608214_green_energy_today
            name: Charger green energy
          - type: tile
            entity: sensor.myenergi_zappi_25608214_ct_internal_load_today
            name: Internal load CT
          - type: tile
            entity: sensor.myenergi_zappi_25608214_ct_grid_today
            name: Grid CT
      - title: History (24h)
        cards:
          - type: history-graph
            hours_to_show: 24
            title: Live power flows
            entities:
              - entity: sensor.myenergi_zappi_home_consumption
                name: Home consumption
              - entity: sensor.myenergi_zappi_power_import
                name: Import
              - entity: sensor.myenergi_zappi_power_export
                name: Export
              - entity: sensor.myenergi_zappi_power_charging
                name: Charging
              - entity: sensor.myenergi_zappi_power_generation
                name: Generation
          - type: history-graph
            hours_to_show: 48
            title: Daily totals (48h)
            entities:
              - entity: sensor.myenergi_zappi_grid_import_today
                name: Grid import today
              - entity: sensor.myenergi_zappi_grid_export_today
                name: Grid export today
              - entity: sensor.myenergi_zappi_25608214_energy_used_today
                name: Charger energy used
      - title: Harvi / CTs
        cards:
          - type: heading
            heading: Harvi CTs
            icon: mdi:transmission-tower
          - type: tile
            entity: sensor.myenergi_harvi_2239208_power_ct_grid
            name: Power CT grid
          - type: tile
            entity: sensor.myenergi_harvi_2239208_power_ct_grid_inverted
            name: Power CT grid (inverted)
          - type: tile
            entity: sensor.myenergi_harvi_2239208_grid_ct1
            name: Grid CT1
          - type: tile
            entity: sensor.myenergi_harvi_2239208_none_ct2
            name: CT2
          - type: tile
            entity: sensor.myenergi_harvi_2239208_none_ct3
            name: CT3
      - title: Hardware
        cards:
          - type: heading
            heading: Firmware & serials
            icon: mdi:chip
          - type: tile
            entity: sensor.myenergi_zappi_hub_firmware
            name: Hub firmware
          - type: tile
            entity: sensor.myenergi_zappi_25608214_firmware
            name: Zappi firmware
          - type: tile
            entity: sensor.myenergi_harvi_2239208_firmware
            name: Harvi firmware
          - type: tile
            entity: sensor.myenergi_zappi_hub_serial_number
            name: Hub serial
          - type: tile
            entity: sensor.myenergi_zappi_25608214_serial_number
            name: Zappi serial
          - type: tile
            entity: sensor.myenergi_harvi_2239208_serial_number
            name: Harvi serial
          - type: tile
            entity: update.myenergi_update
            name: myenergi integration update
          - type: tile
            entity: binary_sensor.myenergi_zappi_25608214_update_available
            name: Zappi update available
