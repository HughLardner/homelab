---
# ArgoCD Application for home-assistant
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: home-assistant
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
  annotations:
    argocd.argoproj.io/sync-wave: "6"
spec:
  project: default

  sources:
    # 1. Application chart
    - repoURL: https://github.com/HughLardner/homelab.git
      targetRevision: HEAD
      path: kubernetes/applications/home-assistant
      helm:
        releaseName: home-assistant
        valueFiles:
          - values.yaml
        skipCrds: false

    # 2. Sealed secrets
    - repoURL: https://github.com/HughLardner/homelab.git
      targetRevision: HEAD
      path: kubernetes/applications/home-assistant/secrets
      directory:
        recurse: false
        include: "*.yaml"

  destination:
    server: https://kubernetes.default.svc
    namespace: home-assistant

  # ServerSideDiff delegates diff computation to the k8s API server, which
  # naturally handles all admission-defaulted fields (volumeMode, updateStrategy,
  # terminationMessagePolicy, etc.) without needing an ever-growing ignoreDifferences list.
  # The VCT apiVersion/kind fields are still needed because the API server's dry-run
  # response omits them, but they exist in the stored live state.
  ignoreDifferences:
    - group: apps
      kind: StatefulSet
      jqPathExpressions:
        - .spec.volumeClaimTemplates[]?.apiVersion
        - .spec.volumeClaimTemplates[]?.kind
        # kubectl rollout restart writes this annotation; Helm doesn't own it via SSA
        - '.spec.template.metadata.annotations["kubectl.kubernetes.io/restartedAt"]'

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
      - ServerSideDiff=true
      - RespectIgnoreDifferences=true
    retry:
      limit: 5
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m
