---
# ArgoCD Application for home-assistant
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: home-assistant
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
  annotations:
    argocd.argoproj.io/sync-wave: "6"
spec:
  project: default

  sources:
    # 1. Application chart
    - repoURL: https://github.com/HughLardner/homelab.git
      targetRevision: HEAD
      path: kubernetes/applications/home-assistant
      helm:
        releaseName: home-assistant
        valueFiles:
          - values.yaml
        skipCrds: false

    # 2. Sealed secrets
    - repoURL: https://github.com/HughLardner/homelab.git
      targetRevision: HEAD
      path: kubernetes/applications/home-assistant/secrets
      directory:
        recurse: false
        include: "*.yaml"

  destination:
    server: https://kubernetes.default.svc
    namespace: home-assistant

  # Ignore fields that Kubernetes auto-injects via admission defaulting.
  # These are attributed to ArgoCD's own SSA manager (not kube-controller-manager),
  # so managedFieldsManagers won't catch them. jqPathExpressions target them precisely.
  ignoreDifferences:
    - group: apps
      kind: StatefulSet
      jqPathExpressions:
        # Kubernetes defaults volumeMode to "Filesystem" if unset in the chart
        - .spec.volumeClaimTemplates[]?.spec.volumeMode
        # Kubernetes adds a status subresource to VCT entries
        - .spec.volumeClaimTemplates[]?.status
        # kube-controller-manager defaults this retention policy on StatefulSets
        - .spec.persistentVolumeClaimRetentionPolicy

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
      - RespectIgnoreDifferences=true
    retry:
      limit: 5
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m
