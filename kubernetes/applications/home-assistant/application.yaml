---
# ArgoCD Application for home-assistant
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: home-assistant
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
  annotations:
    argocd.argoproj.io/sync-wave: "6"
spec:
  project: default

  sources:
    # 1. Application chart
    - repoURL: https://github.com/HughLardner/homelab.git
      targetRevision: HEAD
      path: kubernetes/applications/home-assistant
      helm:
        releaseName: home-assistant
        valueFiles:
          - values.yaml
        skipCrds: false

    # 2. Sealed secrets
    - repoURL: https://github.com/HughLardner/homelab.git
      targetRevision: HEAD
      path: kubernetes/applications/home-assistant/secrets
      directory:
        recurse: false
        include: "*.yaml"

  destination:
    server: https://kubernetes.default.svc
    namespace: home-assistant

  # Ignore fields that Kubernetes auto-injects via admission defaulting.
  # These are attributed to ArgoCD's own SSA manager (not kube-controller-manager),
  # so managedFieldsManagers won't catch them. jqPathExpressions target them precisely.
  ignoreDifferences:
    - group: apps
      kind: StatefulSet
      jqPathExpressions:
        # VCT fields defaulted by the API server
        - .spec.volumeClaimTemplates[]?.spec.volumeMode
        - .spec.volumeClaimTemplates[]?.status
        - .spec.volumeClaimTemplates[]?.apiVersion
        - .spec.volumeClaimTemplates[]?.kind
        - .spec.volumeClaimTemplates[]?.metadata.creationTimestamp
        # StatefulSet spec fields defaulted by kube-controller-manager
        - .spec.persistentVolumeClaimRetentionPolicy
        - .spec.podManagementPolicy
        - .spec.revisionHistoryLimit
        - .spec.updateStrategy
        # Container fields defaulted by the API server
        - .spec.template.spec.containers[]?.terminationMessagePath
        - .spec.template.spec.containers[]?.terminationMessagePolicy
        # kubectl rollout restart writes this annotation; Helm doesn't own it via SSA
        - '.spec.template.metadata.annotations["kubectl.kubernetes.io/restartedAt"]'

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
      - RespectIgnoreDifferences=true
    retry:
      limit: 5
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m
