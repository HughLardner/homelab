# Home Assistant Helm Chart Configuration
# Chart: https://github.com/pajikos/home-assistant-helm-chart

# Global values (replicated from config/homelab.yaml to avoid ArgoCD multi-source
# same-repo revision race conditions with $values refs)
global:
  domain: silverseekers.org
  cert_issuer: letsencrypt-prod

# Authelia forward auth protection
# Disabled when using OIDC authentication (SSO login directly to HA)
auth_enabled: false

# HACS Setup Job
# Automatically installs HACS after deployment via post-install hook
# Adapted from: https://github.com/small-hack/home-assistant-chart
# Only enable for fresh installs; disable once setup is complete to avoid
# ArgoCD sync loops (hooks re-trigger on every sync and can't schedule on
# resource-constrained nodes).
setupHacs:
  enabled: false

# Owner User Creation
# Automatically creates the initial admin user during first deployment
# This skips the manual onboarding process
# Adapted from: https://github.com/small-hack/home-assistant-chart
# Only enable for fresh installs; disable once onboarding is complete.
owner:
  create: false
  # Use existing secret for credentials (created via sealed-secrets)
  existingSecret: home-assistant-owner-credentials
  # Enable debug output (WARNING: reveals sensitive data in logs)
  debug: false

# Home Assistant subchart configuration
# priorityClassName is set at the subchart level
priorityClassName: homelab-standard

homeassistant:
  # Override fullname to avoid ugly duplication in resource names
  # Without this, PVC becomes: home-assistant-homeassistant-home-assistant-homeassistant-0
  # With this, PVC becomes: home-assistant-home-assistant-0
  fullnameOverride: home-assistant

  # Controller type - StatefulSet for persistent storage
  controller:
    type: StatefulSet

  # Image configuration
  image:
    repository: ghcr.io/home-assistant/home-assistant
    tag: "2025.12"  # Updated from 2024.12 (was over a year old)
    pullPolicy: IfNotPresent

  # Service configuration
  # Note: Homepage annotations are on the IngressRoute, not here
  # (Homepage uses traefik: true for discovery via IngressRoutes)
  service:
    type: ClusterIP
    port: 8123

  # Disable built-in ingress - we use Traefik IngressRoute
  ingress:
    enabled: false

  # Persistent storage
  persistence:
    enabled: true
    size: 10Gi
    storageClass: longhorn
    accessMode: ReadWriteOnce

  # Resource limits
  # Memory raised from 1Gi → 2Gi: HA was using ~1.4 GB working set, exceeding its own limit.
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: "1"       # Use "1" not "1000m" to avoid ArgoCD out-of-sync due to k8s normalization
      memory: 2Gi

  # Environment variables for OIDC configuration
  # These are read by the hass-oidc-auth integration
  env:
    - name: OIDC_CLIENT_ID
      valueFrom:
        secretKeyRef:
          name: home-assistant-oidc-secret
          key: client-id
    - name: OIDC_CLIENT_SECRET
      valueFrom:
        secretKeyRef:
          name: home-assistant-oidc-secret
          key: client-secret

  # Home Assistant configuration
  configuration:
    enabled: true
    forceInit: false
    # Trust Traefik proxy and cluster network
    trusted_proxies:
      - 10.42.0.0/16    # K3s pod CIDR
      - 10.43.0.0/16    # K3s service CIDR
      - 192.168.10.0/24 # Local network
    templateConfig: |-
      # Loads default set of integrations. Do not remove.
      default_config:

      http:
        use_x_forwarded_for: true
        trusted_proxies:
          {{- range .Values.configuration.trusted_proxies }}
          - {{ . }}
          {{- end }}

      # Load frontend themes from the themes folder
      frontend:
        themes: !include_dir_merge_named themes

      automation: !include automations.yaml
      script: !include scripts.yaml
      scene: !include scenes.yaml

      # =========================================================================
      # Kubernetes Service Control
      # =========================================================================
      # Shell commands that call the Kubernetes API directly using the pod's
      # auto-mounted ServiceAccount token. No external credentials needed —
      # the kubelet rotates the token automatically.
      #
      # The `plex-scaler` Role in the `media` namespace grants the
      # home-assistant SA permission to PATCH the plex deployment's scale
      # subresource. The RoleBinding is managed in the Plex Helm chart.
      #
      # Usage: call shell_command.wake_plex from any automation, script, or
      # dashboard button. Plex will start and KEDA's Prometheus trigger will
      # keep it alive while streams are active, then scale it back to 0 after
      # 30 min of inactivity.
      shell_command:
        wake_plex: >-
          curl -sf
          --cacert /var/run/secrets/kubernetes.io/serviceaccount/ca.crt
          -H "Authorization: Bearer $(cat /var/run/secrets/kubernetes.io/serviceaccount/token)"
          -H "Content-Type: application/strategic-merge-patch+json"
          -X PATCH
          https://kubernetes.default.svc/apis/apps/v1/namespaces/media/deployments/plex/scale
          -d '{"spec":{"replicas":1}}'

      # input_button exposes a pressable button entity in the HA UI.
      # Add it to any dashboard card using entity: input_button.wake_plex.
      # The automation below handles the button press → shell_command trigger.
      input_button:
        wake_plex:
          name: "Wake Plex"
          icon: mdi:plex

      # Automation: pressing the Wake Plex button calls the shell command.
      # Using a named list so it merges cleanly with automations.yaml entries.
      automation wake_plex:
        - alias: "Wake Plex on button press"
          id: wake_plex_button
          trigger:
            - platform: state
              entity_id: input_button.wake_plex
          action:
            - service: shell_command.wake_plex

  # Liveness/Readiness probes
  probes:
    liveness:
      enabled: true
      initialDelaySeconds: 60
      periodSeconds: 10
      timeoutSeconds: 5
      failureThreshold: 5
    readiness:
      enabled: true
      initialDelaySeconds: 30
      periodSeconds: 10
      timeoutSeconds: 5
      failureThreshold: 3

  # Host network disabled - not needed when using ingress
  hostNetwork: false
