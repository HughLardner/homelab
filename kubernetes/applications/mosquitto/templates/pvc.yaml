---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: mosquitto-data
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/name: mosquitto
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: {{ .Values.services.mosquitto.storage_class | default "longhorn" }}
  resources:
    requests:
      storage: {{ .Values.services.mosquitto.storage_size | default "1Gi" }}
