---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: {{ .Release.Name }}
  namespace: {{ .Release.Namespace }}
  annotations:
    kubernetes.io/ingress.class: traefik
    gethomepage.dev/enabled: "true"
    gethomepage.dev/group: "Home Automation"
    gethomepage.dev/name: "Node-RED"
    gethomepage.dev/icon: "node-red"
    gethomepage.dev/description: "Flow-based automation"
    gethomepage.dev/href: "https://{{ .Values.services.node_red.domain }}"
  labels:
    app.kubernetes.io/name: {{ .Release.Name }}
spec:
  entryPoints:
    - websecure
  routes:
    - match: Host(`{{ .Values.services.node_red.domain }}`)
      kind: Rule
      priority: 10
      {{- if .Values.auth_enabled }}
      middlewares:
        - name: authelia-forward-auth
          namespace: authelia
      {{- end }}
      services:
        - name: node-red
          port: 1880
  tls:
    secretName: {{ .Release.Name }}-tls
