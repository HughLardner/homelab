---
apiVersion: v1
kind: Service
metadata:
  name: node-red
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/name: node-red
spec:
  type: ClusterIP
  ports:
    - name: http
      port: 1880
      targetPort: http
      protocol: TCP
  selector:
    app.kubernetes.io/name: node-red
