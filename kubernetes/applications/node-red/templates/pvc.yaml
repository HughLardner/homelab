---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: node-red-data
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/name: node-red
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: {{ .Values.services.node_red.storage_class | default "longhorn" }}
  resources:
    requests:
      storage: {{ .Values.services.node_red.storage_size | default "2Gi" }}
