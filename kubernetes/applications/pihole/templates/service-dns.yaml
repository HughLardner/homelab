---
apiVersion: v1
kind: Service
metadata:
  name: pihole-dns
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/name: pihole
  annotations:
    metallb.io/loadBalancerIPs: "{{ .Values.services.pihole.dns_ip }}"
spec:
  type: LoadBalancer
  externalTrafficPolicy: Local
  ports:
    - name: dns-udp
      port: 53
      targetPort: dns-udp
      protocol: UDP
    - name: dns-tcp
      port: 53
      targetPort: dns-tcp
      protocol: TCP
  selector:
    app.kubernetes.io/name: pihole
