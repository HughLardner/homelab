---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: pihole
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/name: pihole
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: pihole
  template:
    metadata:
      labels:
        app.kubernetes.io/name: pihole
    spec:
      {{- if .Values.priorityClassName }}
      priorityClassName: {{ .Values.priorityClassName }}
      {{- end }}
      containers:
        - name: pihole
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: 80
              protocol: TCP
            - name: dns-udp
              containerPort: 53
              protocol: UDP
            - name: dns-tcp
              containerPort: 53
              protocol: TCP
          env:
            - name: TZ
              value: {{ .Values.env.TZ | quote }}
            - name: PIHOLE_DNS_1
              value: {{ .Values.services.pihole.upstream_dns_1 | default "1.1.1.1" | quote }}
            - name: PIHOLE_DNS_2
              value: {{ .Values.services.pihole.upstream_dns_2 | default "1.0.0.1" | quote }}
            - name: WEBPASSWORD
              value: ""
            - name: VIRTUAL_HOST
              value: {{ .Values.services.pihole.domain | quote }}
            - name: DNSMASQ_LISTENING
              value: "all"
          volumeMounts:
            - name: pihole-data
              mountPath: /etc/pihole
            - name: dnsmasq-data
              mountPath: /etc/dnsmasq.d
            - name: local-dns
              mountPath: /etc/dnsmasq.d/02-local-dns.conf
              subPath: 02-local-dns.conf
              readOnly: true
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          livenessProbe:
            httpGet:
              path: /admin
              port: http
            initialDelaySeconds: 60
            periodSeconds: 15
            failureThreshold: 5
          readinessProbe:
            httpGet:
              path: /admin
              port: http
            initialDelaySeconds: 30
            periodSeconds: 10
            failureThreshold: 3
      volumes:
        - name: pihole-data
          persistentVolumeClaim:
            claimName: pihole-data
        - name: dnsmasq-data
          persistentVolumeClaim:
            claimName: pihole-dnsmasq-data
        - name: local-dns
          configMap:
            name: pihole-local-dns
