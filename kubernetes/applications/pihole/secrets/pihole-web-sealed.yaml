# Sealed Secret: pihole-web-secret
# Namespace: pihole
# Type: Opaque
# Scope: strict
#
# IMPORTANT: This file contains a PLACEHOLDER and must be re-sealed before deploying.
#
# To generate and seal this secret, run:
#
#   kubectl create secret generic pihole-web-secret \
#     --namespace pihole \
#     --from-literal=WEBPASSWORD='your-password-here' \
#     --dry-run=client -o yaml \
#   | kubeseal --controller-name=sealed-secrets --controller-namespace=sealed-secrets \
#       --format yaml > kubernetes/applications/pihole/secrets/pihole-web-sealed.yaml
#
# Then commit the resulting file (the encryptedData values will be different).

---
apiVersion: bitnami.com/v1alpha1
kind: SealedSecret
metadata:
  name: pihole-web-secret
  namespace: pihole
spec:
  encryptedData:
    WEBPASSWORD: REPLACE_WITH_SEALED_VALUE
  template:
    metadata:
      name: pihole-web-secret
      namespace: pihole
