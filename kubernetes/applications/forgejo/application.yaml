---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: forgejo
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
  annotations:
    argocd.argoproj.io/sync-wave: "9"
    # Wave 9: Git server — heaviest interactive app, last to start
spec:
  project: default

  sources:
    # 1. Local Helm chart
    - repoURL: https://github.com/HughLardner/homelab.git
      targetRevision: HEAD
      path: kubernetes/applications/forgejo
      helm:
        releaseName: forgejo
        valueFiles:
          - $values/config/homelab.yaml
          - values.yaml

    # 2. Values reference
    - repoURL: https://github.com/HughLardner/homelab.git
      targetRevision: HEAD
      ref: values

  destination:
    server: https://kubernetes.default.svc
    namespace: forgejo

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      # RespectIgnoreDifferences ensures ArgoCD does not overwrite the replicas
      # field even during an explicit sync (webhook, manual UI, daily CronJob).
      # Without this, ignoreDifferences only stops OutOfSync detection — syncs
      # would still reset replicas to 1, fighting KEDA's scale-to-zero.
      - RespectIgnoreDifferences=true
    retry:
      limit: 5
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m

  # KEDA's HTTPScaledObject manages replicas — ignore divergence to prevent
  # ArgoCD from fighting the autoscaler when it scales the deployment to 0.
  ignoreDifferences:
    - group: apps
      kind: Deployment
      name: forgejo
      jsonPointers:
        - /spec/replicas
