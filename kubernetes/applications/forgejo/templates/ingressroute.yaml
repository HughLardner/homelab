---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: forgejo
  namespace: {{ .Release.Namespace }}
  annotations:
    kubernetes.io/ingress.class: traefik
    gethomepage.dev/enabled: "true"
    gethomepage.dev/name: Forgejo
    gethomepage.dev/description: Self-Hosted Git Server
    gethomepage.dev/group: Applications
    gethomepage.dev/icon: forgejo
    gethomepage.dev/href: "https://{{ .Values.services.forgejo.domain }}"
    gethomepage.dev/pod-selector: app.kubernetes.io/name=forgejo
  labels:
    app.kubernetes.io/name: forgejo
    app.kubernetes.io/component: ingress
spec:
  entryPoints:
    - websecure
  routes:
    - match: Host(`{{ .Values.services.forgejo.domain }}`)
      kind: Rule
      priority: 10
      {{- if .Values.services.forgejo.auth_enabled }}
      middlewares:
        - name: authelia-forward-auth
          namespace: authelia
      {{- end }}
      services:
        - name: forgejo
          port: 3000
  tls:
    secretName: forgejo-tls
