---
# HTTPScaledObject: scale Forgejo to zero when idle, wake on first HTTP request.
# Cold start ~12s. Requires keda + keda-http ArgoCD applications.
apiVersion: http.keda.sh/v1alpha1
kind: HTTPScaledObject
metadata:
  name: forgejo
  namespace: {{ .Release.Namespace }}
spec:
  hosts:
    - {{ .Values.services.forgejo.domain }}
  pathPrefixes:
    - /
  scaleTargetRef:
    name: forgejo
    kind: Deployment
    apiVersion: apps/v1
    port: 3000
  replicas:
    min: 0
    max: 1
  # Scale down after 30 minutes of no HTTP traffic
  scaledownPeriod: 1800
