---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: home-assistant-matter-hub
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
  annotations:
    argocd.argoproj.io/sync-wave: "7"
    # After home-assistant (wave 6); needs HA API and long-lived token secret
spec:
  project: default

  sources:
    - repoURL: https://github.com/HughLardner/homelab.git
      targetRevision: HEAD
      path: kubernetes/applications/home-assistant-matter-hub
      helm:
        releaseName: home-assistant-matter-hub
        valueFiles:
          - $values/config/homelab.yaml
          - values.yaml

    - repoURL: https://github.com/HughLardner/homelab.git
      targetRevision: HEAD
      ref: values

  destination:
    server: https://kubernetes.default.svc
    namespace: home-assistant

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
    retry:
      limit: 5
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m
