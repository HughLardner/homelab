---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: home-assistant-matter-hub
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/name: home-assistant-matter-hub
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: home-assistant-matter-hub
  template:
    metadata:
      labels:
        app.kubernetes.io/name: home-assistant-matter-hub
    spec:
      priorityClassName: {{ .Values.priorityClassName }}
      hostNetwork: true
      dnsPolicy: ClusterFirstWithHostNet
      containers:
        - name: matter-hub
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.hamh.httpPort }}
              protocol: TCP
          env:
            - name: HAMH_HOME_ASSISTANT_URL
              value: {{ .Values.homeAssistant.url | quote }}
            - name: HAMH_HOME_ASSISTANT_ACCESS_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.authSecretName }}
                  key: {{ .Values.authSecretKey }}
            - name: HAMH_LOG_LEVEL
              value: {{ .Values.hamh.logLevel | quote }}
            - name: HAMH_HTTP_PORT
              value: {{ .Values.hamh.httpPort | quote }}
            {{- if .Values.hamh.mdnsNetworkInterface }}
            - name: HAMH_MDNS_NETWORK_INTERFACE
              value: {{ .Values.hamh.mdnsNetworkInterface | quote }}
            {{- end }}
          volumeMounts:
            - name: data
              mountPath: /data
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          readinessProbe:
            tcpSocket:
              port: http
            initialDelaySeconds: 15
            periodSeconds: 10
          livenessProbe:
            tcpSocket:
              port: http
            initialDelaySeconds: 60
            periodSeconds: 30
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: home-assistant-matter-hub-data
