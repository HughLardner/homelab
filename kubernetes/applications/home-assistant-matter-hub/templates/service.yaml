---
apiVersion: v1
kind: Service
metadata:
  name: home-assistant-matter-hub
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/name: home-assistant-matter-hub
spec:
  type: ClusterIP
  ports:
    - name: http
      port: {{ .Values.hamh.httpPort }}
      targetPort: http
      protocol: TCP
  selector:
    app.kubernetes.io/name: home-assistant-matter-hub
