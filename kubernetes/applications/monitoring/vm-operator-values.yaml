---
# Victoria Metrics Operator Helm Values
# Lightweight operator for managing VM components

# Operator resources (very lightweight)
operator:
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 200m
      memory: 128Mi

  # Make the liveness probe tolerant of temporary API server unavailability.
  # Default failureThreshold=3 + periodSeconds=15 = pod killed after 45s of any
  # API slowness. During a reconciliation burst that is far too aggressive.
  # 10 failures × 30s = 5 minutes of sustained failure before restart.
  livenessProbe:
    failureThreshold: 10
    periodSeconds: 30
    timeoutSeconds: 10
  readinessProbe:
    failureThreshold: 5
    periodSeconds: 30
    timeoutSeconds: 10

# Config-reloader sidecar resource overrides.
# Three sidecars (vmagent, vmalert, vmalertmanager) each default to 100m CPU
# request — far too high for a homelab where they typically use 0-32m actual.
env:
  - name: VM_VMAGENTDEFAULT_CONFIGRELOADERCPU
    value: "25m"
  - name: VM_VMALERTDEFAULT_CONFIGRELOADERCPU
    value: "25m"
  - name: VM_VMALERTMANAGERDEFAULT_CONFIGRELOADERCPU
    value: "25m"
  - name: VM_VMAGENTDEFAULT_CONFIGRELOADERMEMORY
    value: "25Mi"
  - name: VM_VMALERTDEFAULT_CONFIGRELOADERMEMORY
    value: "25Mi"
  - name: VM_VMALERTMANAGERDEFAULT_CONFIGRELOADERMEMORY
    value: "25Mi"

# Enable CRD installation
crds:
  enabled: true

# Admission webhook (disable to save resources in homelab)
admissionWebhooks:
  enabled: false

# ServiceMonitor for operator itself
serviceMonitor:
  enabled: true








