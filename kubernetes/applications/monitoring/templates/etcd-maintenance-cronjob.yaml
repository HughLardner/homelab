{{- if .Values.services.monitoring.etcd_maintenance_enabled }}
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: etcd-maintenance
  namespace: monitoring

---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: etcd-maintenance
rules:
  - apiGroups: [""]
    resources: ["nodes"]
    verbs: ["get", "list"]

---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: etcd-maintenance
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: etcd-maintenance
subjects:
  - kind: ServiceAccount
    name: etcd-maintenance
    namespace: monitoring

---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: etcd-defrag
  namespace: monitoring
spec:
  schedule: {{ .Values.services.monitoring.etcd_maintenance_schedule | default "0 2 * * 0" | quote }}
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      ttlSecondsAfterFinished: 86400  # 24 hours
      template:
        metadata:
          labels:
            app.kubernetes.io/name: etcd-defrag
            app.kubernetes.io/component: maintenance
        spec:
          serviceAccountName: etcd-maintenance
          restartPolicy: OnFailure
          hostNetwork: true  # Access etcd on 127.0.0.1:2379
          containers:
            - name: etcd-defrag
              image: bitnami/etcd:3.5.21
              command:
                - /bin/bash
                - -ec
                - |
                  echo "=== etcd defragmentation $(date -Iseconds) ==="

                  # Get etcd endpoint (single-node: localhost)
                  ETCD_ENDPOINT="https://127.0.0.1:2379"
                  export ETCDCTL_API=3

                  # K3s etcd certs location
                  CERT="/var/lib/rancher/k3s/server/tls/etcd/server-client.crt"
                  KEY="/var/lib/rancher/k3s/server/tls/etcd/server-client.key"
                  CA="/var/lib/rancher/k3s/server/tls/etcd/server-ca.crt"

                  echo "--- pre-defrag status ---"
                  etcdctl --endpoints=$ETCD_ENDPOINT \
                    --cert=$CERT --key=$KEY --cacert=$CA \
                    endpoint status -w table

                  echo "--- running defragmentation ---"
                  etcdctl --endpoints=$ETCD_ENDPOINT \
                    --cert=$CERT --key=$KEY --cacert=$CA \
                    defrag --command-timeout=60s

                  echo "--- post-defrag status ---"
                  etcdctl --endpoints=$ETCD_ENDPOINT \
                    --cert=$CERT --key=$KEY --cacert=$CA \
                    endpoint status -w table

                  echo "--- defragmentation complete ---"
              resources:
                requests:
                  cpu: 50m
                  memory: 64Mi
                limits:
                  cpu: 500m
                  memory: 256Mi
              volumeMounts:
                - name: etcd-certs
                  mountPath: /var/lib/rancher/k3s/server/tls/etcd
                  readOnly: true
          volumes:
            - name: etcd-certs
              hostPath:
                path: /var/lib/rancher/k3s/server/tls/etcd
                type: Directory
{{- end }}
