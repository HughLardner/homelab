---
# VMSingle - Victoria Metrics single-node time series database
# Replaces Prometheus with much lower memory footprint
apiVersion: operator.victoriametrics.com/v1beta1
kind: VMSingle
metadata:
  name: vmsingle
  namespace: monitoring
spec:
  # Retention: 3d is sufficient for dashboards and incident investigations on this
  # single-disk 12GB node. 15d caused sustained 300+ MB/s disk reads (vmalert
  # scanning the full dataset on every evaluation cycle), saturating vda.
  retentionPeriod: "3d"

  # Resource limits
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi

  # Persistent storage: keep at 10Gi (cannot shrink existing PVC); retention=3d
  # controls actual disk usage.
  storage:
    storageClassName: local-path
    accessModes:
      - ReadWriteOnce
    resources:
      requests:
        storage: 10Gi

  # Extra args for optimization
  extraArgs:
    # Deduplication window
    dedup.minScrapeInterval: "30s"
    # Memory management
    memory.allowedPercent: "60"
    # Limit concurrent queries to reduce burst I/O
    search.maxConcurrentRequests: "2"
    search.maxQueueDuration: "30s"
    # Cap how far back queries can look to reduce I/O per query
    search.maxLookback: "3d"
