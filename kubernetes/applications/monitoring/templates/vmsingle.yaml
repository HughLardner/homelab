---
# VMSingle - Victoria Metrics single-node time series database
# Replaces Prometheus with much lower memory footprint
apiVersion: operator.victoriametrics.com/v1beta1
kind: VMSingle
metadata:
  name: vmsingle
  namespace: monitoring
spec:
  # Retention: raised to 15d to match config/homelab.yaml and to have history across incidents
  retentionPeriod: "15d"

  # Resource limits (much lower than Prometheus)
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi

  # Persistent storage: raised to 10Gi to match config/homelab.yaml prometheus_storage_size
  storage:
    storageClassName: local-path
    accessModes:
      - ReadWriteOnce
    resources:
      requests:
        storage: 10Gi

  # Extra args for optimization
  extraArgs:
    # Deduplication window
    dedup.minScrapeInterval: "30s"
    # Memory management
    memory.allowedPercent: "80"
    # Search settings
    search.maxConcurrentRequests: "4"
    search.maxQueueDuration: "30s"
