---
# Patched fork of grafana.com dashboard 7249 — cAdvisor uses pod/container labels (not pod_name/container_name).
# Upstream revision has no updates; gnet download is disabled in grafana-values.yaml for this dashboard.
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboard-kubernetes-cluster-homelab
  namespace: monitoring
  labels:
    grafana_dashboard: "1"
  annotations:
    grafana_folder: "Kubernetes"
data:
  kubernetes-cluster-homelab.json: |-
{{ .Files.Get "dashboards/kubernetes-cluster-homelab.json" | nindent 4 }}
