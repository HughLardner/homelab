---
# VMAlertmanager - Alert routing and notifications
# Receives alerts from VMAlert and routes to notification channels
apiVersion: operator.victoriametrics.com/v1beta1
kind: VMAlertmanager
metadata:
  name: vmalertmanager
  namespace: monitoring
spec:
  # Single replica for homelab
  replicaCount: 1

  # Resource limits
  resources:
    requests:
      cpu: 10m
      memory: 32Mi
    limits:
      cpu: 100m
      memory: 64Mi

  # Persistent storage for silences (local-path for single-node cluster)
  storage:
    volumeClaimTemplate:
      spec:
        storageClassName: local-path
        accessModes:
          - ReadWriteOnce
        resources:
          requests:
            storage: 1Gi

  # Select all VMAlertmanagerConfig resources
  selectAllByDefault: true

  # Configuration secret (optional - can add notification channels later)
  configSecret: ""

---
# Default Alertmanager configuration
# Routes alerts to Home Assistant via webhook → persistent notification / mobile push
apiVersion: operator.victoriametrics.com/v1beta1
kind: VMAlertmanagerConfig
metadata:
  name: default
  namespace: monitoring
spec:
  route:
    receiver: "homeassistant"
    group_by: ["alertname", "severity"]
    group_wait: "30s"
    group_interval: "5m"
    repeat_interval: "4h"
    routes:
      # Critical alerts repeat more frequently
      - matchers:
          - name: severity
            value: critical
        receiver: "homeassistant"
        repeat_interval: "1h"

  receivers:
    - name: "homeassistant"
      webhook_configs:
        - url_secret:
            # Created via: kubernetes/applications/monitoring/secrets/alertmanager-ha-webhook-sealed.yaml
            # Webhook ID: alertmanager-k8s (automation.kubernetes_alertmanager_notification in HA)
            name: alertmanager-ha-webhook
            key: webhookUrl
          send_resolved: true
          http_config:
            tls_config:
              insecure_skip_verify: true
