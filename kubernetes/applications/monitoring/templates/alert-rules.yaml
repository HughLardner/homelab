---
# VMRule - Node, control-plane, and storage stability alert rules
# Auto-selected by VMAlert via selectAllByDefault: true
# See docs/runbooks/node-io-saturation-recovery.md for response procedures
apiVersion: operator.victoriametrics.com/v1beta1
kind: VMRule
metadata:
  name: node-health
  namespace: monitoring
spec:
  groups:
    - name: node-io
      interval: 60s
      rules:
        - alert: NodeHighIOWait
          expr: avg(rate(node_cpu_seconds_total{mode="iowait"}[5m])) * 100 > 30
          for: 5m
          labels:
            severity: warning
          annotations:
            summary: "Node I/O wait is high ({{ "{{" }} $value | printf \"%.1f\" {{ "}}" }}%)"
            description: >-
              Average CPU iowait on {{ "{{" }} $labels.instance {{ "}}" }} has been above 30% for 5 minutes.
              This indicates the disk is struggling to keep up with I/O demand.
              Current value: {{ "{{" }} $value | printf "%.1f" {{ "}}" }}%.
            runbook_url: "https://github.com/HughLardner/homelab/blob/main/docs/runbooks/node-io-saturation-recovery.md"

        - alert: NodeCriticalIOWait
          expr: avg(rate(node_cpu_seconds_total{mode="iowait"}[5m])) * 100 > 60
          for: 3m
          labels:
            severity: critical
          annotations:
            summary: "Node I/O wait is CRITICAL ({{ "{{" }} $value | printf \"%.1f\" {{ "}}" }}%)"
            description: >-
              Average CPU iowait on {{ "{{" }} $labels.instance {{ "}}" }} has been above 60% for 3 minutes.
              The node is approaching the saturation level that caused the 2026-03-18 incident (86-91%).
              Take immediate action: check iotop, consider scaling down vmagent and non-critical workloads.
            runbook_url: "https://github.com/HughLardner/homelab/blob/main/docs/runbooks/node-io-saturation-recovery.md"

        - alert: NodeDiskIOSaturated
          expr: rate(node_disk_io_time_seconds_total{device="vda"}[5m]) > 0.80
          for: 5m
          labels:
            severity: warning
          annotations:
            summary: "Node OS disk (vda) I/O utilisation is high ({{ "{{" }} $value | printf \"%.0f\" {{ "}}" }}%)"
            description: >-
              The vda disk (OS disk) on {{ "{{" }} $labels.instance {{ "}}" }} has been at more than 80% I/O utilisation
              for 5 minutes. During the 2026-03-18 incident vda reached 75% and was still climbing.
              This is the primary driver of iowait.
            runbook_url: "https://github.com/HughLardner/homelab/blob/main/docs/runbooks/node-io-saturation-recovery.md"

        - alert: NodeHighDiskReadRate
          expr: sum(rate(node_disk_read_bytes_total{device="vda"}[5m])) / 1024 / 1024 > 150
          for: 5m
          labels:
            severity: warning
          annotations:
            summary: "Node OS disk (vda) read rate is high ({{ "{{" }} $value | printf \"%.0f\" {{ "}}" }} MB/s)"
            description: >-
              The vda disk read throughput on {{ "{{" }} $labels.instance {{ "}}" }} has exceeded 150 MB/s for 5 minutes.
              During the 2026-03-18 incident this reached 192 MB/s and was still rising.
              Likely cause: simultaneous pod startup or prometheus-config-reloader high read activity.
            runbook_url: "https://github.com/HughLardner/homelab/blob/main/docs/runbooks/node-io-saturation-recovery.md"

        - alert: NodeHighLoad
          expr: node_load1 > count(node_cpu_seconds_total{mode="idle"}) without (cpu) * 2
          for: 10m
          labels:
            severity: warning
          annotations:
            summary: "Node load average is high ({{ "{{" }} $value | printf \"%.2f\" {{ "}}" }})"
            description: >-
              The 1-minute load average on {{ "{{" }} $labels.instance {{ "}}" }} has been more than 2× the CPU count
              for 10 minutes. During the 2026-03-18 incident load peaked at 22.43 on a 4-core VM.
            runbook_url: "https://github.com/HughLardner/homelab/blob/main/docs/runbooks/node-io-saturation-recovery.md"

        - alert: NodeCriticalLoad
          expr: node_load1 > count(node_cpu_seconds_total{mode="idle"}) without (cpu) * 3
          for: 5m
          labels:
            severity: critical
          annotations:
            summary: "Node load average is CRITICAL ({{ "{{" }} $value | printf \"%.2f\" {{ "}}" }})"
            description: >-
              The 1-minute load average on {{ "{{" }} $labels.instance {{ "}}" }} has been more than 3× the CPU count
              for 5 minutes. The node is severely overloaded and the Kubernetes API may become
              unresponsive. Consider a controlled reboot via Proxmox if SSH is also unresponsive.
            runbook_url: "https://github.com/HughLardner/homelab/blob/main/docs/runbooks/node-io-saturation-recovery.md"

    - name: node-memory
      interval: 60s
      rules:
        - alert: NodeMemoryLow
          expr: node_memory_MemAvailable_bytes / node_memory_MemTotal_bytes < 0.25
          for: 10m
          labels:
            severity: warning
          annotations:
            summary: "Node available memory is low ({{ "{{" }} $value | humanizePercentage {{ "}}" }} free)"
            description: >-
              Available memory on {{ "{{" }} $labels.instance {{ "}}" }} has been below 25% for 10 minutes.
              Current available: {{ "{{" }} $value | humanize {{ "}}" }}B. High memory pressure leads to increased
              major page faults which in turn increases disk I/O and iowait.
            runbook_url: "https://github.com/HughLardner/homelab/blob/main/docs/runbooks/node-io-saturation-recovery.md"

        - alert: NodeMemoryCritical
          expr: node_memory_MemAvailable_bytes / node_memory_MemTotal_bytes < 0.15
          for: 5m
          labels:
            severity: critical
          annotations:
            summary: "Node available memory is CRITICAL ({{ "{{" }} $value | humanizePercentage {{ "}}" }} free)"
            description: >-
              Available memory on {{ "{{" }} $labels.instance {{ "}}" }} has dropped below 15% for 5 minutes.
              The kernel will begin aggressive page reclaim, causing a surge in disk I/O.
              Scale down or evict non-critical pods immediately.
            runbook_url: "https://github.com/HughLardner/homelab/blob/main/docs/runbooks/node-io-saturation-recovery.md"

    - name: node-filesystem
      interval: 60s
      rules:
        - alert: NodeRootFilesystemLow
          expr: node_filesystem_avail_bytes{mountpoint="/", fstype!=""} / node_filesystem_size_bytes{mountpoint="/", fstype!=""} < 0.15
          for: 10m
          labels:
            severity: warning
          annotations:
            summary: "Node root filesystem is low on free space ({{ "{{" }} $value | humanizePercentage {{ "}}" }} free)"
            description: >-
              Root filesystem free space on {{ "{{" }} $labels.instance {{ "}}" }} has been below 15% for 10 minutes.
              The cluster has previously shown image filesystem anomalies before control-plane instability.
              Investigate container runtime storage and disk consumption before kubelet degrades.
            runbook_url: "https://github.com/HughLardner/homelab/blob/main/docs/runbooks/node-io-saturation-recovery.md"

        - alert: NodeRootFilesystemInodesLow
          expr: node_filesystem_files_free{mountpoint="/", fstype!=""} / node_filesystem_files{mountpoint="/", fstype!=""} < 0.10
          for: 10m
          labels:
            severity: warning
          annotations:
            summary: "Node root filesystem is low on inodes ({{ "{{" }} $value | humanizePercentage {{ "}}" }} free)"
            description: >-
              Root filesystem free inodes on {{ "{{" }} $labels.instance {{ "}}" }} have been below 10% for 10 minutes.
              This can surface as kubelet image filesystem errors and container runtime instability.
            runbook_url: "https://github.com/HughLardner/homelab/blob/main/docs/runbooks/node-io-saturation-recovery.md"

    - name: control-plane-health
      interval: 60s
      rules:
        - alert: KubeAPIServerUnavailable
          expr: max(up{job="kubernetes", service="kubernetes"}) < 1
          for: 2m
          labels:
            severity: critical
          annotations:
            summary: "Kubernetes API server scrape is unavailable"
            description: >-
              The API server metrics endpoint has been unavailable for 2 minutes.
              This matches the failure mode seen during the March 2026 instability, where clients saw resets and timeouts on port 6443.
            runbook_url: "https://github.com/HughLardner/homelab/blob/main/docs/runbooks/node-io-saturation-recovery.md"

        - alert: KubeAPIServerHigh5xxRate
          expr: 100 * sum(rate(apiserver_request_total{code=~"5..", verb!~"WATCH|CONNECT"}[5m])) / clamp_min(sum(rate(apiserver_request_total{verb!~"WATCH|CONNECT"}[5m])), 0.001) > 3
          for: 5m
          labels:
            severity: warning
          annotations:
            summary: "Kubernetes API server 5xx rate is elevated ({{ "{{" }} $value | printf \"%.1f\" {{ "}}" }}%)"
            description: >-
              More than 3% of non-watch API requests have returned 5xx responses for 5 minutes.
              This is an early sign of control-plane overload or backend storage stalls.
            runbook_url: "https://github.com/HughLardner/homelab/blob/main/docs/runbooks/node-io-saturation-recovery.md"

        - alert: KubeAPIServerCritical5xxRate
          expr: 100 * sum(rate(apiserver_request_total{code=~"5..", verb!~"WATCH|CONNECT"}[5m])) / clamp_min(sum(rate(apiserver_request_total{verb!~"WATCH|CONNECT"}[5m])), 0.001) > 10
          for: 3m
          labels:
            severity: critical
          annotations:
            summary: "Kubernetes API server 5xx rate is critical ({{ "{{" }} $value | printf \"%.1f\" {{ "}}" }}%)"
            description: >-
              More than 10% of non-watch API requests have returned 5xx responses for 3 minutes.
              Expect workload reconciliation, volume management, and pod startup to fail or stall.
            runbook_url: "https://github.com/HughLardner/homelab/blob/main/docs/runbooks/node-io-saturation-recovery.md"

        - alert: KubeAPIServerP99LatencyHigh
          expr: histogram_quantile(0.99, sum by (le) (rate(apiserver_request_duration_seconds_bucket{verb!~"WATCH|CONNECT"}[5m]))) > 1
          for: 10m
          labels:
            severity: warning
          annotations:
            summary: "Kubernetes API server p99 latency is high ({{ "{{" }} $value | printf \"%.2f\" {{ "}}" }}s)"
            description: >-
              API server p99 latency for non-watch requests has exceeded 1 second for 10 minutes.
              This is a leading indicator that control-plane responsiveness is degrading before hard failures.
            runbook_url: "https://github.com/HughLardner/homelab/blob/main/docs/runbooks/node-io-saturation-recovery.md"

        - alert: KubeAPIServerP99LatencyCritical
          expr: histogram_quantile(0.99, sum by (le) (rate(apiserver_request_duration_seconds_bucket{verb!~"WATCH|CONNECT"}[5m]))) > 3
          for: 5m
          labels:
            severity: critical
          annotations:
            summary: "Kubernetes API server p99 latency is critical ({{ "{{" }} $value | printf \"%.2f\" {{ "}}" }}s)"
            description: >-
              API server p99 latency for non-watch requests has exceeded 3 seconds for 5 minutes.
              This is consistent with the cluster heading toward timeouts, resets, and broad controller failures.
            runbook_url: "https://github.com/HughLardner/homelab/blob/main/docs/runbooks/node-io-saturation-recovery.md"

    - name: storage-health
      interval: 60s
      rules:
        - alert: LonghornVolumeFaulted
          expr: sum(longhorn_volume_robustness{state="faulted"}) > 0
          for: 2m
          labels:
            severity: critical
          annotations:
            summary: "Longhorn has one or more faulted volumes ({{ "{{" }} $value | printf \"%.0f\" {{ "}}" }})"
            description: >-
              At least one Longhorn volume is in a faulted state.
              This is the clearest storage-side signal that the node may be heading toward control-plane instability.
            runbook_url: "https://github.com/HughLardner/homelab/blob/main/docs/runbooks/node-io-saturation-recovery.md"

        - alert: LonghornVolumeUnexpectedUnknown
          expr: sum(longhorn_volume_robustness{state="unknown", pvc_namespace!="media"}) > 0
          for: 5m
          labels:
            severity: warning
          annotations:
            summary: "Longhorn has non-media volumes in unknown state ({{ "{{" }} $value | printf \"%.0f\" {{ "}}" }})"
            description: >-
              One or more Longhorn volumes outside the intentionally detached media workloads are in an unknown state.
              Investigate instance-manager health, volume attachment, and node storage pressure.
            runbook_url: "https://github.com/HughLardner/homelab/blob/main/docs/runbooks/node-io-saturation-recovery.md"

        - alert: LonghornInstanceManagerMemoryHigh
          expr: max(longhorn_instance_manager_memory_usage_bytes) > 3221225472
          for: 10m
          labels:
            severity: warning
          annotations:
            summary: "Longhorn instance-manager memory use is high ({{ "{{" }} $value | humanize {{ "}}" }}B)"
            description: >-
              The Longhorn instance-manager is using more than 3 GiB of memory for 10 minutes.
              On a single-node 12 GiB cluster this can materially reduce headroom for k3s and monitoring components.
            runbook_url: "https://github.com/HughLardner/homelab/blob/main/docs/runbooks/node-io-saturation-recovery.md"

    - name: cluster-churn
      interval: 60s
      rules:
        - alert: ClusterPodRestartSpike
          expr: sum(increase(kube_pod_container_status_restarts_total[15m])) > 6
          for: 5m
          labels:
            severity: warning
          annotations:
            summary: "Cluster pod restarts are spiking ({{ "{{" }} $value | printf \"%.0f\" {{ "}}" }} restarts in 15m)"
            description: >-
              Container restarts across the cluster have increased sharply in the last 15 minutes.
              This often coincides with degraded storage, failing probes, or broad control-plane churn.
            runbook_url: "https://github.com/HughLardner/homelab/blob/main/docs/runbooks/node-io-saturation-recovery.md"

        - alert: InfrastructurePodRestartSpike
          expr: sum(increase(kube_pod_container_status_restarts_total{namespace=~"argocd|cert-manager|kube-system|loki|longhorn-system|metallb-system|monitoring|traefik"}[15m])) > 3
          for: 5m
          labels:
            severity: critical
          annotations:
            summary: "Infrastructure pod restarts are spiking ({{ "{{" }} $value | printf \"%.0f\" {{ "}}" }} restarts in 15m)"
            description: >-
              Core infrastructure namespaces are experiencing repeated container restarts.
              This is a strong indicator that the cluster is in or near an instability event rather than a single workload issue.
            runbook_url: "https://github.com/HughLardner/homelab/blob/main/docs/runbooks/node-io-saturation-recovery.md"
