          "targets": [
            {"expr": "sum by (success) (increase(authelia_authentication_requests_total[5m]))", "legendFormat": "success={{ "{{success}}" }}", "refId": "A"}
          ],
          "title": "Authentication Requests (5m rate)",
          "type": "timeseries"
        },
        {
          "datasource": {"type": "prometheus", "uid": "${datasource}"},
          "fieldConfig": {"defaults": {"color": {"mode": "palette-classic"}, "unit": "short"}},
          "gridPos": {"h": 8, "w": 12, "x": 12, "y": 4},
          "id": 6,
          "options": {"legend": {"calcs": ["sum"], "displayMode": "list", "placement": "bottom"}, "tooltip": {"mode": "multi"}},
          "targets": [
            {"expr": "sum by (endpoint) (increase(authelia_oidc_requests_total[5m]))", "legendFormat": "{{ "{{endpoint}}" }}", "refId": "A"}
          ],
          "title": "OIDC Endpoint Requests (5m rate)",
          "type": "timeseries"
        },
        {
          "datasource": {"type": "prometheus", "uid": "${datasource}"},
          "fieldConfig": {"defaults": {"color": {"mode": "palette-classic"}, "unit": "s"}},
          "gridPos": {"h": 8, "w": 12, "x": 0, "y": 12},
          "id": 7,
          "options": {"legend": {"calcs": ["mean", "max"], "displayMode": "list", "placement": "bottom"}, "tooltip": {"mode": "multi"}},
          "targets": [
            {"expr": "histogram_quantile(0.50, sum(rate(authelia_authentication_duration_seconds_bucket[5m])) by (le))", "legendFormat": "p50", "refId": "A"},
            {"expr": "histogram_quantile(0.95, sum(rate(authelia_authentication_duration_seconds_bucket[5m])) by (le))", "legendFormat": "p95", "refId": "B"},
            {"expr": "histogram_quantile(0.99, sum(rate(authelia_authentication_duration_seconds_bucket[5m])) by (le))", "legendFormat": "p99", "refId": "C"}
          ],
          "title": "Authentication Latency (p50 / p95 / p99)",
          "type": "timeseries"
        },
        {
          "datasource": {"type": "prometheus", "uid": "${datasource}"},
          "fieldConfig": {"defaults": {"color": {"mode": "palette-classic"}, "unit": "short"}},
          "gridPos": {"h": 8, "w": 12, "x": 12, "y": 12},
          "id": 8,
          "options": {"legend": {"calcs": ["lastNotNull"], "displayMode": "list", "placement": "bottom"}, "tooltip": {"mode": "multi"}},
          "targets": [
            {"expr": "sum by (regulation_type) (increase(authelia_regulation_ban_events_total[5m]))", "legendFormat": "{{ "{{regulation_type}}" }}", "refId": "A"}
          ],
          "title": "Regulation / Ban Events",
          "type": "timeseries"
        }
      ],
      "schemaVersion": 38,
      "style": "dark",
      "tags": ["authelia", "sso", "security"],
      "templating": {
        "list": [
          {"current": {"selected": false, "text": "VictoriaMetrics", "value": "VictoriaMetrics"}, "hide": 0, "includeAll": false, "label": "Datasource", "multi": false, "name": "datasource", "options": [], "query": "prometheus", "refresh": 1, "regex": "", "skipUrlSync": false, "type": "datasource"}
        ]
      },
      "time": {"from": "now-6h", "to": "now"},
      "timepicker": {},
      "timezone": "",
      "title": "Authelia",
      "uid": "authelia-homelab",
      "version": 1
    }

