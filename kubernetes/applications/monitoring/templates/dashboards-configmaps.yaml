          "targets": [{"expr": "rate(longhorn_volume_read_throughput[5m])", "legendFormat": "{{ "{{" }}volume{{ "}}" }} read", "refId": "A"}, {"expr": "rate(longhorn_volume_write_throughput[5m])", "legendFormat": "{{ "{{" }}volume{{ "}}" }} write", "refId": "B"}],
