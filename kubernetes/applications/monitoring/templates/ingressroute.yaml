---
# Grafana IngressRoute
# Access at: https://{{ .Values.services.grafana.domain }}
# Protected by Authelia SSO
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: grafana
  namespace: {{ .Release.Namespace }}
  annotations:
    kubernetes.io/ingress.class: traefik
    # Homepage service discovery
    gethomepage.dev/enabled: "true"
    gethomepage.dev/name: "Grafana"
    gethomepage.dev/group: "Monitoring"
    gethomepage.dev/icon: "grafana"
    gethomepage.dev/description: "Dashboards & Visualization"
    gethomepage.dev/href: "https://{{ .Values.services.grafana.domain }}"
spec:
  entryPoints:
    - websecure
  routes:
    - match: Host(`{{ .Values.services.grafana.domain }}`)
      kind: Rule
      middlewares:
        - name: authelia-forward-auth
          namespace: authelia
      # Traffic routed via KEDA HTTP interceptor to support scale-to-zero.
      services:
        - name: keda-add-ons-http-interceptor-proxy
          namespace: keda
          port: 8080
  tls:
    secretName: grafana-tls
