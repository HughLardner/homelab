---
# VMServiceScrape for Kubelet metrics
apiVersion: operator.victoriametrics.com/v1beta1
kind: VMNodeScrape
metadata:
  name: kubelet
  namespace: monitoring
spec:
  scheme: https
  tlsConfig:
    insecureSkipVerify: true
    caFile: /var/run/secrets/kubernetes.io/serviceaccount/ca.crt
  bearerTokenFile: /var/run/secrets/kubernetes.io/serviceaccount/token
  interval: "60s"
  scrapeTimeout: "30s"
  relabelConfigs:
    - action: labelmap
      regex: __meta_kubernetes_node_label_(.+)

---
# VMServiceScrape for Kubelet cadvisor (container metrics)
apiVersion: operator.victoriametrics.com/v1beta1
kind: VMNodeScrape
metadata:
  name: kubelet-cadvisor
  namespace: monitoring
spec:
  scheme: https
  path: /metrics/cadvisor
  tlsConfig:
    insecureSkipVerify: true
    caFile: /var/run/secrets/kubernetes.io/serviceaccount/ca.crt
  bearerTokenFile: /var/run/secrets/kubernetes.io/serviceaccount/token
  interval: "60s"
  scrapeTimeout: "30s"
  relabelConfigs:
    - action: labelmap
      regex: __meta_kubernetes_node_label_(.+)

---
# VMServiceScrape for CoreDNS
apiVersion: operator.victoriametrics.com/v1beta1
kind: VMServiceScrape
metadata:
  name: coredns
  namespace: monitoring
spec:
  namespaceSelector:
    matchNames:
      - kube-system
  selector:
    matchLabels:
      k8s-app: kube-dns
  endpoints:
    - port: metrics
      interval: "60s"

---
# VMServiceScrape for kube-apiserver
apiVersion: operator.victoriametrics.com/v1beta1
kind: VMServiceScrape
metadata:
  name: kube-apiserver
  namespace: monitoring
spec:
  namespaceSelector:
    matchNames:
      - default
  selector:
    matchLabels:
      component: apiserver
      provider: kubernetes
  endpoints:
    - port: https
      scheme: https
      tlsConfig:
        insecureSkipVerify: true
        caFile: /var/run/secrets/kubernetes.io/serviceaccount/ca.crt
      bearerTokenFile: /var/run/secrets/kubernetes.io/serviceaccount/token
      interval: "60s"

---
# VMServiceScrape for kube-state-metrics
# honorLabels=true preserves the namespace/pod labels that kube-state-metrics
# sets on each metric (e.g. kube_pod_info{namespace="home-automation"}).
# Without this, the pods-with-annotations scrape would overwrite namespace
# with "monitoring" (the ksm pod's own namespace), collapsing all data.
apiVersion: operator.victoriametrics.com/v1beta1
kind: VMServiceScrape
metadata:
  name: kube-state-metrics
  namespace: monitoring
spec:
  namespaceSelector:
    matchNames:
      - monitoring
  selector:
    matchLabels:
      app.kubernetes.io/name: kube-state-metrics
  endpoints:
    - port: http
      interval: "60s"
      honorLabels: true

---
# VMPodScrape for pods with prometheus.io annotations
apiVersion: operator.victoriametrics.com/v1beta1
kind: VMPodScrape
metadata:
  name: pods-with-annotations
  namespace: monitoring
spec:
  namespaceSelector:
    any: true
  selector: {}
  podMetricsEndpoints:
    - relabelConfigs:
        # Only scrape pods with prometheus.io/scrape=true
        - sourceLabels: [__meta_kubernetes_pod_annotation_prometheus_io_scrape]
          action: keep
          regex: "true"
        # Construct address from pod IP and custom port annotation
        - sourceLabels: [__meta_kubernetes_pod_ip, __meta_kubernetes_pod_annotation_prometheus_io_port]
          action: replace
          targetLabel: __address__
          regex: (.+);(.+)
          replacement: ${1}:${2}
        # Use custom path if specified
        - sourceLabels: [__meta_kubernetes_pod_annotation_prometheus_io_path]
          action: replace
          targetLabel: __metrics_path__
          regex: (.+)
        # Add pod labels
        - action: labelmap
          regex: __meta_kubernetes_pod_label_(.+)
        # Add namespace label
        - sourceLabels: [__meta_kubernetes_namespace]
          action: replace
          targetLabel: namespace
        # Add pod name label
        - sourceLabels: [__meta_kubernetes_pod_name]
          action: replace
          targetLabel: pod

