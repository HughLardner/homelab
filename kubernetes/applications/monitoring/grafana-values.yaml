---
# Standalone Grafana Helm Values
# Configured to use Victoria Metrics as datasource

# Single replica for homelab
replicas: 1

# Admin credentials from existing secret
admin:
  existingSecret: grafana-admin-secret
  userKey: admin-user
  passwordKey: admin-password

# Persistence for dashboards (local-path for single-node cluster)
persistence:
  enabled: true
  storageClassName: local-path
  size: 5Gi

# Service configuration
service:
  type: ClusterIP
  port: 80
  annotations:
    # Homepage auto-discovery
    gethomepage.dev/enabled: "true"
    gethomepage.dev/group: "Monitoring"
    gethomepage.dev/name: "Grafana"
    gethomepage.dev/icon: "grafana"
    gethomepage.dev/description: "Dashboards & Visualization"
    gethomepage.dev/href: "https://grafana.silverseekers.org"

# Disable ingress (using Traefik IngressRoute)
ingress:
  enabled: false

# Resources (with sidecars enabled)
resources:
  requests:
    cpu: 50m
    memory: 256Mi
  limits:
    cpu: 500m
    memory: 512Mi

# Enable sidecars for auto-loading dashboards/datasources from ConfigMaps
sidecar:
  dashboards:
    enabled: true
    label: grafana_dashboard
    labelValue: "1"
    folder: /tmp/dashboards
    searchNamespace: ALL
    # Read the grafana_folder annotation from ConfigMaps to place dashboards in folders.
    # foldersFromFilesStructure: true tells Grafana to use the subdirectory names the
    # sidecar creates (one per annotation value) as Grafana folder names.
    folderAnnotation: grafana_folder
    provider:
      foldersFromFilesStructure: true
    resources:
      requests:
        cpu: 10m
        memory: 64Mi
      limits:
        cpu: 100m
        memory: 128Mi
  datasources:
    enabled: true
    label: grafana_datasource
    labelValue: "1"
    searchNamespace: ALL
    resources:
      requests:
        cpu: 10m
        memory: 64Mi
      limits:
        cpu: 100m
        memory: 128Mi

# Init container resources (for resource quota compliance)
initChownData:
  resources:
    requests:
      cpu: 10m
      memory: 32Mi
    limits:
      cpu: 100m
      memory: 64Mi

# Download dashboards init container
downloadDashboards:
  resources:
    requests:
      cpu: 10m
      memory: 32Mi
    limits:
      cpu: 100m
      memory: 64Mi

# Grafana configuration
grafana.ini:
  server:
    serve_from_sub_path: false
    root_url: "https://grafana.silverseekers.org"
  auth.anonymous:
    enabled: false
  # Feature toggles
  feature_toggles:
    enable: "publicDashboards"
  # =========================================================================
  # Authelia SSO Integration (OIDC)
  # =========================================================================
  # Client secret is loaded from grafana-oidc-secret.
  auth.generic_oauth:
    enabled: true
    name: Authelia
    allow_sign_up: true
    client_id: grafana
    # client_secret is loaded from environment variable GF_AUTH_GENERIC_OAUTH_CLIENT_SECRET
    scopes: openid profile email groups
    # Authelia OIDC endpoints
    auth_url: https://auth.silverseekers.org/api/oidc/authorization
    token_url: https://auth.silverseekers.org/api/oidc/token
    api_url: https://auth.silverseekers.org/api/oidc/userinfo
    # TLS verification is controlled via environment variable from grafana-tls-config ConfigMap
    # This is dynamically set based on global.cert_issuer in homelab.yaml
    # - letsencrypt-staging: tls_skip_verify_insecure = true
    # - letsencrypt-prod: tls_skip_verify_insecure = false
    # Token endpoint auth method - must match Authelia's client config (client_secret_post)
    # Options: AutoDetect, inParams (client_secret_post), inHeader (client_secret_basic)
    auth_style: inParams
    # Email and name extraction from userinfo response
    email_attribute_path: email
    name_attribute_path: name
    # Use email as login to avoid conflicts with built-in 'admin' user
    login_attribute_path: email
    # Map Authelia groups to Grafana roles
    # Includes 'admins' group for convenience (maps to GrafanaAdmin)
    role_attribute_path: contains(groups[*], 'admins') && 'GrafanaAdmin' || contains(groups[*], 'grafana_admins') && 'Admin' || contains(groups[*], 'grafana_editors') && 'Editor' || 'Viewer'
    # Allow OAuth users to be assigned Grafana admin role
    allow_assign_grafana_admin: true
    # Auto-login disabled - users can choose local or SSO
    auto_login: false
    # Use PKCE for enhanced security
    use_pkce: true
  # Allow linking OAuth identity to existing users by email
  auth:
    oauth_allow_insecure_email_lookup: true

# Environment from secret
envFromSecret: grafana-admin-secret

# Environment from ConfigMaps (TLS config based on cert_issuer)
envFromConfigMaps:
  - name: grafana-tls-config

# Environment variables from secrets (OIDC client secret)
envValueFrom:
  GF_AUTH_GENERIC_OAUTH_CLIENT_SECRET:
    secretKeyRef:
      name: grafana-oidc-secret
      key: client-secret

# Datasources - Victoria Metrics (Prometheus compatible) + Loki
datasources:
  datasources.yaml:
    apiVersion: 1
    datasources:
      - name: VictoriaMetrics
        type: prometheus
        url: http://vmsingle-vmsingle.monitoring.svc:8429
        access: proxy
        isDefault: true
        editable: true
        jsonData:
          timeInterval: "60s"
          httpMethod: "POST"
      # Alertmanager datasource for alert status
      - name: Alertmanager
        type: alertmanager
        url: http://vmalertmanager-vmalertmanager.monitoring.svc:9093
        access: proxy
        jsonData:
          implementation: prometheus
      # Loki datasource for log aggregation
      - name: Loki
        type: loki
        url: http://loki.loki.svc:3100
        access: proxy
        editable: true
        jsonData:
          maxLines: 1000

# Dashboard providers — one per folder so gnet dashboards land in the right place.
# Custom ConfigMap dashboards use the grafana_folder annotation (sidecar.folderAnnotation above).
dashboardProviders:
  dashboardproviders.yaml:
    apiVersion: 1
    providers:
      - name: "kubernetes"
        orgId: 1
        folder: "Kubernetes"
        type: file
        disableDeletion: false
        editable: true
        options:
          path: /var/lib/grafana/dashboards/kubernetes
      - name: "apps"
        orgId: 1
        folder: "Apps"
        type: file
        disableDeletion: false
        editable: true
        options:
          path: /var/lib/grafana/dashboards/apps

# Pre-load dashboards from Grafana.com.
# Removed: victoriametrics (too meta), k8s-apiserver (broken — 1 text panel),
#   k8s-resources-namespace (redundant with kubernetes-cluster),
#   k8s-deployments (redundant with kubernetes-cluster + pod overview),
#   k8s-kubelet (K8s internals, not useful for daily homelab ops),
#   k8s-networking (single-node, minimal value), node-exporter (Node I/O Health
#   custom dashboard covers this homelab better).
# CoreDNS and Pi-hole merged into the custom DNS Health dashboard (ConfigMap).
dashboards:
  kubernetes:
    # Kubernetes Cluster (7249) is provisioned from ConfigMap kubernetes-cluster-homelab.json
    # (patched pod/container cAdvisor labels). Do not re-add gnetId 7249 — it duplicates and breaks top pods/CPU.

    # Drill-down by namespace / pod / container for CPU, memory, and network.
    # Revision 1 uses deprecated cAdvisor labels (pod_name, container_name) — no data on K8s 1.16+.
    # Revision 5+ uses pod/container; keep synced with grafana.com/dashboards/6781 revisions.
    k8s-resources-pod:
      gnetId: 6781
      revision: 5
      datasource: VictoriaMetrics

    # PVC fill predictions, storage class usage, volumes nearing capacity
    persistent-volumes:
      gnetId: 13646
      revision: 2
      datasource: VictoriaMetrics

  apps:
    # Intel GPU (onedr0p exporter): expects metrics igpu_* with job=intel-gpu.
    # The Intel Device Plugin does NOT export Prometheus metrics — deploy intel-gpu-exporter or this stays empty.
    intel-gpu:
      gnetId: 23251
      revision: 1
      datasource: VictoriaMetrics
