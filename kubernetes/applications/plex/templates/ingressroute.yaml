---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: {{ .Release.Name }}
  namespace: {{ .Release.Namespace }}
  annotations:
    kubernetes.io/ingress.class: traefik
    gethomepage.dev/enabled: "true"
    gethomepage.dev/group: "Media"
    gethomepage.dev/name: "Plex"
    gethomepage.dev/icon: "plex"
    gethomepage.dev/description: "Media server with Intel QSV transcoding"
    gethomepage.dev/href: "https://{{ .Values.services.plex.domain }}"
  labels:
    app.kubernetes.io/name: {{ .Release.Name }}
spec:
  entryPoints:
    - websecure
  routes:
    - match: Host(`{{ .Values.services.plex.domain }}`)
      kind: Rule
      priority: 10
      # No Authelia middleware — Plex handles its own authentication.
      # Adding forward-auth here would break Plex mobile/desktop clients.
      # Traffic routed via KEDA HTTP interceptor to support scale-to-zero.
      services:
        - name: keda-add-ons-http-interceptor-proxy
          namespace: keda
          port: 8080
  tls:
    secretName: {{ .Release.Name }}-tls
---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: filebrowser
  namespace: {{ .Release.Namespace }}
  annotations:
    kubernetes.io/ingress.class: traefik
    gethomepage.dev/enabled: "true"
    gethomepage.dev/group: "Media"
    gethomepage.dev/name: "File Browser"
    gethomepage.dev/icon: "filebrowser"
    gethomepage.dev/description: "Media file manager"
    gethomepage.dev/href: "https://{{ .Values.services.filebrowser.domain }}"
  labels:
    app.kubernetes.io/name: filebrowser
spec:
  entryPoints:
    - websecure
  routes:
    - match: Host(`{{ .Values.services.filebrowser.domain }}`)
      kind: Rule
      priority: 10
      middlewares:
        - name: authelia-forward-auth
          namespace: authelia
      services:
        - name: plex
          port: 8080
  tls:
    secretName: {{ .Release.Name }}-tls
