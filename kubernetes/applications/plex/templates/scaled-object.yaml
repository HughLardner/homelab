---
# KEDA ScaledObject for Plex — Prometheus session-aware idle detection.
#
# Plex is woken manually via the Home Assistant "Wake Plex" button, which
# calls the Kubernetes API to set replicas=1. KEDA then takes over:
#
#   - While a stream is active (sessions > 0): Prometheus trigger keeps Plex at 1.
#   - 30 min after the last stream ends: KEDA scales Plex back to 0.
#   - While at 0: exporter sidecar is gone → no metrics → fallback keeps at 0.
#
# Why no cron trigger:
#   A cron trigger would keep Plex running all day (09:00–01:00) even when
#   no one is watching, wasting 1 GB RAM. The HA button provides on-demand
#   wake with no background resource cost.
#
# Wake Plex: press the "Wake Plex" button in Home Assistant.
# The button triggers shell_command.wake_plex which PATCHes the K8s scale API.
apiVersion: keda.sh/v1alpha1
kind: ScaledObject
metadata:
  name: plex
  namespace: {{ .Release.Namespace }}
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: plex
  minReplicaCount: 0
  maxReplicaCount: 1
  # Check triggers every 60s — sufficient for session detection.
  pollingInterval: 60
  # Wait 30 minutes after the last stream ends before scaling down.
  # Prevents churn if a client briefly disconnects mid-stream.
  cooldownPeriod: 1800
  # When Plex is at 0, the exporter sidecar is gone and VictoriaMetrics has
  # no plex_active_sessions data. After 3 consecutive metric failures KEDA
  # falls back to 0 replicas — Plex stays down until the HA button is pressed.
  fallback:
    failureThreshold: 3
    replicas: 0
  triggers:
    - type: prometheus
      metadata:
        serverAddress: http://vmsingle-vmsingle.monitoring.svc:8429
        # sum() collapses the 3 series VMAgent creates (one per container label).
        query: sum(plex_active_sessions{namespace="media"})
        # Scale to 1 when at least 1 session is active.
        threshold: "1"
        # When sessions==0 this trigger is inactive (contributes 0 to desired
        # replicas). Combined with cooldownPeriod, Plex won't scale down until
        # 30 min after the last stream ends.
        activationThreshold: "0"
