---
# Plex session exporter — served as a sidecar alongside the Plex container.
#
# Reads the Plex auth token directly from Preferences.xml (the config volume
# already mounted in the pod) so no separate secret is needed.
#
# Exposes one metric:
#   plex_active_sessions — number of active streams (sessions) reported by
#   the Plex /status/sessions API. KEDA uses this to decide whether Plex
#   should stay running or scale to 0.
#
# Port: 9877/metrics
apiVersion: v1
kind: ConfigMap
metadata:
  name: plex-exporter-script
  namespace: {{ .Release.Namespace }}
data:
  exporter.py: |
    #!/usr/bin/env python3
    """
    Minimal Plex session exporter.

    Reads the Plex auth token from Preferences.xml (avoids a separate secret).
    Serves plex_active_sessions on :9877/metrics in Prometheus text format.
    """
    import re
    from http.server import HTTPServer, BaseHTTPRequestHandler
    from urllib.request import urlopen, Request
    from xml.etree import ElementTree as ET

    PREFS = "/config/Library/Application Support/Plex Media Server/Preferences.xml"
    PLEX_URL = "http://localhost:32400"
    PORT = 9877


    def get_token():
        try:
            with open(PREFS) as f:
                m = re.search(r'PlexOnlineToken="([^"]+)"', f.read())
                return m.group(1) if m else None
        except Exception:
            return None


    def get_sessions(token):
        if not token:
            return 0
        try:
            req = Request(
                f"{PLEX_URL}/status/sessions?X-Plex-Token={token}",
                headers={"Accept": "application/xml"},
            )
            resp = urlopen(req, timeout=5)
            root = ET.fromstring(resp.read())
            # MediaContainer size attribute = total active sessions
            return int(root.attrib.get("size", 0))
        except Exception:
            return 0


    class MetricsHandler(BaseHTTPRequestHandler):
        def do_GET(self):
            if self.path not in ("/metrics", "/"):
                self.send_response(404)
                self.end_headers()
                return
            sessions = get_sessions(get_token())
            body = (
                "# HELP plex_active_sessions Number of active Plex streams\n"
                "# TYPE plex_active_sessions gauge\n"
                f"plex_active_sessions {sessions}\n"
            ).encode()
            self.send_response(200)
            self.send_header("Content-Type", "text/plain; version=0.0.4")
            self.send_header("Content-Length", str(len(body)))
            self.end_headers()
            self.wfile.write(body)

        def log_message(self, fmt, *args):
            pass  # suppress per-request access logs


    HTTPServer(("0.0.0.0", PORT), MetricsHandler).serve_forever()
