---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: plex
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/name: plex
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: plex
  template:
    metadata:
      labels:
        app.kubernetes.io/name: plex
      annotations:
        # Auto-discovered by the pods-with-annotations VMPodScrape in monitoring.
        # VMAgent scrapes :9877/metrics on the plex-exporter sidecar every 60s.
        prometheus.io/scrape: "true"
        prometheus.io/port: "9877"
        prometheus.io/path: "/metrics"
    spec:
      {{- if .Values.priorityClassName }}
      priorityClassName: {{ .Values.priorityClassName }}
      {{- end }}
      # video + render groups required for /dev/dri access
      # GIDs are node-specific — configured in values.yaml
      # Check node render GID with: getent group render
      securityContext:
        supplementalGroups: {{ .Values.securityContext.supplementalGroups | toJson }}
      containers:
        - name: plex
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: plex
              containerPort: 32400
              protocol: TCP
          env:
            - name: TZ
              value: {{ .Values.env.TZ | quote }}
            - name: PUID
              value: {{ .Values.env.PUID | quote }}
            - name: PGID
              value: {{ .Values.env.PGID | quote }}
            - name: PLEX_CLAIM
              valueFrom:
                secretKeyRef:
                  name: plex-claim
                  key: PLEX_CLAIM
                  # optional: true after first successful registration
                  optional: true
            - name: ADVERTISE_IP
              value: "https://{{ .Values.services.plex.domain }}:443"
          volumeMounts:
            - name: config
              mountPath: /config
            - name: media
              mountPath: /media
          resources:
            requests:
              cpu: {{ .Values.resources.requests.cpu }}
              memory: {{ .Values.resources.requests.memory }}
            limits:
              cpu: {{ .Values.resources.limits.cpu }}
              memory: {{ .Values.resources.limits.memory }}
              gpu.intel.com/i915: "1"
          livenessProbe:
            httpGet:
              path: /identity
              port: plex
            initialDelaySeconds: 120
            periodSeconds: 30
            failureThreshold: 5
          readinessProbe:
            httpGet:
              path: /identity
              port: plex
            initialDelaySeconds: 60
            periodSeconds: 15
            failureThreshold: 3
        - name: filebrowser
          image: filebrowser/filebrowser:latest
          securityContext:
            runAsUser: 0
            runAsGroup: 0
          args:
            - --port=8080
            - --root=/media
            - --database=/fb/filebrowser.db
            - --address=0.0.0.0
            - --noauth
          ports:
            - name: filebrowser
              containerPort: 8080
          volumeMounts:
            - name: media
              mountPath: /media
            - name: config
              mountPath: /fb
              subPath: filebrowser-db
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 500m
              memory: 256Mi
        # Plex session exporter sidecar.
        # Reads the Plex token from Preferences.xml (config volume), polls
        # /status/sessions on localhost, and exposes plex_active_sessions on
        # port 9877 for VMAgent and KEDA's Prometheus scaler.
        - name: plex-exporter
          image: python:3.12-alpine
          command: ["python", "/scripts/exporter.py"]
          ports:
            - name: metrics
              containerPort: 9877
          volumeMounts:
            - name: config
              mountPath: /config
            - name: exporter-script
              mountPath: /scripts
          resources:
            requests:
              cpu: 5m
              memory: 20Mi
            limits:
              cpu: 50m
              memory: 40Mi
          readinessProbe:
            httpGet:
              path: /metrics
              port: 9877
            initialDelaySeconds: 10
            periodSeconds: 30
            failureThreshold: 3
      volumes:
        - name: config
          persistentVolumeClaim:
            claimName: plex-config
        - name: media
          persistentVolumeClaim:
            claimName: plex-media
        - name: exporter-script
          configMap:
            name: plex-exporter-script
            defaultMode: 0755
