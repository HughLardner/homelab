# Sealed Secret: plex-claim
# Namespace: media
# Type: Opaque
# Scope: strict
#
# IMPORTANT: This file contains a PLACEHOLDER and must be re-sealed before deploying.
#
# The PLEX_CLAIM token is a short-lived one-time token used to register the Plex server
# with your Plex account on first startup. After first registration, the secret is no
# longer needed (set optional: true is already set in the Deployment).
#
# Steps to generate and seal:
#   1. Visit https://www.plex.tv/claim and copy your claim token (valid for 4 minutes)
#
#   2. Seal the secret:
#      kubectl create secret generic plex-claim \
#        --namespace media \
#        --from-literal=PLEX_CLAIM='claim-xxxxxxxxxxxxxxxxxxxx' \
#        --dry-run=client -o yaml \
#      | kubeseal \
#          --controller-name=sealed-secrets-controller \
#          --controller-namespace=kube-system \
#          --format yaml \
#      > kubernetes/applications/plex/secrets/plex-claim-sealed.yaml
#
#   3. Commit and push — ArgoCD will apply the SealedSecret on next sync
#
# After first successful startup and server registration, the claim token is consumed.
# The Deployment has `optional: true` on the secret ref, so subsequent pod restarts
# will succeed even if this secret is later deleted.

---
apiVersion: bitnami.com/v1alpha1
kind: SealedSecret
metadata:
  name: plex-claim
  namespace: media
spec:
  encryptedData:
    PLEX_CLAIM: REPLACE_WITH_SEALED_VALUE
  template:
    metadata:
      name: plex-claim
      namespace: media
