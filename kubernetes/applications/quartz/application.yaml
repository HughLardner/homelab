---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: quartz
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
  annotations:
    argocd.argoproj.io/sync-wave: "8"
    # Wave 8: Digital garden — depends on obsidian-livesync CouchDB (wave 8, parallel)
spec:
  project: default

  sources:
    # 1. Local Helm chart
    - repoURL: https://github.com/HughLardner/homelab.git
      targetRevision: HEAD
      path: kubernetes/applications/quartz
      helm:
        releaseName: quartz
        valueFiles:
          - $values/config/homelab.yaml
          - values.yaml

    # 2. Values reference
    - repoURL: https://github.com/HughLardner/homelab.git
      targetRevision: HEAD
      ref: values

    # 3. Sealed secrets
    - repoURL: https://github.com/HughLardner/homelab.git
      targetRevision: HEAD
      path: kubernetes/applications/quartz/secrets
      directory:
        recurse: false
        include: "*.yaml"

    # 4. Site config (theme, layout)
    - repoURL: https://github.com/HughLardner/homelab.git
      targetRevision: HEAD
      path: quartz
      directory:
        recurse: false
        include: "*.yaml"

  destination:
    server: https://kubernetes.default.svc
    namespace: quartz

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
    retry:
      limit: 5
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m
