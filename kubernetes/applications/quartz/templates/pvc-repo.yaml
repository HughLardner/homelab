---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: quartz-repo
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/name: quartz
    app.kubernetes.io/component: builder
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: {{ .Values.services.quartz.storage_class | default "longhorn" }}
  resources:
    requests:
      storage: {{ .Values.services.quartz.repo_storage_size | default "2Gi" }}
