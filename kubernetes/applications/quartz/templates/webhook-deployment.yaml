---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: quartz-webhook
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/name: quartz
    app.kubernetes.io/component: webhook
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: quartz
      app.kubernetes.io/component: webhook
  template:
    metadata:
      labels:
        app.kubernetes.io/name: quartz
        app.kubernetes.io/component: webhook
    spec:
      containers:
        - name: webhook
          image: "{{ .Values.builder.image.repository }}:{{ .Values.builder.image.tag }}"
          imagePullPolicy: {{ .Values.builder.image.pullPolicy }}
          command: ["sh", "/config/entrypoint.sh"]
          ports:
            - name: http
              containerPort: 9000
              protocol: TCP
          env:
            - name: TZ
              value: {{ .Values.env.TZ | quote }}
            - name: COUCHDB_HOST
              value: {{ .Values.services.quartz.couchdb_host | quote }}
            - name: COUCHDB_DATABASE
              value: {{ .Values.services.quartz.couchdb_database | quote }}
            - name: COUCHDB_USER
              valueFrom:
                secretKeyRef:
                  name: quartz-couchdb-credentials
                  key: COUCHDB_USER
            - name: COUCHDB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: quartz-couchdb-credentials
                  key: COUCHDB_PASSWORD
          volumeMounts:
            - name: webhook-config
              mountPath: /config/server.js
              subPath: server.js
              readOnly: true
            - name: webhook-config
              mountPath: /config/entrypoint.sh
              subPath: entrypoint.sh
              readOnly: true
            - name: repo-data
              mountPath: /repo
            - name: site-data
              mountPath: /site
            - name: quartz-site-config
              mountPath: /repo/garden/quartz.config.ts
              subPath: quartz.config.ts
              readOnly: true
            - name: quartz-site-config
              mountPath: /repo/garden/quartz.layout.ts
              subPath: quartz.layout.ts
              readOnly: true
          resources:
            {{- toYaml .Values.builder.resources | nindent 12 }}
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 300
            periodSeconds: 30
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
            initialDelaySeconds: 30
            periodSeconds: 30
            failureThreshold: 20
      volumes:
        - name: webhook-config
          configMap:
            name: quartz-webhook-config
            defaultMode: 0755
        - name: repo-data
          persistentVolumeClaim:
            claimName: quartz-repo
        - name: site-data
          persistentVolumeClaim:
            claimName: quartz-site
        - name: quartz-site-config
          configMap:
            name: quartz-site-config
