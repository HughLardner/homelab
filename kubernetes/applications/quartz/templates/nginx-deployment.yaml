---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: quartz-nginx
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/name: quartz
    app.kubernetes.io/component: nginx
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: quartz
      app.kubernetes.io/component: nginx
  template:
    metadata:
      labels:
        app.kubernetes.io/name: quartz
        app.kubernetes.io/component: nginx
    spec:
      initContainers:
        - name: seed-placeholder
          image: busybox:1.36
          command: ["sh", "-c"]
          args:
            - |
              if [ ! -f /site/index.html ]; then
                echo '<html><body><h1>Quartz Digital Garden</h1><p>Waiting for first build...</p></body></html>' > /site/index.html
              fi
          volumeMounts:
            - name: site-data
              mountPath: /site
      containers:
        - name: nginx
          image: "{{ .Values.nginx.image.repository }}:{{ .Values.nginx.image.tag }}"
          imagePullPolicy: {{ .Values.nginx.image.pullPolicy }}
          ports:
            - name: http
              containerPort: 80
              protocol: TCP
          volumeMounts:
            - name: site-data
              mountPath: /usr/share/nginx/html
              readOnly: true
            - name: nginx-config
              mountPath: /etc/nginx/conf.d/default.conf
              subPath: default.conf
              readOnly: true
          resources:
            {{- toYaml .Values.nginx.resources | nindent 12 }}
          livenessProbe:
            tcpSocket:
              port: http
            initialDelaySeconds: 5
            periodSeconds: 30
          readinessProbe:
            tcpSocket:
              port: http
            initialDelaySeconds: 3
            periodSeconds: 10
      volumes:
        - name: site-data
          persistentVolumeClaim:
            claimName: quartz-site
        - name: nginx-config
          configMap:
            name: quartz-nginx-config
