---
apiVersion: v1
kind: Service
metadata:
  name: quartz-webhook
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/name: quartz
    app.kubernetes.io/component: webhook
spec:
  type: ClusterIP
  ports:
    - name: http
      port: 9000
      targetPort: http
      protocol: TCP
  selector:
    app.kubernetes.io/name: quartz
    app.kubernetes.io/component: webhook
