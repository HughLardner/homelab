---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: quartz
  namespace: {{ .Release.Namespace }}
  annotations:
    kubernetes.io/ingress.class: traefik
    gethomepage.dev/enabled: "true"
    gethomepage.dev/name: Digital Garden
    gethomepage.dev/description: Quartz Digital Garden
    gethomepage.dev/group: Applications
    gethomepage.dev/icon: mdi-book-open-page-variant
    gethomepage.dev/href: "https://{{ .Values.services.quartz.domain }}"
    gethomepage.dev/pod-selector: app.kubernetes.io/name=quartz,app.kubernetes.io/component=nginx
  labels:
    app.kubernetes.io/name: quartz
    app.kubernetes.io/component: ingress
spec:
  entryPoints:
    - websecure
  routes:
    - match: Host(`{{ .Values.services.quartz.domain }}`)
      kind: Rule
      priority: 10
      {{- if .Values.services.quartz.auth_enabled }}
      middlewares:
        - name: authelia-forward-auth
          namespace: authelia
      {{- end }}
      services:
        - name: quartz-nginx
          port: 80
  tls:
    secretName: quartz-tls
