---
apiVersion: v1
kind: ConfigMap
metadata:
  name: quartz-webhook-config
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/name: quartz
    app.kubernetes.io/component: webhook
data:
  server.js: |
    const http = require("http");
    const { execSync } = require("child_process");
    const crypto = require("crypto");

    const PORT = 9000;
    const SECRET = process.env.WEBHOOK_SECRET || "";
    const REPO_URL = process.env.REPO_URL || "";
    const REPO_DIR = "/repo/garden";
    const SITE_DIR = "/site";

    function build() {
      try {
        const fs = require("fs");
        if (fs.existsSync(REPO_DIR + "/.git")) {
          console.log("Pulling latest changes...");
          execSync("git pull", { cwd: REPO_DIR, stdio: "inherit" });
        } else {
          console.log("Cloning repository...");
          execSync(`git clone ${REPO_URL} ${REPO_DIR}`, { stdio: "inherit" });
        }

        console.log("Installing dependencies...");
        execSync("npm ci", { cwd: REPO_DIR, stdio: "inherit" });

        console.log("Building Quartz site...");
        execSync(`npx quartz build --output ${SITE_DIR}`, {
          cwd: REPO_DIR,
          stdio: "inherit",
        });

        console.log("Build complete.");
        return true;
      } catch (err) {
        console.error("Build failed:", err.message);
        return false;
      }
    }

    const server = http.createServer((req, res) => {
      if (req.method === "GET" && req.url === "/healthz") {
        res.writeHead(200);
        res.end("ok");
        return;
      }

      if (req.method === "POST" && req.url === "/hooks/build") {
        let body = "";
        req.on("data", (chunk) => (body += chunk));
        req.on("end", () => {
          if (SECRET) {
            const sig = req.headers["x-forgejo-signature"] || "";
            const expected = crypto
              .createHmac("sha256", SECRET)
              .update(body)
              .digest("hex");
            if (sig !== expected) {
              console.log("Webhook signature mismatch, rejecting.");
              res.writeHead(403);
              res.end("Forbidden");
              return;
            }
          }

          console.log("Webhook received, triggering build...");
          res.writeHead(200);
          res.end("Build triggered");

          setImmediate(build);
        });
        return;
      }

      res.writeHead(404);
      res.end("Not found");
    });

    server.listen(PORT, () => console.log(`Webhook server listening on :${PORT}`));
  entrypoint.sh: |
    #!/bin/sh
    set -e
    apk add --no-cache git
    exec node /config/server.js
