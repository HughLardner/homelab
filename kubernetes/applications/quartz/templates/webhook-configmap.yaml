---
apiVersion: v1
kind: ConfigMap
metadata:
  name: quartz-webhook-config
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/name: quartz
    app.kubernetes.io/component: webhook
data:
  server.js: |
    'use strict';
    const http = require('http');
    const { execSync, spawn } = require('child_process');
    const fs = require('fs');
    const path = require('path');

    // ---------------------------------------------------------------------------
    // Configuration
    // ---------------------------------------------------------------------------
    const COUCHDB_HOST     = process.env.COUCHDB_HOST     || 'http://obsidian-livesync.obsidian-livesync.svc:5984';
    const COUCHDB_USER     = process.env.COUCHDB_USER     || '';
    const COUCHDB_PASSWORD = process.env.COUCHDB_PASSWORD || '';
    const COUCHDB_DATABASE = process.env.COUCHDB_DATABASE || 'obsidiannotes';
    const REPO_DIR   = '/repo/garden';
    const CONTENT_DIR = path.join(REPO_DIR, 'content');
    const SITE_DIR   = '/site/output';
    const QUARTZ_REPO = 'https://github.com/jackyzha0/quartz.git';
    const BUILD_DEBOUNCE_MS = 5000;
    const HEALTH_PORT = 9000;

    const AUTH_HEADER = 'Basic ' + Buffer.from(COUCHDB_USER + ':' + COUCHDB_PASSWORD).toString('base64');
    const TEXT_EXTS = new Set(['.md', '.canvas', '.txt', '.csv', '.json', '.yaml', '.yml', '.html', '.css', '.js', '.ts']);

    // ---------------------------------------------------------------------------
    // State
    // ---------------------------------------------------------------------------
    let isReady        = false;
    let buildInProgress = false;
    let buildQueued    = false;
    let buildTimer     = null;

    // ---------------------------------------------------------------------------
    // CouchDB client
    // ---------------------------------------------------------------------------
    function couchFetch(urlPath, timeoutMs) {
      if (!timeoutMs) timeoutMs = 30000;
      return new Promise(function(resolve, reject) {
        var base = new URL(COUCHDB_HOST);
        var opts = {
          hostname: base.hostname,
          port: parseInt(base.port) || 5984,
          path: urlPath,
          method: 'GET',
          headers: { Authorization: AUTH_HEADER },
          timeout: timeoutMs,
        };
        var req = http.request(opts, function(res) {
          var body = '';
          res.on('data', function(c) { body += c; });
          res.on('end', function() {
            try { resolve(JSON.parse(body)); } catch(e) { resolve(body); }
          });
        });
        req.on('error', reject);
        req.on('timeout', function() { req.destroy(new Error('CouchDB timeout')); });
        req.end();
      });
    }

    function fetchAllDocs() {
      return couchFetch('/' + COUCHDB_DATABASE + '/_all_docs?include_docs=true')
        .then(function(data) { return (data.rows || []).map(function(r) { return r.doc; }).filter(Boolean); });
    }

    function getDbInfo() {
      return couchFetch('/' + COUCHDB_DATABASE);
    }

    function watchChanges(since) {
      var seq = encodeURIComponent(String(since));
      // include_docs=true so tombstones carry the original path field,
      // letting us delete the on-disk file immediately without a full resync.
      return couchFetch('/' + COUCHDB_DATABASE + '/_changes?feed=longpoll&since=' + seq + '&include_docs=true&timeout=60000', 70000);
    }

    // Immediately remove on-disk files for documents marked deleted in CouchDB.
    // Called before the full fetchAllDocs/syncContent pass so the Quartz build
    // never sees content that has already been removed from the vault.
    function applyDeletions(changeResults) {
      // A change is a deletion if CouchDB tombstoned it (r.deleted) OR if
      // LiveSync soft-deleted it by setting deleted: true on the doc body.
      var deleted = changeResults.filter(function(r) { return r.doc && (r.deleted || r.doc.deleted); });
      if (!deleted.length) return;

      deleted.forEach(function(r) {
        var docPath = r.doc.path;
        // Fallback: LiveSync stores _id as the lowercase path — attempt to find
        // a matching file on disk by case-insensitive path comparison.
        if (!docPath) {
          console.log('Deletion tombstone has no path field (id=' + r.id + '), relying on pruneDir.');
          return;
        }
        if (!isPublishable(docPath)) return;

        var filePath = path.join(CONTENT_DIR, docPath);
        if (fs.existsSync(filePath)) {
          fs.unlinkSync(filePath);
          console.log('Deleted file for removed doc: ' + filePath);
        } else {
          console.log('Deleted doc had no on-disk file: ' + docPath);
        }
      });
    }

    // ---------------------------------------------------------------------------
    // Content sync — reconstructs vault files from LiveSync doc format
    // ---------------------------------------------------------------------------
    function isTextFile(filePath) {
      return TEXT_EXTS.has(path.extname(filePath).toLowerCase());
    }

    // Returns true only for vault content that should be published by Quartz.
    // Filters out LiveSync internals, Obsidian config, and git metadata that
    // LiveSync syncs to CouchDB but have no place in the rendered site.
    function isPublishable(docPath) {
      // LiveSync prefixes system/hidden paths with "i:" in the path field
      if (docPath.startsWith('i:')) return false;
      // LiveSync version sentinel document
      if (docPath === 'obsydian_livesync_version') return false;
      // Hidden directories (.obsidian, .git, etc.) without i: prefix
      var firstSegment = docPath.split('/')[0];
      if (firstSegment.startsWith('.')) return false;
      return true;
    }

    // Text files: join chunk data strings directly (plain text, no padding issue).
    function reconstructTextData(pathDoc, byId) {
      return (pathDoc.children || []).map(function(id) {
        var child = byId[id];
        return child ? (child.data || '') : '';
      }).join('');
    }

    // Binary files: each chunk is independently base64-encoded with padding.
    // Joining the base64 strings causes Buffer.from() to stop at the first
    // padding character, truncating the file after 1 chunk (~100KB).
    // Fix: decode each chunk individually and concatenate the raw Buffers.
    function reconstructBinaryData(pathDoc, byId) {
      var buffers = (pathDoc.children || []).map(function(id) {
        var child = byId[id];
        if (!child) { console.warn('Missing chunk ' + id + ' for ' + pathDoc.path); return Buffer.alloc(0); }
        return Buffer.from(child.data || '', 'base64');
      });
      return Buffer.concat(buffers);
    }

    function syncContent(docs) {
      var byId = {};
      docs.forEach(function(d) { byId[d._id] = d; });

      var written = 0;
      var skipped = 0;

      // Wipe the content directory before rewriting so that any deleted,
      // renamed, or moved vault notes are guaranteed to be gone. This is
      // simpler and more reliable than trying to diff what changed — for a
      // small vault the full rewrite is fast (<1s) and avoids any edge case
      // where a stale file survives because a tombstone lacked a path field
      // or _all_docs returned it with _deleted: true still in the result set.
      fs.rmSync(CONTENT_DIR, { recursive: true, force: true });
      fs.mkdirSync(CONTENT_DIR, { recursive: true });

      docs.forEach(function(doc) {
        if (!doc.path) return;
        if (doc.type === 'leaf' || doc.type === 'versioninfo') return;
        if (doc._deleted || doc.deleted) return;
        if (!isPublishable(doc.path)) { skipped++; return; }

        var filePath = path.join(CONTENT_DIR, doc.path);
        fs.mkdirSync(path.dirname(filePath), { recursive: true });

        if (isTextFile(doc.path)) {
          fs.writeFileSync(filePath, reconstructTextData(doc, byId), 'utf8');
        } else {
          fs.writeFileSync(filePath, reconstructBinaryData(doc, byId));
        }
        written++;
      });

      console.log('Content synced: ' + written + ' files written, ' + skipped + ' system files skipped');
    }

    // ---------------------------------------------------------------------------
    // Quartz build
    // ---------------------------------------------------------------------------
    function triggerBuild() {
      if (buildTimer) clearTimeout(buildTimer);
      buildTimer = setTimeout(runBuild, BUILD_DEBOUNCE_MS);
    }

    function runBuild() {
      buildTimer = null;
      if (buildInProgress) { buildQueued = true; return; }
      buildInProgress = true;
      console.log('Building Quartz site...');
      var proc = spawn('npx', ['quartz', 'build', '--output', SITE_DIR], { cwd: REPO_DIR, stdio: 'inherit' });
      proc.on('close', function(code) {
        buildInProgress = false;
        if (code === 0) { console.log('Build complete.'); isReady = true; }
        else { console.error('Build exited with code ' + code); }
        if (buildQueued) { buildQueued = false; runBuild(); }
      });
      proc.on('error', function(err) {
        buildInProgress = false;
        console.error('Build spawn error:', err.message);
      });
    }

    // ---------------------------------------------------------------------------
    // Bootstrap Quartz project on first start
    // ---------------------------------------------------------------------------
    function bootstrap() {
      if (fs.existsSync(path.join(REPO_DIR, 'package.json'))) {
        console.log('Quartz project already present, skipping bootstrap.');
        return;
      }
      console.log('Bootstrapping Quartz from GitHub (first start only)...');
      execSync('git clone --depth=1 ' + QUARTZ_REPO + ' ' + REPO_DIR, { stdio: 'inherit', timeout: 180000 });
      execSync('npm ci', { cwd: REPO_DIR, stdio: 'inherit', timeout: 360000 });
      fs.rmSync(CONTENT_DIR, { recursive: true, force: true });
      fs.mkdirSync(CONTENT_DIR);
      console.log('Bootstrap complete.');
    }

    // ---------------------------------------------------------------------------
    // ---------------------------------------------------------------------------
    // Health server (always responds, even during bootstrap)
    // POST /rebuild  — wipes content dir and forces a full re-sync + build.
    //   Use this when renames/deletes in Obsidian are not reflected on the site.
    //   Invoke (no curl in image — use node):
    //     kubectl exec -n quartz deploy/quartz-webhook -- node -e \
    //       "require('http').request({hostname:'localhost',port:9000,path:'/rebuild',method:'POST'},r=>r.resume()).end()"
    // ---------------------------------------------------------------------------
    http.createServer(function(req, res) {
      if (req.url === '/healthz') { res.writeHead(200); res.end('ok'); return; }
      if (req.url === '/readyz')  { res.writeHead(isReady ? 200 : 503); res.end(isReady ? 'ready' : 'initializing'); return; }
      if (req.url === '/rebuild' && req.method === 'GET') {
        var status = buildInProgress ? 'Build in progress...' : (isReady ? 'Site is ready.' : 'Initialising...');
        var statusColour = buildInProgress ? '#f59e0b' : (isReady ? '#10b981' : '#6b7280');
        res.writeHead(200, { 'Content-Type': 'text/html; charset=utf-8' });
        res.end('<!DOCTYPE html><html><head><meta charset="utf-8"><title>Quartz Rebuild</title>' +
          '<style>body{font-family:system-ui,sans-serif;background:#0f172a;color:#e2e8f0;display:flex;align-items:center;justify-content:center;min-height:100vh;margin:0}' +
          '.card{background:#1e293b;border-radius:12px;padding:2rem 2.5rem;max-width:400px;width:100%;text-align:center;box-shadow:0 4px 24px rgba(0,0,0,.4)}' +
          'h1{font-size:1.25rem;margin:0 0 .5rem}p{color:#94a3b8;font-size:.875rem;margin:.25rem 0}' +
          '.status{display:inline-block;padding:.25rem .75rem;border-radius:999px;font-size:.75rem;font-weight:600;background:' + statusColour + '33;color:' + statusColour + ';margin:.75rem 0 1.5rem}' +
          'button{background:#6366f1;color:#fff;border:none;border-radius:8px;padding:.75rem 2rem;font-size:1rem;font-weight:600;cursor:pointer;width:100%;transition:background .2s}' +
          'button:hover{background:#4f46e5}</style></head>' +
          '<body><div class="card"><h1>Quartz Rebuild</h1><p>Fall &amp; Rise Digital Garden</p>' +
          '<div class="status">' + status + '</div>' +
          '<form method="POST" action="/rebuild"><button type="submit">&#9654; Trigger Full Rebuild</button></form></div></body></html>');
        return;
      }
      if (req.url === '/rebuild' && req.method === 'POST') {
        console.log('Manual full rebuild requested via /rebuild...');
        fetchAllDocs().then(function(docs) {
          fs.rmSync(CONTENT_DIR, { recursive: true, force: true });
          fs.mkdirSync(CONTENT_DIR, { recursive: true });
          syncContent(docs);
          runBuild();
          res.writeHead(200, { 'Content-Type': 'text/html; charset=utf-8' });
          res.end('<!DOCTYPE html><html><head><meta charset="utf-8"><title>Quartz Rebuild</title>' +
            '<meta http-equiv="refresh" content="3;url=/rebuild">' +
            '<style>body{font-family:system-ui,sans-serif;background:#0f172a;color:#e2e8f0;display:flex;align-items:center;justify-content:center;min-height:100vh;margin:0}' +
            '.card{background:#1e293b;border-radius:12px;padding:2rem 2.5rem;max-width:400px;width:100%;text-align:center;box-shadow:0 4px 24px rgba(0,0,0,.4)}' +
            'h1{font-size:1.25rem;margin:0 0 .75rem}.ok{font-size:2.5rem;margin:.5rem 0}p{color:#94a3b8;font-size:.875rem}</style></head>' +
            '<body><div class="card"><div class="ok">&#10003;</div><h1>Rebuild Triggered</h1>' +
            '<p>Redirecting back in 3 seconds&hellip;</p></div></body></html>');
        }).catch(function(err) {
          console.error('Rebuild error:', err.message);
          res.writeHead(500); res.end('Rebuild failed: ' + err.message);
        });
        return;
      }
      res.writeHead(404); res.end();
    }).listen(HEALTH_PORT, function() { console.log('Health server on :' + HEALTH_PORT); });

    // ---------------------------------------------------------------------------
    // Main
    // ---------------------------------------------------------------------------
    function watchLoop(since) {
      console.log('Watching CouchDB _changes from seq ' + since + '...');
      watchChanges(since).then(function(result) {
        var results = result.results || [];
        if (results.length > 0) {
          var deletions = results.filter(function(r) { return r.deleted; }).length;
          var updates   = results.length - deletions;
          console.log(results.length + ' change(s) detected (' + updates + ' update(s), ' + deletions + ' deletion(s)), re-syncing...');
          // Eagerly remove files for deleted docs before the full sync so the
          // Quartz build never picks up stale content.
          applyDeletions(results);
          return fetchAllDocs().then(function(docs) {
            syncContent(docs);
            triggerBuild();
            return result.last_seq || since;
          });
        }
        return result.last_seq || since;
      }).then(function(nextSeq) {
        setImmediate(function() { watchLoop(nextSeq); });
      }).catch(function(err) {
        console.error('Changes feed error:', err.message, '- retrying in 10s');
        setTimeout(function() { watchLoop(since); }, 10000);
      });
    }

    getDbInfo().then(function(info) {
      // Capture seq BEFORE full sync to avoid missing concurrent changes
      var since = info.update_seq;

      bootstrap();

      console.log('Initial full sync from CouchDB...');
      return fetchAllDocs().then(function(docs) {
        syncContent(docs);
        runBuild();
        watchLoop(since);
      });
    }).catch(function(err) {
      console.error('Fatal startup error:', err.message);
      process.exit(1);
    });
  entrypoint.sh: |
    #!/bin/sh
    set -e
    apt-get update -qq && apt-get install -y --no-install-recommends git ca-certificates && rm -rf /var/lib/apt/lists/*
    exec node /config/server.js
