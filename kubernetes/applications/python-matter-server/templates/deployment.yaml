---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: matter-server
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/name: matter-server
    app.kubernetes.io/component: matter-protocol
spec:
  replicas: 1
  strategy:
    type: Recreate  # PVC is RWO
  selector:
    matchLabels:
      app.kubernetes.io/name: matter-server
  template:
    metadata:
      labels:
        app.kubernetes.io/name: matter-server
        app.kubernetes.io/component: matter-protocol
    spec:
      priorityClassName: {{ .Values.priorityClassName }}
      # Use host network for mDNS/Matter commissioning
      hostNetwork: {{ .Values.services.python_matter_server.host_network | default .Values.network.hostNetwork }}
      dnsPolicy: {{ if (.Values.services.python_matter_server.host_network | default .Values.network.hostNetwork) }}ClusterFirstWithHostNet{{ else }}ClusterFirst{{ end }}
      containers:
        - name: matter-server
          image: "{{ .Values.image.repository }}:{{ .Values.services.python_matter_server.image_tag | default .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          {{- if or (.Values.services.python_matter_server.primary_interface | default .Values.matterServer.primaryInterface) (gt (len .Values.matterServer.extraArgs) 0) }}
          args:
            {{- with (.Values.services.python_matter_server.primary_interface | default .Values.matterServer.primaryInterface) }}
            - "--primary-interface"
            - {{ . | quote }}
            {{- end }}
            {{- range .Values.matterServer.extraArgs }}
            - {{ . | quote }}
            {{- end }}
          {{- end }}
          ports:
            - name: websocket
              containerPort: {{ .Values.service.port }}
              protocol: TCP
          env:
            - name: MATTER_SERVER_STORAGE_PATH
              value: {{ .Values.persistence.mountPath | quote }}
            - name: MATTER_SERVER_LOG_LEVEL
              value: {{ .Values.services.python_matter_server.log_level | default .Values.matterServer.logLevel | quote }}
            - name: MATTER_SERVER_LISTEN_ADDRESS
              value: {{ .Values.matterServer.listenAddress | quote }}
            {{- range .Values.extraEnv }}
            - name: {{ .name }}
              value: {{ .value | quote }}
            {{- end }}
          volumeMounts:
            - name: data
              mountPath: {{ .Values.persistence.mountPath }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          {{- if .Values.probes.liveness.enabled }}
          livenessProbe:
            {{- omit .Values.probes.liveness "enabled" | toYaml | nindent 12 }}
          {{- end }}
          {{- if .Values.probes.readiness.enabled }}
          readinessProbe:
            {{- omit .Values.probes.readiness "enabled" | toYaml | nindent 12 }}
          {{- end }}
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: matter-server-data
