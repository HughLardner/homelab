# Python Matter Server for Home Assistant
# https://github.com/home-assistant-libs/python-matter-server
#
# Connects Matter/Thread devices to Home Assistant via Matter protocol.
# Works with OTBR for Thread connectivity.
#
# Home Assistant Integration:
# Settings → Devices & Services → Add Integration → Matter (experimental)
# URL: ws://matter-server.home-automation.svc.cluster.local:5580/ws

global:
  domain: silverseekers.org
  cert_issuer: letsencrypt-prod

# Authelia protection for web UI (if enabled in future versions)
auth_enabled: false

priorityClassName: homelab-standard

image:
  repository: ghcr.io/matter-js/python-matter-server
  # Default tag; prefer overriding via config/homelab.yaml services.python_matter_server.image_tag
  tag: "8.1.2"
  pullPolicy: IfNotPresent

# Service configuration
service:
  port: 5580  # Matter server WebSocket port

# Storage for Matter fabric and device credentials
persistence:
  enabled: true
  size: 1Gi
  storageClass: longhorn
  mountPath: /data

network:
  hostNetwork: true

matterServer:
  logLevel: info
  listenAddress: "0.0.0.0"
  primaryInterface: ""
  extraArgs: []

# Resource limits
resources:
  requests:
    cpu: 50m
    memory: 256Mi
  limits:
    cpu: "1"
    memory: 512Mi

extraEnv: []

# Probes
probes:
  liveness:
    enabled: true
    tcpSocket:
      port: 5580
    initialDelaySeconds: 30
    periodSeconds: 30
    timeoutSeconds: 10
    failureThreshold: 3
  readiness:
    enabled: true
    tcpSocket:
      port: 5580
    initialDelaySeconds: 15
    periodSeconds: 10
    timeoutSeconds: 5
    failureThreshold: 3

# Security context
securityContext:
  # Matter server needs network access for commissioning
  capabilities:
    add:
      - NET_ADMIN
      - NET_RAW
