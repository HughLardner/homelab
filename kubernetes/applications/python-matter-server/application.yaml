---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: python-matter-server
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
  annotations:
    argocd.argoproj.io/sync-wave: "7"
    # After Home Assistant (wave 6) and OTBR (wave 7); HA needs Matter integration ready
spec:
  project: default

  sources:
    - repoURL: https://github.com/HughLardner/homelab.git
      targetRevision: HEAD
      path: kubernetes/applications/python-matter-server
      helm:
        releaseName: python-matter-server
        valueFiles:
          - $values/config/homelab.yaml
          - values.yaml

    - repoURL: https://github.com/HughLardner/homelab.git
      targetRevision: HEAD
      ref: values

  destination:
    server: https://kubernetes.default.svc
    namespace: home-automation

  ignoreDifferences:
    - group: apps
      kind: Deployment
      name: matter-server
      namespace: home-automation
      jqPathExpressions:
        - .spec.template.spec.containers[]?.livenessProbe.enabled
        - .spec.template.spec.containers[]?.readinessProbe.enabled

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - RespectIgnoreDifferences=true
    retry:
      limit: 5
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m
