---
# ArgoCD Application: KEDA (Kubernetes Event-Driven Autoscaling)
# Provides scale-to-zero and event-driven scaling for workloads.
# Must be installed before keda-http (the HTTP add-on depends on it).
#
# Sync wave 2: installs after core services but before keda-http (wave 3)
# Namespace: keda (created by the chart)
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: keda
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "2"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default

  source:
    repoURL: https://kedacore.github.io/charts
    targetRevision: 2.16.1
    chart: keda
    helm:
      releaseName: keda
      values: |
        resources:
          operator:
            requests:
              cpu: 25m
              memory: 64Mi
            limits:
              cpu: 500m
              memory: 256Mi
          metricServer:
            requests:
              cpu: 25m
              memory: 64Mi
            limits:
              cpu: 500m
              memory: 256Mi
          webhooks:
            requests:
              cpu: 10m
              memory: 32Mi
            limits:
              cpu: 100m
              memory: 64Mi

        # Prometheus metrics scraping
        prometheus:
          metricServer:
            enabled: true
          operator:
            enabled: true

  destination:
    server: https://kubernetes.default.svc
    namespace: keda

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
    retry:
      limit: 5
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m
