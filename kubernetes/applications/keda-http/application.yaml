---
# ArgoCD Application: KEDA HTTP Add-on
# Provides HTTP-triggered scale-to-zero for web services.
# Intercepts HTTP requests, holds them while the target scales from 0→1,
# then forwards once the pod is Ready.
#
# Sync wave 3: installs after keda operator (wave 2)
# Namespace: keda (shared with main KEDA operator)
#
# After install, apps that use HTTPScaledObject must:
#   1. Have an HTTPScaledObject resource in their namespace
#   2. Update their IngressRoute to point to the interceptor:
#      service: keda-add-ons-http-interceptor-proxy (namespace: keda, port: 8080)
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: keda-http
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "4"
    # Wave 4: HTTP add-on depends on KEDA operator CRDs (wave 3)
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default

  source:
    repoURL: https://kedacore.github.io/charts
    targetRevision: 0.12.2
    chart: keda-add-ons-http
    helm:
      releaseName: keda-http
      values: |
        operator:
          resources:
            requests:
              cpu: 10m
              memory: 32Mi
            limits:
              cpu: 200m
              memory: 128Mi

        interceptor:
          resources:
            requests:
              cpu: 10m
              memory: 32Mi
            limits:
              cpu: 200m
              memory: 128Mi

        scaler:
          resources:
            requests:
              cpu: 10m
              memory: 32Mi
            limits:
              cpu: 100m
              memory: 64Mi

  destination:
    server: https://kubernetes.default.svc
    namespace: keda

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
    retry:
      limit: 5
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m
