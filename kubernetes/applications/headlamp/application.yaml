---
# ArgoCD Application for Headlamp Kubernetes UI
# Deploys: Headlamp web UI with cluster-admin access for pod/resource management
#
# Auth: Authelia SSO gates access; Headlamp auto-authenticates to the cluster
#       via its ServiceAccount (cluster-admin). No token prompt in the UI.
# Access: https://headlamp.silverseekers.org
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: headlamp
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "9"
    # Wave 9: K8s UI — optional tooling, starts last
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default

  sources:
    # 1. Upstream Headlamp Helm chart (Deployment, Service, RBAC, ServiceAccount)
    - repoURL: https://kubernetes-sigs.github.io/headlamp/
      targetRevision: 0.40.0
      chart: headlamp
      helm:
        releaseName: headlamp
        values: |
          replicaCount: 1

          image:
            registry: ghcr.io
            repository: headlamp-k8s/headlamp
            pullPolicy: IfNotPresent

          # Use kubeconfig instead of -in-cluster so the SA token is used
          # automatically — no login prompt. Authelia handles user auth.
          config:
            inCluster: false
            extraArgs:
              - "-kubeconfig=/kubeconfig/config"

          # Grant cluster-admin so Headlamp can view and manage all resources
          clusterRoleBinding:
            create: true
            clusterRoleName: cluster-admin

          service:
            type: ClusterIP
            port: 4466

          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 500m
              memory: 128Mi

          priorityClassName: homelab-interactive

          # Disable built-in ingress — Traefik IngressRoute handles this
          ingress:
            enabled: false

          # Mount the kubeconfig ConfigMap into the pod
          volumes:
            - name: kubeconfig
              configMap:
                name: headlamp-kubeconfig
          volumeMounts:
            - name: kubeconfig
              mountPath: /kubeconfig
              readOnly: true

          # Create the kubeconfig ConfigMap alongside the chart resources.
          # Uses tokenFile so the kubelet-refreshed SA token is always current.
          extraManifests:
            - |
              apiVersion: v1
              kind: ConfigMap
              metadata:
                name: headlamp-kubeconfig
              data:
                config: |
                  apiVersion: v1
                  kind: Config
                  clusters:
                  - cluster:
                      certificate-authority: /var/run/secrets/kubernetes.io/serviceaccount/ca.crt
                      server: https://kubernetes.default.svc
                    name: homelab
                  contexts:
                  - context:
                      cluster: homelab
                      user: headlamp-sa
                    name: homelab
                  current-context: homelab
                  users:
                  - name: headlamp-sa
                    user:
                      tokenFile: /var/run/secrets/kubernetes.io/serviceaccount/token

    # 2. Values reference (this repo) — referenced by $values
    - repoURL: https://github.com/HughLardner/homelab.git
      targetRevision: HEAD
      ref: values

    # 3. Local chart — Certificate + IngressRoute via Traefik
    - repoURL: https://github.com/HughLardner/homelab.git
      targetRevision: HEAD
      path: kubernetes/applications/headlamp
      helm:
        releaseName: headlamp-ingress
        valueFiles:
          - $values/config/homelab.yaml

  destination:
    server: https://kubernetes.default.svc
    namespace: headlamp

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
    retry:
      limit: 5
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m
