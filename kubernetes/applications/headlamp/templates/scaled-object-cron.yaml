---
# ScaledObject (cron): hard scale-down 00:00–07:00 Europe/Dublin.
apiVersion: keda.sh/v1alpha1
kind: ScaledObject
metadata:
  name: headlamp-cron
  namespace: {{ .Release.Namespace }}
spec:
  scaleTargetRef:
    name: headlamp
    kind: Deployment
    apiVersion: apps/v1
  minReplicaCount: 0
  maxReplicaCount: 1
  cooldownPeriod: 30
  triggers:
    - type: cron
      metadata:
        timezone: Europe/Dublin
        start: "0 7 * * *"
        end: "0 0 * * *"
        desiredReplicas: "1"
