---
# Headlamp IngressRoute
# Access at: https://{{ .Values.services.headlamp.domain }}
# Protected by Authelia SSO
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: headlamp
  namespace: {{ .Release.Namespace }}
  annotations:
    kubernetes.io/ingress.class: traefik
    # Homepage service discovery
    gethomepage.dev/enabled: "true"
    gethomepage.dev/name: "Headlamp"
    gethomepage.dev/group: "Kubernetes"
    gethomepage.dev/icon: "kubernetes"
    gethomepage.dev/description: "Kubernetes Cluster Management UI"
    gethomepage.dev/href: "https://{{ .Values.services.headlamp.domain }}"
    # K8s pod status only — avoids Homepage HTTP checks waking Headlamp (KEDA scale-to-zero).
    gethomepage.dev/pod-selector: app.kubernetes.io/name=headlamp
spec:
  entryPoints:
    - websecure
  routes:
    - match: Host(`{{ .Values.services.headlamp.domain }}`)
      kind: Rule
      middlewares:
        - name: authelia-forward-auth
          namespace: authelia
      # Traffic routed via KEDA HTTP interceptor to support scale-to-zero.
      services:
        - name: keda-add-ons-http-interceptor-proxy
          namespace: keda
          port: 8080
  tls:
    secretName: headlamp-tls
