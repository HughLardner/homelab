---
# HTTPScaledObject: scale Headlamp to zero when idle, wake on first HTTP request.
# Cold start ~8s. Requires keda + keda-http ArgoCD applications.
apiVersion: http.keda.sh/v1alpha1
kind: HTTPScaledObject
metadata:
  name: headlamp
  namespace: {{ .Release.Namespace }}
spec:
  hosts:
    - {{ .Values.services.headlamp.domain }}
  pathPrefixes:
    - /
  scaleTargetRef:
    name: headlamp
    kind: Deployment
    apiVersion: apps/v1
    service: headlamp
    port: 4466
  replicas:
    min: 0
    max: 1
  # Scale down after 30 minutes of no HTTP traffic
  scaledownPeriod: 1800
