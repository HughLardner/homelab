---
# Headlamp TLS Certificate
# Automatically issued by cert-manager
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: headlamp-tls
  namespace: {{ .Release.Namespace }}
spec:
  secretName: headlamp-tls
  issuerRef:
    name: {{ .Values.services.headlamp.cert_issuer | default .Values.global.cert_issuer }}
    kind: ClusterIssuer
  dnsNames:
    - {{ .Values.services.headlamp.domain }}
