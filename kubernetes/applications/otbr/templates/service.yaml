---
apiVersion: v1
kind: Service
metadata:
  name: otbr
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/name: otbr
spec:
  type: ClusterIP
  ports:
    - name: web
      port: 80
      targetPort: {{ .Values.services.otbr.web_ui_port | default 80 }}
      protocol: TCP
    - name: rest-api
      port: 8081
      targetPort: {{ .Values.services.otbr.rest_api_port | default 8081 }}
      protocol: TCP
  selector:
    app.kubernetes.io/name: otbr
