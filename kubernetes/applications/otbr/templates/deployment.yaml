---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: otbr
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/name: otbr
spec:
  replicas: 1
  strategy:
    type: Recreate  # Thread network state is singular
  selector:
    matchLabels:
      app.kubernetes.io/name: otbr
  template:
    metadata:
      labels:
        app.kubernetes.io/name: otbr
    spec:
      priorityClassName: {{ .Values.priorityClassName }}
      hostNetwork: true  # Required for mDNS
      dnsPolicy: ClusterFirstWithHostNet
      containers:
        - name: otbr
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          securityContext:
            privileged: true
            capabilities:
              add:
                - NET_ADMIN
                - NET_RAW
                - SYS_MODULE
          command:
            - /bin/bash
            - -c
            - |
              # Start dbus
              mkdir -p /var/run/dbus
              dbus-daemon --system --nofork --nopidfile &

              # Start socat for TCP RCP connection
              if [ ! -z "${RCP_HOST}" ]; then
                echo "Starting socat for TCP connection to ${RCP_HOST}:${RCP_PORT}..."
                socat -d -d -ly \
                  pty,link=/tmp/ttyOTBR,raw,echo=0,wait-slave,ignoreeof \
                  tcp:${RCP_HOST}:${RCP_PORT},nodelay,keepalive,forever,interval=5 &

                # Wait for symlink to be created
                echo "Waiting for /tmp/ttyOTBR to be ready..."
                for i in {1..10}; do
                  if [ -L /tmp/ttyOTBR ]; then
                    echo "/tmp/ttyOTBR is ready"
                    break
                  fi
                  sleep 0.5
                done
              fi

              # Ensure backbone interface has IPv6 enabled
              echo "Enabling IPv6 on ${OTBR_BACKBONE_IF}..."
              sysctl -w net.ipv6.conf.${OTBR_BACKBONE_IF}.disable_ipv6=0 || true
              sysctl -w net.ipv6.conf.all.disable_ipv6=0 || true
              sysctl -w net.ipv6.conf.default.disable_ipv6=0 || true

              # Enable IPv6 forwarding
              sysctl -w net.ipv6.conf.all.forwarding=1 || true
              sysctl -w net.ipv6.conf.${OTBR_BACKBONE_IF}.forwarding=1 || true

              # Ensure interface is up
              ip link set ${OTBR_BACKBONE_IF} up || true

              # Wait a moment for IPv6 to initialize
              sleep 2

              # Create ipsets (OTBR expects these to exist)
              ipset create -exist otbr-ingress-deny-src hash:net family inet6 || true
              ipset create -exist otbr-ingress-deny-src-swap hash:net family inet6 || true
              ipset create -exist otbr-ingress-allow-dst hash:net family inet6 || true
              ipset create -exist otbr-ingress-allow-dst-swap hash:net family inet6 || true

              # Set ip6tables policy
              ip6tables -P FORWARD ACCEPT 2>/dev/null || true

              # Wait for /var/lib/thread directory
              mkdir -p /var/lib/thread

              # Start otbr-agent WITHOUT TREL (only RCP radio)
              echo "Starting otbr-agent..."
              /usr/sbin/otbr-agent \
                -I wpan0 \
                -B ${OTBR_BACKBONE_IF} \
                --rest-listen-address 0.0.0.0 \
                --rest-listen-port ${OTBR_REST_LISTEN_PORT} \
                -d6 -v -s \
                "spinel+hdlc+uart:///tmp/ttyOTBR?uart-baudrate=460800" &

              AGENT_PID=$!

              # Wait for otbr-agent to be ready (check REST API)
              echo "Waiting for otbr-agent REST API..."
              for i in {1..30}; do
                if curl -s http://localhost:${OTBR_REST_LISTEN_PORT}/node/state >/dev/null 2>&1; then
                  echo "otbr-agent is ready"
                  break
                fi
                sleep 1
              done

              # Start otbr-web if enabled
              if [ "${OTBR_WEB_ENABLE}" = "1" ]; then
                echo "Starting otbr-web on port ${OTBR_WEB_PORT}..."
                /usr/sbin/otbr-web \
                  -I wpan0 \
                  -d6 \
                  -s \
                  -p ${OTBR_WEB_PORT} \
                  -a 0.0.0.0 &
              fi

              # Wait for otbr-agent to exit (keep container running)
              wait $AGENT_PID
          ports:
            - name: web
              containerPort: {{ .Values.services.otbr.web_ui_port | default 80 }}
              protocol: TCP
            - name: rest-api
              containerPort: {{ .Values.services.otbr.rest_api_port | default 8081 }}
              protocol: TCP
          env:
            - name: RCP_HOST
              value: {{ .Values.services.otbr.thread_rcp_url | quote }}
            - name: RCP_PORT
              value: "6638"
            - name: OTBR_RCP_ADDITIONAL_ARGS
              value: ""
            - name: OTBR_BACKBONE_IF
              value: {{ .Values.services.otbr.mdns_interface | default "ens18" | quote }}
            - name: OTBR_WEB_ENABLE
              value: "1"
            - name: OTBR_WEB_PORT
              value: {{ .Values.services.otbr.web_ui_port | default 80 | quote }}
            - name: OTBR_REST_LISTEN_PORT
              value: {{ .Values.services.otbr.rest_api_port | default 8081 | quote }}
          volumeMounts:
            - name: data
              mountPath: /var/lib/thread
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          livenessProbe:
            tcpSocket:
              port: rest-api
            initialDelaySeconds: 30
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /node/state
              port: rest-api
            initialDelaySeconds: 15
            periodSeconds: 10
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: otbr-data
