---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: otbr
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/name: otbr
spec:
  replicas: 1
  strategy:
    type: Recreate  # Thread network state is singular
  selector:
    matchLabels:
      app.kubernetes.io/name: otbr
  template:
    metadata:
      labels:
        app.kubernetes.io/name: otbr
    spec:
      priorityClassName: {{ .Values.priorityClassName }}
      hostNetwork: true  # Required for mDNS
      dnsPolicy: ClusterFirstWithHostNet
      containers:
        - name: otbr
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          securityContext:
            privileged: true
            capabilities:
              add:
                - NET_ADMIN
                - NET_RAW
                - SYS_MODULE
          ports:
            - name: web
              containerPort: {{ .Values.services.otbr.web_ui_port | default 80 }}
              protocol: TCP
            - name: rest-api
              containerPort: {{ .Values.services.otbr.rest_api_port | default 8081 }}
              protocol: TCP
          env:
            - name: RCP_HOST
              value: {{ .Values.services.otbr.thread_rcp_url | quote }}
            - name: RCP_PORT
              value: "6638"
            - name: FLOW_CONTROL
              value: "false"
            - name: BACKBONE_INTERFACE
              value: {{ .Values.services.otbr.mdns_interface | default "ens18" | quote }}
            - name: NAT64
              value: "0"
            - name: DNS64
              value: "0"
            - name: FIREWALL
              value: "0"
            - name: WEB_GUI
              value: "1"
            - name: REST_API
              value: "1"
            - name: OTBR_WEB_PORT
              value: {{ .Values.services.otbr.web_ui_port | default 80 | quote }}
          volumeMounts:
            - name: data
              mountPath: /var/lib/thread
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          livenessProbe:
            tcpSocket:
              port: rest-api
            initialDelaySeconds: 30
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /node/state
              port: rest-api
            initialDelaySeconds: 15
            periodSeconds: 10
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: otbr-data
