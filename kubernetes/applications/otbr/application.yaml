---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: otbr
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
  annotations:
    argocd.argoproj.io/sync-wave: "7"
    # After Home Assistant (wave 6); HA can then point its Thread integration at OTBR
spec:
  project: default

  sources:
    - repoURL: https://github.com/HughLardner/homelab.git
      targetRevision: HEAD
      path: kubernetes/applications/otbr
      helm:
        releaseName: otbr
        valueFiles:
          - $values/config/homelab.yaml
          - values.yaml

    - repoURL: https://github.com/HughLardner/homelab.git
      targetRevision: HEAD
      ref: values

  destination:
    server: https://kubernetes.default.svc
    namespace: home-automation

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
    retry:
      limit: 5
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m
