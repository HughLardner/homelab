---
# ArgoCD Application for NetworkPolicies
# Network isolation for namespaces
# Sync Wave 1: Lightweight, no storage deps
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: network-policies
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "1"
    # Wave 1: NetworkPolicies are lightweight and have no storage deps
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default

  source:
    repoURL: https://github.com/HughLardner/homelab.git
    targetRevision: HEAD
    path: kubernetes/services/network-policies/templates
    directory:
      recurse: false

  destination:
    server: https://kubernetes.default.svc
    namespace: default

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    retry:
      limit: 5
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m
