---
# ArgoCD Application for Resource Policies
# LimitRange and ResourceQuota for resource governance
# Sync Wave 1: Lightweight, no deps — must exist before workloads are scheduled
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: resource-policies
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "1"
    # Wave 1: PriorityClasses needed before any pod is scheduled
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default

  source:
    repoURL: https://github.com/HughLardner/homelab.git
    targetRevision: HEAD
    path: kubernetes/services/resource-policies/templates

  destination:
    server: https://kubernetes.default.svc
    namespace: default

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    retry:
      limit: 5
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m
