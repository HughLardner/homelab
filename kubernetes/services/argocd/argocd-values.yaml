---
# ArgoCD Helm Values Configuration
# Install with: helm upgrade --install argocd argo/argo-cd --namespace argocd --values values.yaml

# Global settings
global:
  # Domain for the ArgoCD server
  domain: "{{ argocd_domain }}"

# Server configuration
server:
  # Replicas for high availability
  replicas: {{ argocd_replicas | default(1) }}

  # Service configuration
  service:
    type: LoadBalancer
    servicePortHttp: 80
    servicePortHttps: 443
    annotations:
      # Static IP from MetalLB pool
      metallb.io/loadBalancerIPs: "192.168.10.151"
      # Homepage auto-discovery
      gethomepage.dev/enabled: "true"
      gethomepage.dev/group: "Infrastructure"
      gethomepage.dev/name: "ArgoCD"
      gethomepage.dev/icon: "argocd"
      gethomepage.dev/description: "GitOps Continuous Delivery"
      gethomepage.dev/href: "https://{{ argocd_domain }}"

  # Resource limits
  resources:
    requests:
      cpu: "100m"
      memory: "256Mi"
    limits:
      cpu: "500m"
      memory: "512Mi"

# Controller configuration
controller:
  replicas: {{ argocd_controller_replicas | default(1) }}

  resources:
    requests:
      cpu: "100m"
      memory: "256Mi"
    limits:
      cpu: "1000m"
      memory: "1Gi"

# Repo server configuration
repoServer:
  replicas: {{ argocd_repo_replicas | default(1) }}

  resources:
    requests:
      cpu: "100m"
      memory: "128Mi"
    limits:
      cpu: "500m"
      memory: "512Mi"

# ApplicationSet controller
applicationSet:
  replicas: {{ argocd_appset_replicas | default(1) }}

  resources:
    requests:
      cpu: "50m"
      memory: "64Mi"
    limits:
      cpu: "200m"
      memory: "256Mi"

# Redis configuration (used for caching)
redis:
  resources:
    requests:
      cpu: "50m"
      memory: "64Mi"
    limits:
      cpu: "200m"
      memory: "256Mi"

# Dex configuration (OIDC provider - disabled, using local auth)
dex:
  enabled: false

# Notifications controller (optional)
notifications:
  enabled: {{ argocd_notifications_enabled | default('false') }}

# Configs
configs:
  # Params configuration (argocd-cmd-params-cm)
  params:
    # Run in insecure mode - TLS termination at Traefik ingress
    server.insecure: true
    # Skip TLS verification for OIDC (for Let's Encrypt staging certs)
    oidc.tls.insecure.skip.verify: true

    # =========================================================================
    # API Server Load Reduction
    # =========================================================================
    # Default status-processors=20 + operation-processors=10 means 30 concurrent
    # API calls from ArgoCD alone on a 4-core/12GB single-node cluster. With 29
    # apps that causes API saturation. These values are tuned for the cluster size.
    controller.status.processors: "5"
    controller.operation.processors: "2"

    # Increase self-heal timeout from 5s to 30s to dampen reactive API storms.
    # 5s means every resource fluctuation triggers immediate reconciliation.
    controller.self.heal.timeout.seconds: "30"

    # Cap repo-server parallelism (default 0 = unlimited). Prevents burst Helm
    # template rendering from saturating CPU during simultaneous app syncs.
    reposerver.parallelism.limit: "3"

  # Secret configuration
  secret:
    # Create the argocd-secret (password will be set by Ansible)
    createSecret: true

  # ConfigMap configuration
  cm:
    # Admin account enabled
    admin.enabled: "true"

    # URL for the ArgoCD server (used in notifications and webhooks)
    url: "https://{{ argocd_domain }}"

    # Disable anonymous access
    users.anonymous.enabled: "false"

    # Enable status badge
    statusbadge.enabled: "true"

    # Resource tracking method
    application.resourceTrackingMethod: annotation

    # Disable continuous reconciliation polling — rely on GitHub webhooks for
    # immediate sync on push, and the daily-sync CronJob for drift detection.
    # A large fallback interval (24h) prevents any "never sync" edge cases.
    timeout.reconciliation: "24h"

    # =========================================================================
    # Authelia SSO Integration (OIDC)
    # =========================================================================
    # Client secret is stored in argocd-oidc-secret.
    # rootCA is conditionally included for Let's Encrypt staging certificates
    oidc.config: |
      name: Authelia
      issuer: https://{{ services.authelia.domain | default('auth.' + global.domain) }}
      clientID: argocd
      clientSecret: $oidc.authelia.clientSecret
      # Explicitly set auth method to match Authelia client config
      tokenEndpointAuthMethod: client_secret_basic
      requestedScopes:
        - openid
        - profile
        - email
        - groups
{% if global.cert_issuer == 'letsencrypt-staging' %}
