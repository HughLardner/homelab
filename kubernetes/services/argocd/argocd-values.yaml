  # RBAC configuration
  # Include full built-in policy so role:readonly has applications/logs get (fixes "Unable to load data: permission denied" in UI).
  # Ref: https://github.com/argoproj/argo-cd/blob/master/assets/builtin-policy.csv
  rbac:
    policy.default: role:readonly
    policy.csv: |
      # role:readonly - read and view logs
      p, role:readonly, applications, get, */*, allow
      p, role:readonly, applicationsets, get, */*, allow
      p, role:readonly, certificates, get, *, allow
      p, role:readonly, clusters, get, *, allow
      p, role:readonly, repositories, get, *, allow
      p, role:readonly, write-repositories, get, *, allow
      p, role:readonly, projects, get, *, allow
      p, role:readonly, accounts, get, *, allow
      p, role:readonly, gpgkeys, get, *, allow
      p, role:readonly, logs, get, */*, allow
      # role:admin - full access (inherits readonly via g, role:admin, role:readonly below)
      p, role:admin, applications, create, */*, allow
      p, role:admin, applications, update, */*, allow
      p, role:admin, applications, update/*, */*, allow
      p, role:admin, applications, delete, */*, allow
      p, role:admin, applications, delete/*, */*, allow
      p, role:admin, applications, sync, */*, allow
      p, role:admin, applications, override, */*, allow
      p, role:admin, applications, action/*, */*, allow
      p, role:admin, applicationsets, get, */*, allow
      p, role:admin, applicationsets, create, */*, allow
      p, role:admin, applicationsets, update, */*, allow
      p, role:admin, applicationsets, delete, */*, allow
      p, role:admin, certificates, create, *, allow
      p, role:admin, certificates, update, *, allow
      p, role:admin, certificates, delete, *, allow
      p, role:admin, clusters, create, *, allow
      p, role:admin, clusters, update, *, allow
      p, role:admin, clusters, delete, *, allow
      p, role:admin, repositories, create, *, allow
      p, role:admin, repositories, update, *, allow
      p, role:admin, repositories, delete, *, allow
      p, role:admin, write-repositories, create, *, allow
      p, role:admin, write-repositories, update, *, allow
      p, role:admin, write-repositories, delete, *, allow
      p, role:admin, projects, create, *, allow
      p, role:admin, projects, update, *, allow
      p, role:admin, projects, delete, *, allow
      p, role:admin, accounts, update, *, allow
      p, role:admin, gpgkeys, create, *, allow
      p, role:admin, gpgkeys, delete, *, allow
      p, role:admin, exec, create, */*, allow
      # Role inheritance and user/group assignments
      g, role:admin, role:readonly
      g, admin, role:admin
      # Authelia group mappings
      g, argocd_admins, role:admin
      g, admins, role:admin

  # Repository credentials (add your repos here)
  repositories:
    homelab-repo:
      name: homelab
      url: "{{ argocd_github_repo_url }}"
      type: git
      password: "{{ argocd_github_token }}"
      username: git

  # Credential templates for GitHub (matches any github.com repo)
  credentialTemplates:
    github-https:
      url: https://github.com
      password: "{{ argocd_github_token }}"
      username: git

# Metrics for Prometheus
metrics:
  enabled: true
  serviceMonitor:
    enabled: false # Enable if using Prometheus Operator
