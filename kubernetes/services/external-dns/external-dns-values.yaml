---
# External-DNS Helm Values
# Cloudflare DNS provider

# Cloudflare provider configuration
provider:
  name: cloudflare

# Domain filter - only manage records for this domain
domainFilters:
  - silverseekers.org

# Sync policy: sync (creates and deletes records) or upsert-only
policy: sync

# Source types to watch
# traefik-proxy removed — modern Traefik uses traefik.io/v1alpha1 (not the old
# traefik.containo.us group) and external-dns times out trying to list the old API,
# causing a fatal crash. IngressRoute hostnames are already covered by the Cloudflare
# tunnel (cloudflared) so DNS auto-discovery via external-dns is not needed for them.
sources:
  - ingress
  - service

# Cloudflare specific settings - use API Token (not API Key + Email)
env:
  - name: CF_API_TOKEN
    valueFrom:
      secretKeyRef:
        name: external-dns-cloudflare-token
        key: cloudflare_api_token

# Extra args for Cloudflare
extraArgs: []

# Log level
logLevel: info

# Resources
resources:
  requests:
    cpu: 50m
    memory: 64Mi
  limits:
    cpu: 100m
    memory: 128Mi

# Service account
serviceAccount:
  create: true

# RBAC
rbac:
  create: true

# Metrics
metrics:
  enabled: true
  serviceMonitor:
    enabled: true

