---
# Homelab Configuration - Single Source of Truth
# This file is consumed by Terraform, Ansible, Helm, and ArgoCD
# All tools read from this file to ensure consistency

# =============================================================================
# Cluster Configuration
# =============================================================================
cluster:
  name: homelab
  id: 1

# =============================================================================
# Infrastructure Configuration (Proxmox VMs)
# =============================================================================
infrastructure:
  node_count: 1 # Single node cluster (saves 8GB RAM on Proxmox)
  node_start_ip: 20 # First node IP: subnet_prefix.node_start_ip
  cores: 4 # 4 cores for single node (plenty for homelab)
  cpu_type: host # Use host CPU for best performance
  memory: 12288 # 12GB for single node (leaves ~3GB for Proxmox)
  disk_size: 100 # 100GB disk (more space for local-path storage)
  vlan_id: null # No VLAN tag - handled by Unifi switch port
  subnet_prefix: "192.168.10"
  gateway: "192.168.10.1"
  dns_servers:
    - "1.1.1.1"
    - "1.0.0.1"
  kube_vip: "192.168.10.15"
  kube_vip_hostname: homelab-api
  lb_cidrs: "192.168.10.150/28"
  ssh_user: ubuntu

# =============================================================================
# Global Settings
# =============================================================================
global:
  domain: silverseekers.org
  cert_issuer: letsencrypt-prod # Options: letsencrypt-staging, letsencrypt-prod
  email: hughlardner@gmail.com
  cloudflare_email: hughlardner@gmail.com

# =============================================================================
# Service Configuration
# =============================================================================
services:
  # ---------------------------------------------------------------------------
  # Traefik Ingress Controller
  # ---------------------------------------------------------------------------
  traefik:
    domain: traefik.silverseekers.org
    replicas: 2
    service_type: LoadBalancer
    storage_class: longhorn
    traefik_ip: "192.168.10.150"

  # ---------------------------------------------------------------------------
  # ArgoCD GitOps
  # ---------------------------------------------------------------------------
  argocd:
    domain: argocd.silverseekers.org
    replicas: 1
    github_repo_url: https://github.com/HughLardner/homelab.git

  # ---------------------------------------------------------------------------
  # Authelia SSO
  # ---------------------------------------------------------------------------
  authelia:
    domain: auth.silverseekers.org

  # ---------------------------------------------------------------------------
  # Grafana Monitoring
  # ---------------------------------------------------------------------------
  grafana:
    domain: grafana.silverseekers.org
    storage_size: 5Gi

  # ---------------------------------------------------------------------------
  # Longhorn Storage
  # ---------------------------------------------------------------------------
  longhorn:
    domain: longhorn.silverseekers.org
    replica_count: 1
    # Persistent data disk - survives cluster rebuilds
    # Mounted from Proxmox LV: /dev/pve/k8s-persistent-data (200GB)
    data_path: /mnt/longhorn-data
    ui_service_type: LoadBalancer

  # ---------------------------------------------------------------------------
  # Monitoring Stack (VictoriaMetrics)
  # ---------------------------------------------------------------------------
  monitoring:
    storage_class: longhorn
    prometheus_storage_size: 10Gi
    prometheus_retention: 15d
    alertmanager_storage_size: 2Gi

  # ---------------------------------------------------------------------------
  # MetalLB Load Balancer
  # ---------------------------------------------------------------------------
  metallb:
    ipv4_pools: "192.168.10.150/28"

  # ---------------------------------------------------------------------------
  # External DNS
  # ---------------------------------------------------------------------------
  external_dns:
    domain: silverseekers.org
    provider: cloudflare
    policy: sync

  # ---------------------------------------------------------------------------
  # Garage Object Storage (for Velero backups)
  # ---------------------------------------------------------------------------
  # Replaced MinIO with Garage - AGPL licensed, designed for homelabs
  # https://garagehq.deuxfleurs.fr/
  garage:
    domain: s3.silverseekers.org
    storage_size: 50Gi
    bucket: velero

  # ---------------------------------------------------------------------------
  # Velero Backup
  # ---------------------------------------------------------------------------
  velero:
    backup_schedule: "0 2 * * *"
    retention_days: 14

  # ---------------------------------------------------------------------------
  # Loki Logging
  # ---------------------------------------------------------------------------
  loki:
    storage_class: longhorn
    storage_size: 10Gi
    retention_days: 14

  # ---------------------------------------------------------------------------
  # Cloudflare Tunnel
  # Only fallandrise.silverseekers.org is publicly exposed (read-only Quartz site).
  # Configure matching public hostname in Cloudflare Zero Trust dashboard.
  # ---------------------------------------------------------------------------
  cloudflared:
    tunnel_name: homelab-tunnel
    replicas: 1
    exposed_hostnames:
      - hostname: fallandrise.silverseekers.org
        service: http://traefik.traefik.svc:80
    default_origin: "http_status:404"

  # ---------------------------------------------------------------------------
  # Homepage Dashboard
  # ---------------------------------------------------------------------------
  homepage:
    domain: home.silverseekers.org
    auth_enabled: true # Toggle Authelia SSO protection
    title: "Homelab Dashboard"
    # Proxmox integration
    proxmox_url: "https://192.168.10.100:8006"
    proxmox_node: "pve"

  # ---------------------------------------------------------------------------
  # Mosquitto MQTT Broker
  # ---------------------------------------------------------------------------
  mosquitto:
    storage_size: 1Gi
    storage_class: longhorn

  # ---------------------------------------------------------------------------
  # Node-RED
  # ---------------------------------------------------------------------------
  node_red:
    domain: node-red.silverseekers.org
    auth_enabled: true
    storage_size: 2Gi
    storage_class: longhorn

  # ---------------------------------------------------------------------------
  # Zigbee2MQTT
  # ---------------------------------------------------------------------------
  # SMLIGHT SLZB coordinator (CC2674P10) connected via TCP
  zigbee2mqtt:
    domain: zigbee2mqtt.silverseekers.org
    auth_enabled: true
    storage_size: 2Gi
    storage_class: longhorn
    serial_adapter: zstack
    serial_port: "tcp://192.168.40.185:7638"
    transmit_power: 20

  # ---------------------------------------------------------------------------
  # Pi-hole DNS & Ad Blocker
  # ---------------------------------------------------------------------------
  pihole:
    domain: pihole.silverseekers.org
    auth_enabled: true
    storage_size: 1Gi
    storage_class: longhorn
    dns_ip: "192.168.10.152"
    upstream_dns_1: "1.1.1.1"
    upstream_dns_2: "1.0.0.1"

  # ---------------------------------------------------------------------------
  # Filebrowser — web UI for uploading/managing Plex media
  # Runs as a sidecar in the Plex pod (shares plex-media RWO PVC)
  # Protected by Authelia; accessible at files.silverseekers.org
  # ---------------------------------------------------------------------------
  filebrowser:
    domain: files.silverseekers.org
    auth_enabled: true

  # ---------------------------------------------------------------------------
  # Headlamp Kubernetes UI
  # ---------------------------------------------------------------------------
  headlamp:
    domain: headlamp.silverseekers.org
    auth_enabled: true

  # ---------------------------------------------------------------------------
  # Forgejo Git Server
  # ---------------------------------------------------------------------------
  forgejo:
    domain: forgejo.silverseekers.org
    auth_enabled: false # Forgejo has its own auth system
    storage_size: 10Gi
    storage_class: longhorn

  # ---------------------------------------------------------------------------
  # Quartz Digital Garden
  # ---------------------------------------------------------------------------
  quartz:
    domain: fallandrise.silverseekers.org
    auth_enabled: false
    repo_storage_size: 2Gi
    site_storage_size: 1Gi
    storage_class: longhorn
    couchdb_host: "http://obsidian-livesync.obsidian-livesync.svc:5984"
    couchdb_database: "obsidiannotes"

  # ---------------------------------------------------------------------------
  # Obsidian LiveSync (CouchDB)
  # ---------------------------------------------------------------------------
  obsidian_livesync:
    domain: obsidian.silverseekers.org
    auth_enabled: false # CouchDB has its own auth; Obsidian plugin needs direct access
    storage_size: 5Gi
    storage_class: longhorn
    couchdb_port: 5984
    database_name: obsidiannotes

  # ---------------------------------------------------------------------------
  # Plex Media Server
  # ---------------------------------------------------------------------------
  plex:
    domain: plex.silverseekers.org
    auth_enabled: false            # Plex has its own auth — Authelia would break Plex clients
    config_storage_size: 20Gi
    config_storage_class: longhorn-retain  # survives PVC deletion — preserves metadata/db
    media_storage_size: 100Gi
    media_storage_class: longhorn          # migrate to NAS PVC when hardware arrives
